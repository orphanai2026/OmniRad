<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Daily Challenge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root,[data-theme="dark"]{--bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.55);--acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.10);--border:rgba(45,212,200,.12);--border-s:rgba(232,240,245,.08);--nav-bg:rgba(8,14,20,.92);--acc-ink:#08100e;--ok:#4ade80;--err:#f87171}
[data-theme="dim"]{--bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.58);--acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.10);--border:rgba(11,107,100,.15);--border-s:rgba(15,30,42,.1);--nav-bg:rgba(237,242,248,.92);--acc-ink:#fff;--ok:#0e8f4a;--err:#c53030}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--onav-h,56px);-webkit-font-smoothing:antialiased}
body[dir="rtl"]{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
.wrap{max-width:800px;margin:0 auto;padding:40px 24px 60px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--acc-dim)}
h1{font-size:clamp(1.8rem,4vw,2.4rem);font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.day-tag{color:var(--text-m);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;margin-bottom:24px}
.card{background:var(--bg-e);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px}
.q{font-size:17px;font-weight:600;line-height:1.6;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:9px}
.choice{padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg-s);color:var(--text);cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;text-align:start;transition:.15s}
.choice:hover{border-color:var(--acc-dim);background:var(--acc-sub)}
.choice.picked{border-color:var(--acc);background:var(--acc-sub);color:var(--acc);font-weight:600}
.choice.correct{border-color:var(--ok);background:rgba(74,222,128,.1);color:var(--ok);font-weight:700}
.choice.wrong{border-color:var(--err);background:rgba(248,113,113,.1);color:var(--err);font-weight:700}
.actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
.btn{padding:11px 22px;font-size:14px;font-weight:700;font-family:inherit;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text)}
.btn.primary{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
.btn.primary:hover{transform:translateY(-1px)}
.explain{margin-top:18px;padding:14px 16px;background:var(--acc-sub);border-inline-start:3px solid var(--acc);border-radius:8px;font-size:13.5px;line-height:1.7;color:var(--text)}
.explain .ar{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic',sans-serif;direction:rtl;text-align:right;color:var(--text-m);font-size:12.5px;margin-top:8px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.stat{background:var(--bg-e);border:1px solid var(--border-s);border-radius:12px;padding:14px 16px;text-align:center}
.stat .n{font-size:22px;font-weight:700;color:var(--acc)}
.stat .l{font-size:10.5px;font-weight:600;color:var(--text-m);letter-spacing:.1em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-top:3px}
</style>

<style id="bg-identity-css">
/* ============ PLATFORM BACKGROUND IDENTITY (portable) ============ */
html{background:var(--bg,#020509)!important}
body{background:transparent!important}
.bg-identity{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.bg-identity .glow{position:absolute;inset:0;background:
  radial-gradient(58% 44% at 78% 2%,rgba(45,212,200,.18),transparent 60%),
  radial-gradient(52% 42% at 8% 98%,rgba(45,212,200,.11),transparent 62%),
  radial-gradient(90% 70% at 50% 120%,rgba(11,60,72,.35),transparent 70%)}
.bg-identity .grid{position:absolute;inset:0;opacity:.9;background-image:
  linear-gradient(rgba(45,212,200,.06) 1px,transparent 1px),
  linear-gradient(90deg,rgba(45,212,200,.06) 1px,transparent 1px);
  background-size:58px 58px;-webkit-mask-image:radial-gradient(ellipse 95% 75% at 50% 26%,#000,transparent 88%);mask-image:radial-gradient(ellipse 95% 75% at 50% 26%,#000,transparent 88%)}
.bg-identity .motif{position:absolute;top:-40px;inset-inline-start:-140px;width:560px;height:560px;
  background:url(../index-assets/patterns/arabic-geometry.svg) center/contain no-repeat;opacity:.5;
  filter:blur(1.4px);-webkit-mask:radial-gradient(circle at 50% 50%,#000 20%,transparent 68%);mask:radial-gradient(circle at 50% 50%,#000 20%,transparent 68%);
  animation:motspin 140s linear infinite}
.bg-identity .motif-2{top:auto;bottom:-190px;inset-inline-start:auto;inset-inline-end:-190px;width:640px;height:640px;
  opacity:.3;animation-duration:200s;animation-direction:reverse}
@keyframes motspin{to{transform:rotate(360deg)}}
.bg-identity .skyline{position:absolute;left:0;right:0;bottom:0;height:min(24vw,330px);
  background:url(../index-assets/skyline-teal-alpha.png) center bottom/82% auto no-repeat;opacity:.42;
  -webkit-mask-image:linear-gradient(to top,#000 55%,transparent 96%),linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
  mask-image:linear-gradient(to top,#000 55%,transparent 96%),linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
  -webkit-mask-composite:source-in;mask-composite:intersect}
.bg-identity .vignette{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 40%,transparent 55%,rgba(2,5,9,.6) 100%)}
.bg-identity .beam{position:absolute;inset:0;background:linear-gradient(115deg,transparent 40%,rgba(45,212,200,.05) 50%,transparent 60%);
  background-size:300% 300%;animation:beamdrift 14s ease-in-out infinite}
@keyframes beamdrift{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
@media(prefers-reduced-motion:reduce){.bg-identity .motif,.bg-identity .beam{animation:none}}
</style>
</head>
<body>
<div class="bg-identity" aria-hidden="true">
  <div class="glow"></div><div class="grid"></div><div class="beam"></div><div class="motif"></div><div class="motif motif-2"></div><div class="skyline"></div><div class="vignette"></div>
</div>

<div class="wrap">
  <div class="eyebrow" data-i18n="daily.title">Daily challenge</div>
  <h1 data-i18n="daily.h1">One case a day.</h1>
  <div class="day-tag" id="dayTag">DAY —</div>

  <div class="stats">
    <div class="stat"><div class="n" id="stStreak">0</div><div class="l" data-i18n="daily.streak">Streak</div></div>
    <div class="stat"><div class="n" id="stTotal">0</div><div class="l" data-i18n="daily.answered">Answered</div></div>
    <div class="stat"><div class="n" id="stPct">—</div><div class="l" data-i18n="daily.accuracy">Accuracy</div></div>
  </div>

  <div class="card">
    <div class="q" id="q">Loading…</div>
    <div class="choices" id="choices"></div>
    <div class="actions">
      <button class="btn primary" id="btnCheck" data-i18n="daily.check">Check answer</button>
    </div>
    <div class="explain" id="explain" style="display:none"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/i18n.js"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/data/anatomy-master.js?v=20260721"></script>
<script src="../modules/data/anatomy-master-v2.js?v=20260721"></script>
<script src="../modules/omnirad-term.js?v=20260721"></script>
<script src="../modules/omnirad-search.js"></script>
<script src="../modules/omnirad-typography.js"></script>
<script src="../modules/omnirad-avatars.js"></script>
<script src="../modules/omnirad-nav.js?v=20260721" data-base="../"></script>
<script>
const QUESTIONS = [
  { q:'Which modality is the first-line for suspected acute stroke to rule out hemorrhage?',
    c:['MRI DWI','Non-contrast CT head','CT angiography','Cerebral angiography'], a:1,
    e:'Non-contrast CT is the ACR-recommended first-line to rule out intracranial hemorrhage before thrombolysis (ACR score 9/9).',
    ar:'CT بلا صبغة هو الخيار الأول لاستبعاد النزيف قبل حل الخثرة.' },
  { q:'The right kidney is normally positioned relative to the left kidney:',
    c:['Higher','Lower','At the same level','Anterior'], a:1,
    e:'The right kidney is displaced inferiorly by the liver, spanning approximately T12–L3. The left spans T11–L2.',
    ar:'الكلية اليمنى أخفض من اليسرى بسبب الكبد، T12–L3.' },
  { q:'What is the imaging modality of choice for suspected rotator cuff tear?',
    c:['X-Ray','CT','MRI','Ultrasound'], a:2,
    e:'MRI (particularly PD fat-saturated sequences) is optimal for evaluating rotator cuff tears and shoulder soft tissues.',
    ar:'MRI مع تسلسلات PD fat-sat هو الأمثل لتقييم تمزّق الكفة المدوّرة.' },
  { q:'Which sequence best detects acute cerebral infarction within the first hours?',
    c:['T1','T2','FLAIR','DWI / ADC'], a:3,
    e:'DWI/ADC detects cytotoxic edema within minutes of ischemia — sensitivity far exceeds CT in the acute window.',
    ar:'DWI/ADC يكشف الاحتشاء الحاد خلال دقائق، حساسيته أعلى بكثير من CT.' },
  { q:'What is the first-line imaging for suspected cholelithiasis?',
    c:['CT abdomen','MRCP','Right upper quadrant ultrasound','HIDA scan'], a:2,
    e:'RUQ ultrasound is the ACR-recommended first-line: highest sensitivity for gallstones, no radiation, bedside-available.',
    ar:'سونار الربع الأيمن العلوي هو الخيار الأول لحصوات المرارة.' }
];
function todayIndex(){
  const start = new Date('2026-01-01').getTime();
  const day = Math.floor((Date.now() - start) / 86400000);
  return { day: day + 1, idx: ((day % QUESTIONS.length) + QUESTIONS.length) % QUESTIONS.length };
}
const $ = id => document.getElementById(id);
const state = { picked: -1, checked: false };
function loadStats(){
  try { return JSON.parse(localStorage.getItem('omnirad_daily') || '{}'); } catch { return {}; }
}
function saveStats(s){ localStorage.setItem('omnirad_daily', JSON.stringify(s)); }
function renderStats(){
  const s = loadStats();
  $('stStreak').textContent = s.streak || 0;
  $('stTotal').textContent  = s.total  || 0;
  $('stPct').textContent    = s.total ? Math.round((s.correct || 0) * 100 / s.total) + '%' : '—';
}
function render(){
  const { day, idx } = todayIndex();
  $('dayTag').textContent = 'DAY ' + day;
  const q = QUESTIONS[idx];
  $('q').textContent = q.q;
  const cw = $('choices'); cw.innerHTML = '';
  q.c.forEach((text, i) => {
    const b = document.createElement('button');
    b.className = 'choice' + (state.picked === i ? ' picked' : '');
    b.textContent = text;
    b.addEventListener('click', () => { if (state.checked) return; state.picked = i; render(); });
    cw.appendChild(b);
  });
  renderStats();
}
$('btnCheck').addEventListener('click', () => {
  if (state.picked < 0) return (window.OmniRadToast||alert)(((window.OmniRadI18n&&OmniRadI18n.lang)==='ar')?'اختر إجابة أولاً.':'Pick an answer first.', 'err');
  const { idx } = todayIndex();
  const q = QUESTIONS[idx];
  state.checked = true;
  const buttons = $('choices').children;
  for (let i = 0; i < buttons.length; i++){
    buttons[i].classList.remove('picked');
    if (i === q.a) buttons[i].classList.add('correct');
    else if (i === state.picked) buttons[i].classList.add('wrong');
  }
  const ex = $('explain');
  ex.innerHTML = q.e + '<div class="ar">' + q.ar + '</div>';
  ex.style.display = 'block';
  // stats
  const s = loadStats();
  s.total = (s.total || 0) + 1;
  if (state.picked === q.a){ s.correct = (s.correct || 0) + 1; s.streak = (s.streak || 0) + 1; }
  else { s.streak = 0; }
  saveStats(s); renderStats();
  $('btnCheck').style.display = 'none';
});
render();
</script>
