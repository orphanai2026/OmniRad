<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Smart Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ──────────────────────────────────────────── */
:root {
  --teal-bright: oklch(0.72 0.14 192);
  --teal-mid:    oklch(0.60 0.13 192);
  --teal-dim:    oklch(0.38 0.08 192);
  --teal-glow:   oklch(0.72 0.14 192 / 0.18);
  --teal-subtle: oklch(0.72 0.14 192 / 0.08);
  --z-sticky: 200; --z-modal: 300;
}
[data-theme="dark"] {
  --bg-base:       oklch(0.13 0.010 240);
  --bg-surface:    oklch(0.17 0.010 240);
  --bg-raised:     oklch(0.21 0.012 240);
  --bg-overlay:    oklch(0.25 0.012 240);
  --border:        oklch(0.32 0.010 240);
  --border-subtle: oklch(0.24 0.008 240);
  --text-primary:  oklch(0.93 0.008 240);
  --text-secondary:oklch(0.68 0.010 240);
  --text-muted:    oklch(0.50 0.008 240);
  --shadow:        0 2px 12px oklch(0 0 0 / 0.45);
  --shadow-lg:     0 8px 32px oklch(0 0 0 / 0.55);
  --teal-bright:   oklch(0.76 0.16 192);
  --teal-mid:      oklch(0.62 0.13 192);
  --teal-dim:      oklch(0.40 0.09 192);
  --teal-glow:     oklch(0.76 0.16 192 / 0.22);
  --teal-subtle:   oklch(0.76 0.16 192 / 0.11);
  /* Canvas placeholder colors — visible on dark bg */
  --canvas-bg:     #0b0f18;
  --canvas-ring:   rgba(0,210,185,0.30);
  --canvas-fill:   rgba(0,160,140,0.10);
  --canvas-text:   rgba(0,210,185,0.60);
  --canvas-grid:   rgba(0,210,185,0.06);
}
[data-theme="dim"] {
  --bg-base:       oklch(0.82 0.010 240);
  --bg-surface:    oklch(0.86 0.010 240);
  --bg-raised:     oklch(0.88 0.010 240);
  --bg-overlay:    oklch(0.91 0.010 240);
  --border:        oklch(0.72 0.012 240);
  --border-subtle: oklch(0.77 0.010 240);
  --text-primary:  oklch(0.18 0.012 240);
  --text-secondary:oklch(0.34 0.012 240);
  --text-muted:    oklch(0.50 0.010 240);
  --shadow:        0 2px 12px oklch(0 0 0 / 0.12);
  --shadow-lg:     0 8px 32px oklch(0 0 0 / 0.18);
  --teal-bright:   oklch(0.42 0.14 192);
  --teal-mid:      oklch(0.35 0.12 192);
  --teal-dim:      oklch(0.28 0.09 192);
  --teal-glow:     oklch(0.42 0.14 192 / 0.18);
  --teal-subtle:   oklch(0.42 0.14 192 / 0.10);
  /* Canvas placeholder colors — visible on light bg */
  --canvas-bg:     #1a2030;
  --canvas-ring:   rgba(0,180,160,0.55);
  --canvas-fill:   rgba(0,160,140,0.18);
  --canvas-text:   rgba(0,190,170,0.85);
  --canvas-grid:   rgba(0,180,160,0.10);
}

/* ─── RESET ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: var(--bg-base); color: var(--text-primary); min-height: 100vh; line-height: 1.6; transition: background 0.25s, color 0.25s; }
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ─── TOPBAR ──────────────────────────────────────────── */
.topbar { position: sticky; top: 0; z-index: var(--z-sticky); background: var(--bg-surface); border-bottom: 1px solid var(--border-subtle); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 56px; gap: 1rem; }
.topbar-logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--text-primary); font-weight: 600; font-size: 1.05rem; letter-spacing: -0.01em; flex-shrink: 0; }
.topbar-logo .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal-bright); box-shadow: 0 0 8px var(--teal-bright); }
.topbar-breadcrumb { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
.topbar-breadcrumb span { color: var(--text-secondary); }
.topbar-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
.theme-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.75rem; border-radius: 99px; border: 1px solid var(--border); background: var(--bg-raised); color: var(--text-secondary); font-size: 0.78rem; font-weight: 500; transition: all 0.15s; }
.theme-btn:hover { border-color: var(--teal-mid); color: var(--teal-bright); }

/* ─── LAYOUT ──────────────────────────────────────────── */
.page-wrapper { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 56px); }

/* ─── SIDEBAR ─────────────────────────────────────────── */
.sidebar { border-right: 1px solid var(--border-subtle); background: var(--bg-surface); padding: 1.5rem 0; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
.sidebar-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); padding: 0 1.25rem 0.6rem; }
.structure-list { list-style: none; }
.structure-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.55rem 1.25rem; cursor: pointer; font-size: 0.88rem; color: var(--text-secondary); transition: background 0.12s, color 0.12s; border-left: 2px solid transparent; }
.structure-item:hover { background: var(--bg-raised); color: var(--text-primary); }
.structure-item.active { background: var(--teal-subtle); color: var(--teal-bright); border-left-color: var(--teal-bright); font-weight: 500; }
.struct-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--bg-overlay); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
.structure-item.active .struct-icon { background: var(--teal-glow); }
.struct-name { flex: 1; }
.struct-arabic { font-size: 0.72rem; color: var(--text-muted); direction: rtl; }

/* ─── MAIN ────────────────────────────────────────────── */
.main-content { padding: 2rem 2.5rem; max-width: 1200px; transition: opacity 0.18s; }
.main-content.fading { opacity: 0; }

/* ─── STRUCTURE HEADER ────────────────────────────────── */
.structure-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 2rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-subtle); }
.structure-eyebrow { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--teal-bright); margin-bottom: 0.4rem; }
.structure-name-en { font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; }
.structure-name-ar { font-size: 1.1rem; color: var(--text-muted); margin-top: 0.25rem; direction: rtl; }
.structure-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.9rem; }
.tag { font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 99px; border: 1px solid var(--border); color: var(--text-secondary); background: var(--bg-raised); font-family: 'IBM Plex Mono', monospace; }
.tag.tag-system { border-color: var(--teal-dim); color: var(--teal-bright); background: var(--teal-subtle); }
.structure-meta { display: flex; flex-direction: column; gap: 0.5rem; min-width: 180px; flex-shrink: 0; }
.meta-item { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 0.6rem 0.9rem; }
.meta-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 0.15rem; }
.meta-value { font-size: 0.85rem; font-weight: 500; }

/* ─── INFO CARDS ──────────────────────────────────────── */
.info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 2rem; }
.info-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 1rem 1.1rem; }
.info-card-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--teal-bright); font-weight: 600; margin-bottom: 0.4rem; }
.info-card-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.55; }

/* ─── VIEWER SECTION ──────────────────────────────────── */
.viewer-section { margin-bottom: 1.5rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.viewer-section-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.1rem; border-bottom: 1px solid var(--border-subtle); background: var(--bg-raised); }
.viewer-section-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
.viewer-section-body { padding: 1rem 1.1rem; }

/* ─── MODALITY SELECTOR ───────────────────────────────── */
.selector-row { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.selector-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; margin-right: 0.25rem; white-space: nowrap; }
.selector-btn { padding: 0.32rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-raised); color: var(--text-secondary); font-size: 0.78rem; font-weight: 500; font-family: 'IBM Plex Mono', monospace; transition: all 0.12s; }
.selector-btn:hover:not(:disabled) { border-color: var(--teal-mid); color: var(--text-primary); }
.selector-btn.active { background: var(--teal-glow); border-color: var(--teal-bright); color: var(--teal-bright); box-shadow: 0 0 0 1px var(--teal-dim); }
.selector-btn:disabled { opacity: 0.30; cursor: not-allowed; }

/* ─── VIEW MODE CONTROLS ──────────────────────────────── */
.view-controls { display: flex; align-items: center; gap: 0.3rem; }
.view-btn { display: flex; align-items: center; gap: 0.3rem; padding: 0.28rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-overlay); color: var(--text-muted); font-size: 0.7rem; font-weight: 500; transition: all 0.12s; white-space: nowrap; }
.view-btn:hover { border-color: var(--teal-mid); color: var(--teal-bright); }
.view-btn.active { background: var(--teal-glow); border-color: var(--teal-bright); color: var(--teal-bright); }

/* ─── IMAGE GRID ──────────────────────────────────────── */
.image-viewer-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.8rem; transition: all 0.25s; }
.image-viewer-grid.view-expand  { grid-template-columns: 1fr; }
.image-viewer-grid.view-split   { grid-template-columns: 2fr 1fr; }
.image-viewer-grid.view-split   .image-panel-with-tools:nth-child(n+2) { }

/* ─── IMAGE PANELS ────────────────────────────────────── */
.image-panel-with-tools { background: var(--bg-base); border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.15s; display: flex; flex-direction: column; }
.image-panel-with-tools:hover { border-color: var(--teal-dim); }
.image-panel-with-tools.panel-focused { border-color: var(--teal-bright); box-shadow: 0 0 0 2px var(--teal-glow); }

.image-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border-subtle); background: var(--bg-surface); flex-shrink: 0; }
.image-panel-label { font-size: 0.72rem; font-weight: 600; font-family: 'IBM Plex Mono', monospace; color: var(--text-secondary); }
.image-panel-right { display: flex; align-items: center; gap: 0.4rem; }
.image-panel-modality { font-size: 0.63rem; padding: 0.13rem 0.45rem; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
.panel-expand-btn { padding: 0.15rem 0.35rem; border-radius: 4px; border: 1px solid var(--border-subtle); background: var(--bg-overlay); color: var(--text-muted); font-size: 0.65rem; cursor: pointer; transition: all 0.1s; }
.panel-expand-btn:hover { border-color: var(--teal-mid); color: var(--teal-bright); }

/* Modality badge colors */
.mod-ct    { background: oklch(0.35 0.08 50/0.7);  color: oklch(0.82 0.10 50);  border: 1px solid oklch(0.50 0.08 50/0.4); }
.mod-mri   { background: oklch(0.28 0.08 270/0.7); color: oklch(0.78 0.12 270); border: 1px solid oklch(0.45 0.08 270/0.4); }
.mod-us    { background: oklch(0.28 0.08 160/0.7); color: oklch(0.72 0.12 160); border: 1px solid oklch(0.45 0.08 160/0.4); }
.mod-nm    { background: oklch(0.28 0.10 310/0.7); color: oklch(0.76 0.13 310); border: 1px solid oklch(0.45 0.10 310/0.4); }
.mod-pet   { background: oklch(0.30 0.10 25/0.7);  color: oklch(0.80 0.13 25);  border: 1px solid oklch(0.48 0.10 25/0.4); }
.mod-rt    { background: oklch(0.30 0.10 0/0.7);   color: oklch(0.78 0.14 0);   border: 1px solid oklch(0.48 0.10 0/0.4); }
.mod-angio { background: oklch(0.28 0.08 220/0.7); color: oklch(0.74 0.12 220); border: 1px solid oklch(0.45 0.08 220/0.4); }
.mod-xray  { background: oklch(0.30 0.04 240/0.7); color: oklch(0.84 0.06 240); border: 1px solid oklch(0.48 0.04 240/0.4); }
.mod-mammo { background: oklch(0.28 0.08 340/0.7); color: oklch(0.76 0.12 340); border: 1px solid oklch(0.45 0.08 340/0.4); }

/* ─── CANVAS VIEWER ───────────────────────────────────── */
.canvas-viewer { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; cursor: crosshair; background: var(--canvas-bg); flex: 1; min-height: 200px; }
.view-expand .canvas-viewer  { aspect-ratio: 16/9; min-height: 420px; }
.view-split  .image-panel-with-tools:first-child .canvas-viewer { aspect-ratio: 4/3; min-height: 360px; }
.canvas-viewer canvas { position: absolute; top:0; left:0; width:100%; height:100%; display:block; }
.canvas-bg   { z-index: 1; }
.canvas-draw { z-index: 2; pointer-events: none; }

.tool-status { position: absolute; top: 0.4rem; right: 0.4rem; z-index: 5; background: rgba(0,0,0,0.72); color: var(--teal-bright); font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; padding: 0.18rem 0.42rem; border-radius: 4px; pointer-events: none; border: 1px solid rgba(0,200,180,0.25); }
.measure-overlay { position: absolute; bottom: 0.4rem; left: 0.4rem; right: 0.4rem; z-index: 5; display: flex; flex-wrap: wrap; gap: 0.25rem; pointer-events: none; }
.measure-tag { background: rgba(0,0,0,0.75); color: var(--teal-bright); font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; padding: 0.18rem 0.4rem; border-radius: 3px; border: 1px solid rgba(0,200,180,0.30); backdrop-filter: blur(4px); }
.measure-tag.label-tag { color: #f0d060; border-color: rgba(240,208,96,0.35); }

/* Modality note */
.viewer-note { font-size: 0.73rem; color: var(--text-muted); font-style: italic; font-family: 'IBM Plex Mono', monospace; padding: 0.6rem 0 0.2rem; grid-column: 1/-1; }

/* ─── SPLIT MODALITY SELECTOR ─────────────────────────── */
.split-mod-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0 0.8rem; }
.split-mod-label { font-size: 0.68rem; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
.split-mod-btn { padding: 0.22rem 0.55rem; border-radius: 5px; border: 1px solid var(--border-subtle); background: var(--bg-overlay); color: var(--text-muted); font-size: 0.68rem; font-family: 'IBM Plex Mono', monospace; cursor: pointer; transition: all 0.1s; }
.split-mod-btn:hover:not(:disabled) { border-color: var(--teal-mid); color: var(--teal-bright); }
.split-mod-btn.active { background: var(--teal-subtle); border-color: var(--teal-mid); color: var(--teal-bright); }
.split-mod-btn:disabled { opacity: 0.25; cursor: not-allowed; }

/* ─── TOOLS SECTION ───────────────────────────────────── */
.tools-section { margin-bottom: 2rem; background: var(--bg-surface); border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; }
.tools-section-header { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 1rem; border-bottom: 1px solid var(--border-subtle); background: var(--bg-raised); }
.tools-section-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem; }
.tools-modality-badge { font-size: 0.63rem; padding: 0.13rem 0.5rem; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
.tools-disclaimer { font-size: 0.65rem; color: var(--text-muted); font-style: italic; font-family: 'IBM Plex Mono', monospace; }
.toolbar-body { padding: 0.7rem 1rem; display: flex; flex-direction: column; gap: 0.55rem; }
.toolbar-group { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
.toolbar-group-label { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); min-width: 56px; flex-shrink: 0; }
.tool-divider { width: 1px; height: 20px; background: var(--border); margin: 0 0.1rem; flex-shrink: 0; }

/* ─── TOOL BUTTONS ────────────────────────────────────── */
.tool-btn { display: flex; align-items: center; gap: 0.28rem; padding: 0.3rem 0.58rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-raised); color: var(--text-secondary); font-size: 0.71rem; font-weight: 500; font-family: 'IBM Plex Sans', sans-serif; cursor: pointer; transition: all 0.12s; white-space: nowrap; user-select: none; }
.tool-btn:hover { border-color: var(--teal-mid); color: var(--text-primary); background: var(--bg-overlay); }
.tool-btn.active { background: var(--teal-glow); border-color: var(--teal-bright); color: var(--teal-bright); box-shadow: 0 0 0 1px var(--teal-dim); }
.tool-btn.t-danger { border-color: oklch(0.45 0.12 25/0.5); color: oklch(0.65 0.12 25); }
.tool-btn.t-danger:hover { border-color: oklch(0.65 0.14 25); background: oklch(0.45 0.12 25/0.12); color: oklch(0.75 0.14 25); }
.tool-btn.t-save { border-color: oklch(0.45 0.10 160/0.5); color: oklch(0.60 0.11 160); }
.tool-btn.t-save:hover { border-color: oklch(0.62 0.12 160); background: oklch(0.45 0.10 160/0.12); color: oklch(0.72 0.12 160); }
.tool-icon { font-size: 0.82rem; line-height: 1; }

/* ─── PRESET / SLIDER ─────────────────────────────────── */
.preset-btn { padding: 0.23rem 0.52rem; border-radius: 5px; border: 1px solid var(--border-subtle); background: var(--bg-overlay); color: var(--text-muted); font-size: 0.66rem; font-family: 'IBM Plex Mono', monospace; font-weight: 500; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
.preset-btn:hover { border-color: var(--teal-dim); color: var(--teal-bright); }
.preset-btn.active { background: var(--teal-subtle); border-color: var(--teal-mid); color: var(--teal-bright); }
.slider-row { display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap; }
.slider-item { display: flex; align-items: center; gap: 0.38rem; }
.slider-label { font-size: 0.65rem; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; min-width: 52px; }
.slider-val { font-size: 0.65rem; color: var(--teal-bright); font-family: 'IBM Plex Mono', monospace; min-width: 34px; text-align: right; }
input[type="range"].tool-slider { -webkit-appearance: none; width: 88px; height: 3px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer; }
input[type="range"].tool-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--teal-bright); cursor: pointer; transition: transform 0.1s; }
input[type="range"].tool-slider::-webkit-slider-thumb:hover { transform: scale(1.25); }

/* ─── CROSS REFS ──────────────────────────────────────── */
.crossref-section { margin-bottom: 2rem; }
.section-title { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.75rem; }
.crossref-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
.crossref-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.9rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary); font-size: 0.82rem; transition: all 0.12s; }
.crossref-btn:hover { border-color: var(--teal-mid); color: var(--teal-bright); background: var(--teal-subtle); }
.crossref-arrow { font-size: 0.75rem; opacity: 0.5; }

/* ─── STATUS BAR ──────────────────────────────────────── */
.status-bar { display: flex; align-items: center; gap: 1rem; padding: 0.65rem 1rem; background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.76rem; color: var(--text-muted); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal-bright); flex-shrink: 0; }

/* ─── RT WARNING ──────────────────────────────────────── */
.rt-warning { background: oklch(0.45 0.12 25/0.08); border: 1px solid oklch(0.45 0.12 25/0.28); border-radius: 6px; padding: 0.38rem 0.7rem; font-size: 0.65rem; color: oklch(0.68 0.12 25); font-family: 'IBM Plex Mono', monospace; }

/* ─── RESPONSIVE ──────────────────────────────────────── */
@media (max-width: 900px) {
  .page-wrapper { grid-template-columns: 1fr; }

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const STRUCTURES = {
  liver: {

    modalities:{

  },
  kidney: {

    location:'Right retroperitoneal space, T12–L3 level; lower than left kidney',
    function:'Blood filtration, urine production, electrolyte balance, acid-base regulation, erythropoietin and renin secretion.',
    clinicalNote:'Divided into cortex (nephrons) and medulla (pyramids). The right kidney is 1–2 cm lower than the left due to the liver.',

    modalities:{
      CT: {planes:['Axial','Coronal','Sagittal'],note:'Corticomedullary phase (25–70 s) best shows cortex; nephrographic phase for masses'},
      MRI:{planes:['Axial','Coronal'],note:'T2: medullary pyramids hyperintense; T1 C+: cortex enhances earlier'},

      CT: {planes:['Axial','Coronal'],note:'Pancreatic protocol: thin slices (0.5–1 mm), arterial + portal phases'},

    }
  },
  gallbladder: {
    name:'Gallbladder', arabic:'المرارة', system:'Hepatobiliary', region:'Upper Abdomen',
    location:'Gallbladder fossa, undersurface of right hepatic lobe (segments IV/V)',
    function:'Bile concentration and storage between meals; contraction (CCK-stimulated) releases bile into duodenum via cystic duct → CBD.',
    clinicalNote:'Normal wall thickness ≤ 3 mm (fasting). Phrygian cap (folded fundus) is a normal variant seen in ~4% of individuals.',
    tags:['Hollow Organ','Hepatobiliary','Wall: ≤3 mm fasting','Volume: 30–50 mL'],
    crossRefs:['Common Bile Duct','Liver','Cystic Duct','Duodenum'],
    modalities:{
      CT: {planes:['Axial','Coronal'],note:'Non-contrast for stones; contrast for wall thickening assessment'},
      MRI:{planes:['Axial','Coronal'],note:'T2: bile markedly hyperintense; MRCP shows biliary anatomy exquisitely'},
      US: {planes:['Transverse','Longitudinal','Oblique'],note:'First-line modality. Fasting required. Stones: echogenic focus with posterior acoustic shadowing'},
    }
  }
};

const ALL_MODS = ['CT','MRI','US','NM','PET','RT','Angio','X-Ray','Mammo'];
const MOD_CLASS = {CT:'mod-ct',MRI:'mod-mri',US:'mod-us',NM:'mod-nm',PET:'mod-pet',RT:'mod-rt',Angio:'mod-angio','X-Ray':'mod-xray',Mammo:'mod-mammo'};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentStructure = 'liver';
let currentModality  = 'CT';
let currentPlane     = 'Axial';
let viewMode         = 'normal';   // normal | expand | split
let splitModality    = 'MRI';      // second modality in split view
let activeTool       = 'pan';
let activeContourLabel = 'GTV';
let activeContourColor = '#ff4040';
const panelStates    = {};
let toolbarBound     = false;

// ═══════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════
const htmlEl      = document.documentElement;
const themeToggle = document.getElementById('theme-toggle');
const themeIcon   = document.getElementById('theme-icon');
const themeLabel  = document.getElementById('theme-label');

function applyTheme(t) {
  htmlEl.dataset.theme = t;
  themeIcon.textContent  = t === 'dark' ? '☾' : '◑';
  themeLabel.textContent = t === 'dark' ? 'Dim' : 'Dark';
  localStorage.setItem('omnirad-theme', t);
  // Redraw all canvases when theme changes
  Object.keys(panelStates).forEach(i => drawBg(parseInt(i)));
}
themeToggle.addEventListener('click', () => applyTheme(htmlEl.dataset.theme === 'dark' ? 'dim' : 'dark'));
applyTheme(localStorage.getItem('omnirad-theme') || 'dark');

// ═══════════════════════════════════════════════════════════
// BUILD CONTENT
// ═══════════════════════════════════════════════════════════
function getPlanes(struct, mod) { return struct.modalities[mod]?.planes || []; }

function modSelectorHTML(availMods) {
  return ALL_MODS.map(m => {
    const avail = availMods.includes(m);
    const act   = m === currentModality ? ' active' : '';
    const dis   = !avail ? ' disabled title="Not yet available for this structure"' : '';
    return `<button class="selector-btn${act}"${dis} data-mod="${m}">${m}</button>`;
  }).join('');
}

function splitModSelectorHTML(availMods, currentMain) {
  return ALL_MODS.map(m => {
    const avail = availMods.includes(m);
    const act   = m === splitModality ? ' active' : '';
    const dis   = !avail || m === currentMain ? ' disabled' : '';
    return `<button class="split-mod-btn${act}"${dis} data-splitmod="${m}">${m}</button>`;
  }).join('');
}

function buildPanels(struct, mod, isSplit = false, panelOffset = 0) {
  const planes  = getPlanes(struct, mod);
  const mc      = MOD_CLASS[mod] || 'mod-ct';
  const note    = struct.modalities[mod]?.note || '';
  const limited = (viewMode === 'expand') ? planes.slice(0,1) : (viewMode === 'split' && isSplit) ? planes.slice(0,1) : planes;

  if (!limited.length) return `<div style="padding:2rem;color:var(--text-muted);font-size:0.82rem;text-align:center;grid-column:1/-1;">No ${mod} images available for this structure</div>`;

  return limited.map((p, rawI) => {
    const i = rawI + panelOffset;
    return `
    <div class="image-panel-with-tools" id="panel-wrap-${i}">
      <div class="image-panel-header">
        <span class="image-panel-label">${p}</span>
        <div class="image-panel-right">
          <span class="image-panel-modality ${mc}">${mod}</span>
          <button class="panel-expand-btn" data-panelexpand="${i}" title="Expand this panel">⤢</button>
        </div>
      </div>
      <div class="canvas-viewer" id="viewer-${i}" data-panel="${i}">
        <canvas class="canvas-bg"   id="canvas-bg-${i}"></canvas>
        <canvas class="canvas-draw" id="canvas-draw-${i}"></canvas>
        <div class="tool-status"    id="tool-status-${i}">pan | ×1.0</div>
        <div class="measure-overlay" id="measure-overlay-${i}"></div>
      </div>
    </div>`;
  }).join('') + `<p class="viewer-note">📋 ${note}</p>`;
}

function buildContent(id) {
  const s = STRUCTURES[id];
  if (!s) return '';
  const availMods = Object.keys(s.modalities);

  // Build main panels
  let gridClass = 'image-viewer-grid';
  if (viewMode === 'expand') gridClass += ' view-expand';
  if (viewMode === 'split')  gridClass += ' view-split';

  let panelsHTML = buildPanels(s, currentModality, false, 0);
  let splitRow   = '';

  if (viewMode === 'split') {
    const smod = availMods.includes(splitModality) ? splitModality : availMods[1] || availMods[0];
    if (smod !== currentModality) {
      const offset = getPlanes(s, currentModality).length;
      panelsHTML += buildPanels(s, smod, true, offset);
    }
    splitRow = `
    <div class="split-mod-row">
      <span class="split-mod-label">Right panel:</span>
      ${splitModSelectorHTML(availMods, currentModality)}
    </div>`;
  }

  return `
  <div class="status-bar">
    <span class="status-dot"></span>
    <span>Phase 1 · MVP · <strong>Upper Abdomen</strong> · 5 structures · Placeholder images</span>
  </div>

  <div class="structure-header">
    <div>
      <div class="structure-eyebrow">${s.system} · ${s.region}</div>
      <h1 class="structure-name-en">${s.name}</h1>
      <div class="structure-name-ar">${s.arabic}</div>
      <div class="structure-tags">${s.tags.map((t,i)=>`<span class="tag${i===0?' tag-system':''}">${t}</span>`).join('')}</div>
    </div>
    <div class="structure-meta">
      <div class="meta-item"><div class="meta-label">Region</div><div class="meta-value">${s.region}</div></div>
      <div class="meta-item"><div class="meta-label">System</div><div class="meta-value">${s.system}</div></div>
    </div>
  </div>

  <div class="info-grid">
    <div class="info-card"><div class="info-card-label">Location</div><div class="info-card-text">${s.location}</div></div>
    <div class="info-card"><div class="info-card-label">Function</div><div class="info-card-text">${s.function}</div></div>
    <div class="info-card"><div class="info-card-label">Clinical Note</div><div class="info-card-text">${s.clinicalNote}</div></div>
  </div>

  <div class="viewer-section">
    <div class="viewer-section-header">
      <div class="viewer-section-title">Multimodal Viewer</div>
      <div class="view-controls">
        <button class="view-btn${viewMode==='normal'?' active':''}" data-view="normal">⊞ Normal</button>
        <button class="view-btn${viewMode==='expand'?' active':''}" data-view="expand">⛶ Expand</button>
        <button class="view-btn${viewMode==='split' ?' active':''}" data-view="split">⊟ Split</button>
      </div>
    </div>
    <div class="viewer-section-body">
      <div class="selector-row">
        <span class="selector-label">Modality</span>
        ${modSelectorHTML(availMods)}
      </div>
      ${splitRow}
      <div class="${gridClass}" id="image-grid">${panelsHTML}</div>
    </div>
  </div>

  <div class="tools-section" id="tools-section">
    <div class="tools-section-header">
      <div class="tools-section-title">
        🛠 Image Tools Suite
        <span class="tools-modality-badge ${MOD_CLASS[currentModality]||'mod-ct'}" id="tools-mod-badge">${currentModality}</span>
      </div>
      <span class="tools-disclaimer">⚠ Educational use only — values are illustrative</span>
    </div>
    <div class="toolbar-body" id="toolbar-body"></div>
  </div>

  <div class="crossref-section">
    <div class="section-title">Related Structures</div>
    <div class="crossref-grid">
      ${s.crossRefs.map(r=>`<button class="crossref-btn" onclick="alert('${r} — available in future content update')">${r} <span class="crossref-arrow">→</span></button>`).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(id, animate = true) {
  const main = document.getElementById('main-content');
  document.getElementById('breadcrumb-name').textContent = STRUCTURES[id]?.name || id;
  toolbarBound = false;
  // Clear old panel states
  Object.keys(panelStates).forEach(k => delete panelStates[k]);

  const doRender = () => {
    main.innerHTML = buildContent(id);
    bindPageEvents();
    buildAndBindToolbar();
    setTimeout(() => initCanvasPanels(), 60);
  };

  if (animate) {
    main.classList.add('fading');
    setTimeout(() => { doRender(); main.classList.remove('fading'); }, 150);
  } else { doRender(); }
}

function refreshViewer() {
  const s    = STRUCTURES[currentStructure];
  const avail = Object.keys(s.modalities);
  const gridEl = document.getElementById('image-grid');
  if (!gridEl) return;

  gridEl.className = 'image-viewer-grid' + (viewMode==='expand'?' view-expand':viewMode==='split'?' view-split':'');

  Object.keys(panelStates).forEach(k => delete panelStates[k]);

  let html = buildPanels(s, currentModality, false, 0);
  if (viewMode === 'split') {
    const smod = avail.includes(splitModality) ? splitModality : avail[1] || avail[0];
    if (smod !== currentModality) html += buildPanels(s, smod, true, getPlanes(s, currentModality).length);
  }
  gridEl.innerHTML = html;

  // Update split row
  const existSplit = document.querySelector('.split-mod-row');
  if (viewMode === 'split' && !existSplit) {
    const row = document.createElement('div');
    row.className = 'split-mod-row';
    row.innerHTML = `<span class="split-mod-label">Right panel:</span>${splitModSelectorHTML(avail, currentModality)}`;
    gridEl.parentNode.insertBefore(row, gridEl);
    row.addEventListener('click', e => {
      const b = e.target.closest('[data-splitmod]');
      if (!b || b.disabled) return;
      splitModality = b.dataset.splitmod;
      refreshViewer();
    });
  } else if (viewMode !== 'split' && existSplit) {
    existSplit.remove();
  } else if (viewMode === 'split' && existSplit) {
    existSplit.innerHTML = `<span class="split-mod-label">Right panel:</span>${splitModSelectorHTML(avail, currentModality)}`;
    existSplit.addEventListener('click', e => {
      const b = e.target.closest('[data-splitmod]');
      if (!b || b.disabled) return;
      splitModality = b.dataset.splitmod;
      refreshViewer();
    });
  }

  setTimeout(() => { initCanvasPanels(); setActiveTool(activeTool); }, 60);
  buildAndBindToolbar();
}

// ═══════════════════════════════════════════════════════════
// PAGE EVENT BINDING (modality, view mode, expand buttons)
// ═══════════════════════════════════════════════════════════
function bindPageEvents() {
  // Modality selector
  document.querySelectorAll('.selector-btn[data-mod]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      currentModality = btn.dataset.mod;
      currentPlane    = getPlanes(STRUCTURES[currentStructure], currentModality)[0] || 'Axial';
      document.querySelectorAll('.selector-btn[data-mod]').forEach(b => b.classList.toggle('active', b.dataset.mod === currentModality));
      // Rebuild tools badge
      const badge = document.getElementById('tools-mod-badge');
      if (badge) { badge.textContent = currentModality; badge.className = `tools-modality-badge ${MOD_CLASS[currentModality]||'mod-ct'}`; }
      refreshViewer();
    });
  });

  // View mode
  document.querySelectorAll('.view-btn[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      viewMode = btn.dataset.view;
      document.querySelectorAll('.view-btn[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === viewMode));
      refreshViewer();
    });
  });

  // Panel expand button (double-click or ⤢ button)
  document.addEventListener('click', e => {
    const pb = e.target.closest('[data-panelexpand]');
    if (!pb) return;
    viewMode = 'expand';
    document.querySelectorAll('.view-btn[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === 'expand'));
    refreshViewer();
  });
}

// ═══════════════════════════════════════════════════════════
// TOOLBAR
// ═══════════════════════════════════════════════════════════
const WL_PRESETS = [{label:'Soft Tissue',w:400,l:40},{label:'Lung',w:1500,l:-600},{label:'Bone',w:1800,l:400},{label:'Brain',w:80,l:40},{label:'Liver',w:150,l:60},{label:'Abdomen',w:350,l:40},{label:'Mediastinum',w:350,l:50}];
const SIG_LABELS = ['T1','T2','FLAIR','DWI','ADC','T1+C','STIR'];
const DOP_LABELS = ['B-Mode','Color Doppler','Power Doppler','Spectral'];
const TRC_LABELS = ['Tc-99m','Tl-201','I-131','Ga-67','In-111','F-18 FDG'];
const PRC_LABELS = ['CR','PR','SD','PD'];
const OAR_LABELS = ['GTV','CTV','PTV','OAR-Cord','OAR-Parotid','OAR-Lens'];
const CTR_COLORS = {GTV:'#ff4040',CTV:'#ff8c00',PTV:'#ffd700','OAR-Cord':'#60d0ff','OAR-Parotid':'#c060ff','OAR-Lens':'#60ff90'};

function buildToolbarHTML(mod) {
  const base = `
  <div class="toolbar-group">
    <span class="toolbar-group-label">Navigate</span>
    <button class="tool-btn${activeTool==='pan'?' active':''}" data-tool="pan"><span class="tool-icon">✥</span> Pan/Zoom</button>
    <div class="tool-divider"></div>
    <button class="tool-btn${activeTool==='measure'?' active':''}"     data-tool="measure"><span class="tool-icon">📏</span> Measure</button>
    <button class="tool-btn${activeTool==='angle'?' active':''}"       data-tool="angle"><span class="tool-icon">📐</span> Angle</button>
    <button class="tool-btn${activeTool==='roi-rect'?' active':''}"    data-tool="roi-rect"><span class="tool-icon">⬜</span> ROI Rect</button>
    <button class="tool-btn${activeTool==='roi-ellipse'?' active':''}" data-tool="roi-ellipse"><span class="tool-icon">⭕</span> ROI Ellipse</button>
    <button class="tool-btn${activeTool==='annotate'?' active':''}"    data-tool="annotate"><span class="tool-icon">🏷</span> Annotate</button>
  </div>
  <div class="toolbar-group">
    <span class="toolbar-group-label">Transform</span>
    <button class="tool-btn" data-tool="rotate-cw"><span class="tool-icon">↻</span> Rotate CW</button>
    <button class="tool-btn" data-tool="rotate-ccw"><span class="tool-icon">↺</span> Rotate CCW</button>
    <button class="tool-btn" data-tool="flip-h"><span class="tool-icon">↔</span> Flip H</button>
    <button class="tool-btn" data-tool="flip-v"><span class="tool-icon">↕</span> Flip V</button>
    <button class="tool-btn" data-tool="invert"><span class="tool-icon">◑</span> Invert</button>
    <div class="tool-divider"></div>
    <button class="tool-btn t-danger" data-tool="reset"><span class="tool-icon">✕</span> Reset All</button>
    <button class="tool-btn t-save"   data-tool="save"><span class="tool-icon">📸</span> Save PNG</button>
  </div>`;

  let spec = '';
  if (mod === 'CT') {
    spec = `
    <div class="toolbar-group">
      <span class="toolbar-group-label">CT Tools</span>
      <button class="tool-btn${activeTool==='hu-probe'?' active':''}" data-tool="hu-probe"><span class="tool-icon">🔢</span> HU Probe</button>
      <button class="tool-btn${activeTool==='cobb'?' active':''}"     data-tool="cobb"><span class="tool-icon">🦴</span> Cobb Angle</button>
    </div>
    <div class="toolbar-group">
      <span class="toolbar-group-label">W / L</span>
      ${WL_PRESETS.map(p=>`<button class="preset-btn" data-wl-w="${p.w}" data-wl-l="${p.l}">${p.label}</button>`).join('')}
    </div>
    <div class="toolbar-group">
      <span class="toolbar-group-label">Manual</span>

function buildAndBindToolbar() {
  const tb = document.getElementById('toolbar-body');
  if (!tb || toolbarBound) return;
  tb.innerHTML = buildToolbarHTML(currentModality);
  toolbarBound = true;

  // Tool buttons — single listener on toolbar body
  tb.addEventListener('click', e => {
    const btn = e.target.closest('.tool-btn[data-tool]');
    if (!btn) return;
    const t = btn.dataset.tool;
    const isAction = ['rotate-cw','rotate-ccw','flip-h','flip-v','invert','reset','save','tic'].includes(t);
    if (isAction) { applyAction(t); return; }
    setActiveTool(t);
  });

  // Preset buttons
  tb.addEventListener('click', e => {
    const pb = e.target.closest('.preset-btn');
    if (!pb) return;
    if (pb.dataset.wlW) {
      const w = parseInt(pb.dataset.wlW), l = parseInt(pb.dataset.wlL);
      const slW = document.getElementById('sl-window'), slL = document.getElementById('sl-level');
      if (slW) { slW.value = w; document.getElementById('sv-window').textContent = w; }
      if (slL) { slL.value = l; document.getElementById('sv-level').textContent = l; }
      tb.querySelectorAll('.preset-btn[data-wl-w]').forEach(b => b.classList.toggle('active', b === pb));
      applyWL(w, l);
      return;
    }
    if (pb.dataset.colormap) {
      tb.querySelectorAll('.preset-btn[data-colormap]').forEach(b => b.classList.toggle('active', b === pb));
      statAll(`Colormap: ${pb.dataset.colormap}`); return;
    }
    if (pb.dataset.seqlabel) {
      const lbl = pb.dataset.seqlabel;
      const grp = pb.closest('.toolbar-group');
      grp?.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b === pb));
      // toggle label on/off for all panels
      const isNowActive = pb.classList.contains('active');
      Object.keys(panelStates).forEach(i => {
        const s = panelStates[parseInt(i)]; if (!s) return;
        s.annotations = s.annotations.filter(a => !(a.type === 'label' && a.data[2] === lbl));
        if (isNowActive) s.annotations.push({type:'label', data:[14, 16 + s.annotations.filter(a=>a.type==='label').length * 16, lbl]});
        drawAnno(parseInt(i));
      }); return;
    }
    if (pb.dataset.oarlabel) {
      const lbl = pb.dataset.oarlabel;
      activeContourLabel = lbl; activeContourColor = CTR_COLORS[lbl] || '#60d090';
      tb.querySelectorAll('.preset-btn[data-oarlabel]').forEach(b => b.classList.toggle('active', b === pb));
      setActiveTool('contour'); return;
    }
  });

  // Sliders
  function bindSlider(sid, vid, sfx, fn) {
    const sl = document.getElementById(sid), vl = document.getElementById(vid);
    if (!sl || !vl) return;
    sl.addEventListener('input', () => { vl.textContent = sl.value + sfx; fn(parseInt(sl.value)); });
  }
  bindSlider('sl-window',  'sv-window',  '',  () => applyWL(parseInt(document.getElementById('sl-window').value), parseInt(document.getElementById('sl-level').value)));
  bindSlider('sl-level',   'sv-level',   '',  () => applyWL(parseInt(document.getElementById('sl-window').value), parseInt(document.getElementById('sl-level').value)));
  bindSlider('sl-bright',  'sv-bright',  '%', v => applyBC(v, null));
  bindSlider('sl-contrast','sv-contrast','%', v => applyBC(null, v));
  bindSlider('sl-gain',    'sv-gain',    '%', v => applyBC(v, null));
  bindSlider('sl-petopa',  'sv-petopa',  '%', v => statAll(`PET/CT opacity: ${v}%`));
}

// ═══════════════════════════════════════════════════════════
// CANVAS ENGINE
// ═══════════════════════════════════════════════════════════
function initCanvasPanels() {
  document.querySelectorAll('.canvas-viewer').forEach(viewer => {
    const idx   = parseInt(viewer.dataset.panel);
    const bgC   = document.getElementById(`canvas-bg-${idx}`);
    const drC   = document.getElementById(`canvas-draw-${idx}`);
    if (!bgC || !drC) return;
    const sz = Math.round(viewer.getBoundingClientRect().width) || 320;
    const sh = Math.round(viewer.getBoundingClientRect().height) || sz;
    bgC.width  = drC.width  = sz;
    bgC.height = drC.height = sh;
    panelStates[idx] = {
      bgCtx: bgC.getContext('2d'), drCtx: drC.getContext('2d'),
      zoom:1, panX:0, panY:0, rotate:0, flipH:1, flipV:1,
      brightness:100, contrast:100, invert:false,
      annotations:[], points:[], contourPts:[],
      sz, sh, drawing:false, lastX:0, lastY:0, startX:0, startY:0,
    };
    drawBg(idx);
    bindCanvas(idx, viewer);
  });
  setActiveTool(activeTool);
}

// ── Draw background ───────────────────────────────────────
function drawBg(idx) {
  const s = panelStates[idx]; if (!s) return;
  const { bgCtx: ctx, sz, sh } = s;
  const theme = htmlEl.dataset.theme;

  ctx.clearRect(0, 0, sz, sh);
  ctx.save();
  ctx.translate(sz/2 + s.panX, sh/2 + s.panY);
  ctx.scale(s.zoom * s.flipH, s.zoom * s.flipV);
  ctx.rotate(s.rotate * Math.PI / 180);
  ctx.translate(-sz/2, -sh/2);

  // Background
  ctx.fillStyle = theme === 'dim' ? '#1a2030' : '#0b0f18';
  ctx.fillRect(0, 0, sz, sh);

  // Grid lines
  const gridCol = theme === 'dim' ? 'rgba(0,180,160,0.10)' : 'rgba(0,210,185,0.06)';
  ctx.strokeStyle = gridCol; ctx.lineWidth = 0.8;
  for (let x = 0; x < sz; x += sz/6) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, sh); ctx.stroke(); }
  for (let y = 0; y < sh; y += sh/6) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(sz, y); ctx.stroke(); }

  // Crosshair
  const xhCol = theme === 'dim' ? 'rgba(0,180,160,0.28)' : 'rgba(0,210,185,0.18)';
  ctx.strokeStyle = xhCol; ctx.lineWidth = 0.8; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(sz/2, 0); ctx.lineTo(sz/2, sh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, sh/2); ctx.lineTo(sz, sh/2); ctx.stroke();
  ctx.setLineDash([]);

  // Organ circle
  const r = Math.min(sz, sh) * 0.32;
  const cx = sz/2, cy = sh/2;
  const ringCol = theme === 'dim' ? 'rgba(0,180,160,0.55)' : 'rgba(0,210,185,0.32)';
  const fillCol = theme === 'dim' ? 'rgba(0,160,140,0.18)' : 'rgba(0,160,140,0.10)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = fillCol; ctx.fill();
  ctx.strokeStyle = ringCol; ctx.lineWidth = 1.5; ctx.stroke();

  // Inner ring
  ctx.beginPath(); ctx.arc(cx, cy, r*0.55, 0, Math.PI*2);
  ctx.strokeStyle = theme==='dim'?'rgba(0,180,160,0.25)':'rgba(0,210,185,0.12)'; ctx.lineWidth=0.8; ctx.stroke();

  // Labels
  const struct = STRUCTURES[currentStructure];
  const textCol = theme === 'dim' ? 'rgba(0,180,160,0.85)' : 'rgba(0,210,185,0.65)';
  ctx.fillStyle = textCol;
  ctx.font = `600 ${Math.min(sz,sh)*0.045}px IBM Plex Mono, monospace`;
  ctx.textAlign = 'center';
  ctx.fillText((struct?.name || '').toUpperCase(), cx, cy + r + Math.min(sz,sh)*0.075);

  // Modality label — top-left
  ctx.fillStyle = theme==='dim'?'rgba(0,180,160,0.70)':'rgba(0,210,185,0.50)';
  ctx.font = `700 ${Math.min(sz,sh)*0.042}px IBM Plex Mono, monospace`;
  ctx.textAlign = 'left';
  ctx.fillText(currentModality, sz*0.038, sh*0.075);

  ctx.restore();

  // Apply filters
  let filter = `brightness(${s.brightness}%) contrast(${s.contrast}%)`;
  if (s.invert) filter += ' invert(1)';
  bgC.style.filter = filter;
  function bgC() { return document.getElementById(`canvas-bg-${idx}`); }
  const el = document.getElementById(`canvas-bg-${idx}`);
  if (el) el.style.filter = filter;
}

// ── Draw annotations ──────────────────────────────────────
function drawAnno(idx) {
  const s = panelStates[idx]; if (!s) return;
  const { drCtx: ctx, sz, sh } = s;
  ctx.clearRect(0, 0, sz, sh);
  ctx.font = '500 11px IBM Plex Mono, monospace';

  const T = 'rgba(0,210,185,0.95)', Y = '#f0d060', P = '#f06080', G = '#60d090';

  s.annotations.forEach(a => {
    ctx.setLineDash([]); ctx.lineWidth = 1.5;
    if (a.type === 'measure') {
      const [x1,y1,x2,y2] = a.data;
      const d = Math.round(Math.sqrt((x2-x1)**2+(y2-y1)**2)*0.35);
      ctx.strokeStyle = T; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.fillStyle = Y; ctx.fillText(`${d}mm*`, (x1+x2)/2+4, (y1+y2)/2-5);
    } else if (a.type === 'angle') {
      const [x1,y1,x2,y2,x3,y3] = a.data;
      let deg = Math.abs((Math.atan2(y3-y2,x3-x2)-Math.atan2(y1-y2,x1-x2))*180/Math.PI);
      if (deg > 180) deg = 360-deg;
      ctx.strokeStyle = P; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.stroke();
      ctx.fillStyle = P; ctx.fillText(`${deg.toFixed(1)}°`, x2+5, y2-5);
    } else if (a.type === 'roi-rect' || a.type === 'field-size' || a.type === 'roi-counts') {
      const [x,y,w,h] = a.data;
      ctx.strokeStyle = G; ctx.setLineDash([4,3]); ctx.strokeRect(x,y,w,h); ctx.setLineDash([]);
      const area = Math.round(Math.abs(w*h)*0.12);
      ctx.fillStyle = G; ctx.fillText(`${area}mm²*`, x+3, y-4);
    } else if (a.type === 'roi-ellipse' || a.type === 'follicle' || a.type === 'suv-roi') {
      const [cx,cy,rx,ry] = a.data;
      ctx.strokeStyle = G; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.ellipse(cx,cy,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      const A=Math.round(Math.abs(rx)*0.6), B=Math.round(Math.abs(ry)*0.6);
      ctx.fillStyle = G; ctx.fillText(`A:${A} B:${B}mm*`, cx+Math.abs(rx)+4, cy);
    } else if (a.type === 'hu-probe' || a.type === 'suv-probe') {
      const [x,y,,lbl] = a.data;
      ctx.fillStyle = Y; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
      ctx.fillText(lbl, x+8, y-5);
    } else if (a.type === 'mtv') {
      const [x,y,w,h] = a.data;
      ctx.strokeStyle = '#ff6060'; ctx.lineWidth = 2; ctx.setLineDash([3,3]); ctx.strokeRect(x,y,w,h); ctx.setLineDash([]);
      ctx.fillStyle = '#ff6060'; ctx.fillText(`MTV≈${Math.round(Math.abs(w*h)*0.08)}cm³*`, x+3, y-4);
    } else if (a.type === 'h-line') {
      ctx.strokeStyle = Y; ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.moveTo(0,a.data[0]); ctx.lineTo(sz,a.data[0]); ctx.stroke(); ctx.setLineDash([]);
    } else if (a.type === 'depth') {
      for (let i=0; i<=10; i++) {
        const dy = sh*i/10;
        ctx.strokeStyle = i%5===0?'rgba(0,210,185,0.8)':'rgba(0,210,185,0.35)';
        ctx.lineWidth = i%5===0?1.5:0.8;
        ctx.beginPath(); ctx.moveTo(a.data[0],dy); ctx.lineTo(a.data[0]+(i%5===0?14:7),dy); ctx.stroke();
        if (i%5===0){ ctx.fillStyle=T; ctx.font='500 10px IBM Plex Mono,monospace'; ctx.fillText(`${i}cm*`,a.data[0]+16,dy+4); }
      } ctx.lineWidth=1.5;
    } else if (a.type === 'isodose') {
      const [cx,cy] = a.data;
      [{r:28,pct:'100%',c:'#ff4040'},{r:52,pct:'80%',c:'#ff8c00'},{r:72,pct:'50%',c:'#ffd700'},{r:94,pct:'20%',c:'#40c0ff'}].forEach(lv=>{
        ctx.strokeStyle=lv.c; ctx.lineWidth=1.8; ctx.setLineDash([5,3]);
        ctx.beginPath(); ctx.arc(cx,cy,lv.r,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle=lv.c; ctx.fillText(lv.pct, cx+lv.r+4, cy);
      }); ctx.lineWidth=1.5;
    } else if (a.type === 'contour') {
      const [pts,lbl,col] = a.data; if (pts.length<2) return;
      ctx.strokeStyle=col; ctx.lineWidth=2.2;
      ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]); pts.forEach(p=>ctx.lineTo(p[0],p[1])); ctx.closePath(); ctx.stroke();
      ctx.fillStyle=col+'28'; ctx.fill();
      ctx.fillStyle=col; ctx.fillText(lbl, pts[0][0]+4, pts[0][1]-6);
    } else if (a.type === 'ssd') {
      const [x1,y1,x2,y2] = a.data;
      ctx.strokeStyle = '#60d0ff'; ctx.setLineDash([5,3]);
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.setLineDash([]);
      const d = Math.round(Math.sqrt((x2-x1)**2+(y2-y1)**2)*0.35);
      ctx.fillStyle='#60d0ff'; ctx.fillText(`SSD≈${d}mm*`,(x1+x2)/2+4,(y1+y2)/2-4);
    } else if (a.type === 'annotate') {
      const [x,y,text] = a.data;
      ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(x-2,y-14,ctx.measureText(text).width+8,18);
      ctx.fillStyle=T; ctx.fillText(text,x+2,y);
    }
  });

  // Update overlay
  const ol = document.getElementById(`measure-overlay-${idx}`);
  if (ol) {
    const measTags = s.annotations.filter(a=>['measure','roi-rect','roi-ellipse','hu-probe','suv-probe','mtv','follicle','ssd'].includes(a.type)).slice(-4).map(a=>{
      if(a.type==='measure'||a.type==='ssd'){const d=Math.round(Math.sqrt((a.data[2]-a.data[0])**2+(a.data[3]-a.data[1])**2)*0.35);return`<span class="measure-tag">${a.type==='ssd'?'↕':'📏'} ${d}mm*</span>`;}
      if(a.type==='roi-rect'||a.type==='field-size'||a.type==='roi-counts')return`<span class="measure-tag">⬜ ${Math.round(Math.abs(a.data[2]*a.data[3])*0.12)}mm²*</span>`;
      if(a.type==='roi-ellipse'||a.type==='follicle'||a.type==='suv-roi')return`<span class="measure-tag">⭕ A:${Math.round(Math.abs(a.data[2])*0.6)} B:${Math.round(Math.abs(a.data[3])*0.6)}mm*</span>`;
      if(a.type==='hu-probe')return`<span class="measure-tag">🔢 ${a.data[3]}</span>`;
      if(a.type==='suv-probe')return`<span class="measure-tag">☢ SUV:${a.data[3]}</span>`;
      if(a.type==='mtv')return`<span class="measure-tag">🧬 MTV≈${Math.round(Math.abs(a.data[2]*a.data[3])*0.08)}cm³*</span>`;
      return'';
    });
    const lblTags = s.annotations.filter(a=>a.type==='label').map(a=>`<span class="measure-tag label-tag">🏷 ${a.data[2]}</span>`);
    ol.innerHTML = [...measTags,...lblTags].join('');
  }
}

// ── Canvas events ─────────────────────────────────────────
function bindCanvas(idx, viewer) {
  const s = panelStates[idx];
  function pos(e) {
    const r=viewer.getBoundingClientRect();
    const scX=s.sz/r.width, scY=s.sh/r.height;
    return [(e.clientX-r.left)*scX, (e.clientY-r.top)*scY];
  }

  viewer.addEventListener('wheel', e => {
    e.preventDefault();
    s.zoom = Math.max(0.4, Math.min(10, s.zoom*(e.deltaY>0?0.9:1.1)));
    drawBg(idx); statOne(idx);
  }, {passive:false});

  viewer.addEventListener('pointerdown', e => {
    viewer.setPointerCapture(e.pointerId);
    const [x,y] = pos(e);
    s.drawing=true; s.startX=x; s.startY=y; s.lastX=e.clientX; s.lastY=e.clientY;
    const t = activeTool;

    if (t==='angle') {
      s.points.push([x,y]);
      if (s.points.length===3) { s.annotations.push({type:'angle',data:[...s.points[0],...s.points[1],...s.points[2]]}); s.points=[]; drawAnno(idx); }
      else statOne(idx, `Angle: click point ${s.points.length}/3`);
      s.drawing=false; return;
    }
    if (t==='hu-probe') { const hu=Math.round(Math.random()*350-80); s.annotations.push({type:'hu-probe',data:[x,y,null,`HU:${hu}*`]}); drawAnno(idx); s.drawing=false; return; }
    if (t==='suv-probe') { const sv=(Math.random()*12+0.5).toFixed(1); s.annotations.push({type:'suv-probe',data:[x,y,null,sv]}); drawAnno(idx); s.drawing=false; return; }
    if (t==='h-line') { s.annotations.push({type:'h-line',data:[y]}); drawAnno(idx); s.drawing=false; return; }
    if (t==='depth') { s.annotations.push({type:'depth',data:[x]}); drawAnno(idx); s.drawing=false; return; }
    if (t==='isodose') { s.annotations.push({type:'isodose',data:[x,y]}); drawAnno(idx); s.drawing=false; return; }
    if (t==='annotate') { const tx=prompt('Annotation:'); if(tx){ s.annotations.push({type:'annotate',data:[x,y,tx]}); drawAnno(idx); } s.drawing=false; return; }
    if (t==='contour') { s.contourPts=[[x,y]]; }
  });

  viewer.addEventListener('pointermove', e => {
    if (!s.drawing) return;
    const [x,y]=pos(e), t=activeTool;
    if (t==='pan') {
      s.panX+=e.clientX-s.lastX; s.panY+=e.clientY-s.lastY;
      s.lastX=e.clientX; s.lastY=e.clientY; drawBg(idx); return;
    }
    if (t==='contour') {
      s.contourPts.push([x,y]);
      drawAnno(idx);
      const ctx=s.drCtx;
      ctx.strokeStyle=activeContourColor; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(s.contourPts[0][0],s.contourPts[0][1]);
      s.contourPts.forEach(p=>ctx.lineTo(p[0],p[1])); ctx.stroke();
      return;
    }
    // preview
    const ctx=s.drCtx, w=x-s.startX, h=y-s.startY;
    drawAnno(idx);
    ctx.strokeStyle='rgba(0,210,185,0.75)'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
    if (['roi-ellipse','follicle','suv-roi'].includes(t)) {
      ctx.beginPath(); ctx.ellipse(s.startX+w/2,s.startY+h/2,Math.abs(w/2),Math.abs(h/2),0,0,Math.PI*2); ctx.stroke();
    } else if (t==='ssd') {
      ctx.beginPath(); ctx.moveTo(s.startX,s.startY); ctx.lineTo(x,y); ctx.stroke();
    } else {
      ctx.strokeRect(s.startX,s.startY,w,h);
    }
    ctx.setLineDash([]);
  });

  viewer.addEventListener('pointerup', e => {
    if (!s.drawing) return; s.drawing=false;
    const [x,y]=pos(e), t=activeTool, w=x-s.startX, h=y-s.startY;

    if (t==='contour') { if(s.contourPts.length>3){ s.annotations.push({type:'contour',data:[s.contourPts,activeContourLabel,activeContourColor]}); } s.contourPts=[]; drawAnno(idx); return; }
    if (t==='pan') return;

    const minSz = 8;
    if (['measure','ssd'].includes(t) && (Math.abs(w)>minSz||Math.abs(h)>minSz)) {
      s.annotations.push({type:t,data:[s.startX,s.startY,x,y]});
    } else if (['roi-rect','field-size','roi-counts'].includes(t) && Math.abs(w)>minSz && Math.abs(h)>minSz) {
      s.annotations.push({type:'roi-rect',data:[s.startX,s.startY,w,h]});
    } else if (t==='mtv' && Math.abs(w)>minSz && Math.abs(h)>minSz) {
      s.annotations.push({type:'mtv',data:[s.startX,s.startY,w,h]});
    } else if (['roi-ellipse','follicle','suv-roi'].includes(t) && Math.abs(w)>minSz && Math.abs(h)>minSz) {
      s.annotations.push({type:'roi-ellipse',data:[s.startX+w/2,s.startY+h/2,w/2,h/2]});
    } else if (t==='roi-signal' && Math.abs(w)>minSz && Math.abs(h)>minSz) {
      const sig=Math.round(Math.random()*500+80);
      s.annotations.push({type:'roi-rect',data:[s.startX,s.startY,w,h]});
      s.annotations.push({type:'annotate',data:[s.startX,s.startY+h+14,`SI≈${sig}*`]});
    } else if (t==='ctr' && Math.abs(w)>minSz) {
      const ctr=(Math.abs(w)/s.sz*1.85).toFixed(2);
      s.annotations.push({type:'ssd',data:[s.startX,s.startY,x,y]});
      s.annotations.push({type:'annotate',data:[s.startX,s.startY-10,`CTR≈${ctr}*`]});
    }
    drawAnno(idx); statOne(idx);
  });

  // Double-click → expand
  viewer.addEventListener('dblclick', () => {
    viewMode = 'expand';
    document.querySelectorAll('.view-btn[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view==='expand'));
    refreshViewer();
  });
}

// ── Apply actions ─────────────────────────────────────────
function applyAction(t) {
  Object.keys(panelStates).forEach(i => {
    const s=panelStates[parseInt(i)]; if(!s) return;
    if(t==='rotate-cw')  s.rotate=(s.rotate+90)%360;
    if(t==='rotate-ccw') s.rotate=(s.rotate-90+360)%360;
    if(t==='flip-h')     s.flipH*=-1;
    if(t==='flip-v')     s.flipV*=-1;
    if(t==='invert')     s.invert=!s.invert;
    if(t==='reset')      { Object.assign(s,{zoom:1,panX:0,panY:0,rotate:0,flipH:1,flipV:1,brightness:100,contrast:100,invert:false,annotations:[],points:[]}); drawAnno(parseInt(i)); }
    if(t==='save')       savePNG(parseInt(i));
    drawBg(parseInt(i));
  });
  if(t==='tic') statAll('TIC: requires dynamic contrast series (DICOM)');
}

function savePNG(idx) {
  const s=panelStates[idx]; if(!s) return;
  const m=document.createElement('canvas'); m.width=s.sz; m.height=s.sh;
  const ctx=m.getContext('2d');
  ctx.drawImage(s.bgCtx.canvas,0,0); ctx.drawImage(s.drCtx.canvas,0,0);
  ctx.fillStyle='rgba(0,200,180,0.55)'; ctx.font='10px IBM Plex Mono,monospace';
  ctx.fillText('OmniRad — Educational Only',5,s.sh-6);
  const a=document.createElement('a'); a.download=`omnirad-${currentStructure}-${currentModality}-p${idx}.png`; a.href=m.toDataURL(); a.click();
}

// ── Set active tool ───────────────────────────────────────
function setActiveTool(t) {
  activeTool=t;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
  const cursors={pan:'grab',measure:'crosshair',angle:'crosshair','roi-rect':'crosshair','roi-ellipse':'crosshair',annotate:'text','hu-probe':'cell','suv-probe':'cell','roi-signal':'crosshair',isodose:'copy',contour:'cell','h-line':'row-resize',depth:'col-resize',ctr:'crosshair','field-size':'crosshair',ssd:'ns-resize',mtv:'crosshair','suv-roi':'crosshair',follicle:'crosshair','roi-counts':'crosshair','cobb':'crosshair'};
  const cur=cursors[t]||'crosshair';
  document.querySelectorAll('.canvas-viewer').forEach(v=>v.style.cursor=cur);
  statAll(`Tool: ${t}`);
}

// ── Filters ───────────────────────────────────────────────
function applyWL(w, l) {
  // Correct W/L → brightness/contrast mapping
  // brightness: level shift — center at 100%, l=40 → 100% (normal), higher l → brighter
  // contrast: window width — wider window → lower contrast
  const bright = Math.min(200, Math.max(50, 100 + (l / 5)));
  const cont   = Math.min(300, Math.max(50, 100 + Math.round((500 - Math.min(w, 500)) / 5)));
  Object.keys(panelStates).forEach(i=>{ const s=panelStates[parseInt(i)]; if(!s)return; s.brightness=bright; s.contrast=cont; drawBg(parseInt(i)); statOne(parseInt(i),`W:${w} L:${l}`); });
}

function applyBC(b, c) {
  Object.keys(panelStates).forEach(i=>{ const s=panelStates[parseInt(i)]; if(!s)return; if(b!==null)s.brightness=b; if(c!==null)s.contrast=c; drawBg(parseInt(i)); });
}

// ── Status helpers ────────────────────────────────────────
function statOne(idx, msg) { const el=document.getElementById(`tool-status-${idx}`); if(el) el.textContent=msg||`${activeTool} | ×${panelStates[idx]?.zoom?.toFixed(1)}`; }
function statAll(msg) { Object.keys(panelStates).forEach(i=>statOne(parseInt(i),msg)); }

// ═══════════════════════════════════════════════════════════
// SIDEBAR NAV
// ═══════════════════════════════════════════════════════════
document.getElementById('structure-list').addEventListener('click', e => {
  const item=e.target.closest('.structure-item'); if(!item)return;
  const id=item.dataset.id; if(id===currentStructure)return;
  currentStructure=id; currentModality='CT'; currentPlane='Axial';
  document.querySelectorAll('.structure-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.id===id);
    el.setAttribute('aria-pressed',el.dataset.id===id);
  });
  render(id);
});
document.getElementById('structure-list').addEventListener('keydown', e => {
  if(e.key==='Enter'||e.key===' '){ e.preventDefault(); e.target.closest('.structure-item')?.click(); }
});

// ESC → normal view
document.addEventListener('keydown', e => {
  if (e.key==='Escape' && viewMode!=='normal') {
    viewMode='normal';
    document.querySelectorAll('.view-btn[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view==='normal'));
    refreshViewer();
  }
});

// ─── INIT ─────────────────────────────────────────────────
render('liver', false);
</script>
</body>
