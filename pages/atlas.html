<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Smart Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══════════════════════════════════════════════ */
:root { --z-sticky:200; --z-fs:900; }
[data-theme="dark"] {
  --bg:       #0d1117; --bg-s:  #161b22; --bg-r:  #1c2128;
  --bg-o:     #21262d; --bdr:   #30363d; --bdr-s: #21262d;
  --tx:       #e6edf3; --tx2:   #8b949e; --tx3:   #484f58;
  --teal:     #39d0b8; --teal2: #2ab5a0; --teal3: #1a7a6e;
  --teal-g:   rgba(57,208,184,.18); --teal-s: rgba(57,208,184,.08);
  --cvs-bg:   #0b0f18; --cvs-r: rgba(57,208,184,.30);
  --cvs-f:    rgba(30,130,115,.10); --cvs-t: rgba(57,208,184,.65);
  --cvs-grid: rgba(57,208,184,.06);
}
[data-theme="dim"] {
  --bg:       #d4d9e0; --bg-s:  #dde1e8; --bg-r:  #e3e7ed;
  --bg-o:     #eaedf2; --bdr:   #b0b8c4; --bdr-s: #c4cad4;
  --tx:       #1c2128; --tx2:   #444c56; --tx3:   #656d76;
  --teal:     #0d6e61; --teal2: #0a5a50; --teal3: #084840;
  --teal-g:   rgba(13,110,97,.18); --teal-s: rgba(13,110,97,.08);
  --cvs-bg:   #182030; --cvs-r: rgba(30,160,140,.60);
  --cvs-f:    rgba(20,120,105,.20); --cvs-t: rgba(30,160,140,.90);
  --cvs-grid: rgba(30,160,140,.10);
}

/* ═══ RESET ════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.6;transition:background .25s,color .25s}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ═══ TOPBAR ════════════════════════════════════════════════ */
.topbar{position:sticky;top:0;z-index:var(--z-sticky);background:var(--bg-s);border-bottom:1px solid var(--bdr-s);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:56px;gap:1rem}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--tx);font-weight:600;font-size:1.05rem;flex-shrink:0}
.logo-mark{width:30px;height:30px;background:var(--teal);border-radius:5px;display:grid;place-items:center;font-weight:700;font-size:.78rem;color:#0d1117;letter-spacing:-.02em;flex-shrink:0}
.logo-text{font-weight:600;font-size:1rem;letter-spacing:-.02em}
.logo-text span{color:var(--teal)}
.breadcrumb{font-size:.8rem;color:var(--tx3);display:flex;align-items:center;gap:.4rem}
.breadcrumb span{color:var(--tx2)}
.theme-btn{display:flex;align-items:center;gap:.4rem;padding:.3rem .75rem;border-radius:99px;border:1px solid var(--bdr);background:var(--bg-r);color:var(--tx2);font-size:.78rem;font-weight:500;transition:all .15s}
.theme-btn:hover{border-color:var(--teal2);color:var(--teal)}

/* ═══ LAYOUT ════════════════════════════════════════════════ */
.page{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 56px)}

/* ═══ SIDEBAR ═══════════════════════════════════════════════ */
.sidebar{border-right:1px solid var(--bdr-s);background:var(--bg-s);padding:1.5rem 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-label{font-size:.67rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);padding:0 1.25rem .6rem}
.sb-list{list-style:none}
.sb-item{display:flex;align-items:center;gap:.65rem;padding:.55rem 1.25rem;cursor:pointer;font-size:.88rem;color:var(--tx2);transition:background .12s,color .12s;border-left:2px solid transparent}
.sb-item:hover{background:var(--bg-r);color:var(--tx)}
.sb-item.active{background:var(--teal-s);color:var(--teal);border-left-color:var(--teal);font-weight:500}
.sb-icon{width:28px;height:28px;border-radius:6px;background:var(--bg-o);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.sb-item.active .sb-icon{background:var(--teal-g)}
.sb-name{flex:1}.sb-ar{font-size:.72rem;color:var(--tx3);direction:rtl}

/* ═══ MAIN ══════════════════════════════════════════════════ */
.main{padding:2rem 2.5rem;transition:opacity .18s}
.main.fading{opacity:0}

/* ═══ STRUCTURE HEADER ══════════════════════════════════════ */
.s-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:2rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--bdr-s)}
.s-eyebrow{font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);margin-bottom:.35rem}
.s-name{font-size:2rem;font-weight:600;letter-spacing:-.02em;line-height:1.2}
.s-ar{font-size:1.1rem;color:var(--tx3);margin-top:.2rem;direction:rtl}
.s-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.8rem}
.tag{font-size:.72rem;padding:.2rem .6rem;border-radius:99px;border:1px solid var(--bdr);color:var(--tx2);background:var(--bg-r);font-family:'IBM Plex Mono',monospace}
.tag.sys{border-color:var(--teal3);color:var(--teal);background:var(--teal-s)}
.s-meta{display:flex;flex-direction:column;gap:.5rem;min-width:175px;flex-shrink:0}
.meta-card{background:var(--bg-r);border:1px solid var(--bdr-s);border-radius:8px;padding:.55rem .9rem}
.meta-lbl{font-size:.64rem;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin-bottom:.12rem}
.meta-val{font-size:.85rem;font-weight:500}

/* ═══ INFO CARDS ════════════════════════════════════════════ */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.75rem}
.info-card{background:var(--bg-s);border:1px solid var(--bdr-s);border-radius:10px;padding:1rem 1.1rem}
.info-lbl{font-size:.67rem;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);font-weight:600;margin-bottom:.35rem}
.info-txt{font-size:.84rem;color:var(--tx2);line-height:1.55}

/* ═══ VIEWER SECTION ════════════════════════════════════════ */
.viewer-wrap{background:var(--bg-s);border:1.5px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.viewer-hdr{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.1rem;border-bottom:1px solid var(--bdr-s);background:var(--bg-r)}
.viewer-title{font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3)}
.viewer-body{padding:.9rem 1.1rem}

/* ═══ MODALITY SELECTOR ═════════════════════════════════════ */
.mod-row{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem}
.mod-lbl{font-size:.74rem;color:var(--tx3);font-weight:500;margin-right:.2rem;white-space:nowrap}
.mod-btn{padding:.3rem .78rem;border-radius:6px;border:1px solid var(--bdr);background:var(--bg-r);color:var(--tx2);font-size:.77rem;font-weight:500;font-family:'IBM Plex Mono',monospace;transition:all .12s}
.mod-btn:hover:not(:disabled){border-color:var(--teal2);color:var(--tx)}
.mod-btn.active{background:var(--teal-g);border-color:var(--teal);color:var(--teal);box-shadow:0 0 0 1px var(--teal3)}
.mod-btn:disabled{opacity:.28;cursor:not-allowed}

/* ═══ VIEW MODE BUTTONS ═════════════════════════════════════ */
.view-row{display:flex;align-items:center;gap:.28rem}
.vbtn{display:flex;align-items:center;gap:.28rem;padding:.26rem .58rem;border-radius:5px;border:1px solid var(--bdr);background:var(--bg-o);color:var(--tx3);font-size:.69rem;font-weight:500;transition:all .12s;white-space:nowrap}
.vbtn:hover{border-color:var(--teal2);color:var(--teal)}
.vbtn.active{background:var(--teal-g);border-color:var(--teal);color:var(--teal)}

/* ═══ IMAGE GRID ════════════════════════════════════════════ */
.img-grid{display:grid;gap:.75rem;transition:grid-template-columns .2s}
.img-grid.g3{grid-template-columns:repeat(3,1fr)}
.img-grid.g2{grid-template-columns:repeat(2,1fr)}
.img-grid.g1{grid-template-columns:1fr}
.img-grid.split{grid-template-columns:1fr 1fr}
/* Split mode: two independent column wrappers */
.img-grid-split-wrap{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.split-col{display:flex;flex-direction:column;gap:.75rem;min-width:0}

/* ═══ PANEL ═════════════════════════════════════════════════ */
.panel{background:var(--cvs-bg);border:1.5px solid var(--bdr);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s}
.panel:hover{border-color:var(--teal3)}
.panel.panel-active{border-color:var(--teal)!important;box-shadow:0 0 0 2px var(--teal-g)}
.panel-active-badge{position:absolute;top:.38rem;left:.38rem;z-index:6;background:var(--teal);color:#060a12;font:.6rem/1 'IBM Plex Mono',monospace;font-weight:700;padding:.15rem .38rem;border-radius:3px;pointer-events:none;letter-spacing:.04em}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:.45rem .8rem;border-bottom:1px solid var(--bdr-s);background:var(--bg-s);flex-shrink:0}
.panel-lbl{font-size:.72rem;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--tx2)}
.panel-right{display:flex;align-items:center;gap:.35rem}
.mod-badge{font-size:.62rem;padding:.12rem .42rem;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-weight:600}
.xbtn{padding:.13rem .3rem;border-radius:4px;border:1px solid var(--bdr-s);background:var(--bg-o);color:var(--tx3);font-size:.62rem;cursor:pointer;transition:all .1s;line-height:1}
.xbtn:hover{border-color:var(--teal);color:var(--teal)}

/* badge colors */
.b-ct   {background:rgba(200,140,60,.25);color:#e8a44a;border:1px solid rgba(200,140,60,.35)}
.b-mri  {background:rgba(100,80,200,.25);color:#a090e8;border:1px solid rgba(100,80,200,.35)}
.b-us   {background:rgba(60,180,130,.25);color:#50c896;border:1px solid rgba(60,180,130,.35)}
.b-nm   {background:rgba(180,60,180,.25);color:#d080d0;border:1px solid rgba(180,60,180,.35)}
.b-pet  {background:rgba(220,100,60,.25);color:#e88060;border:1px solid rgba(220,100,60,.35)}
.b-rt   {background:rgba(220,60,60,.25); color:#e87070;border:1px solid rgba(220,60,60,.35)}
.b-angio{background:rgba(60,120,200,.25);color:#60a0e8;border:1px solid rgba(60,120,200,.35)}
.b-xray {background:rgba(140,140,160,.25);color:#b0b0c8;border:1px solid rgba(140,140,160,.35)}
.b-mammo{background:rgba(200,60,140,.25);color:#e070b8;border:1px solid rgba(200,60,140,.35)}

/* ═══ CANVAS VIEWER ═════════════════════════════════════════ */
.cvs-wrap{position:relative;width:100%;overflow:hidden;background:var(--cvs-bg);flex:1;min-height:300px;cursor:crosshair}
/* Normal mode canvas sizes */
.img-grid.g1 .cvs-wrap{aspect-ratio:16/9;min-height:420px}
.img-grid.g2 .cvs-wrap{aspect-ratio:4/3;min-height:340px}
.img-grid.g3 .cvs-wrap{aspect-ratio:1/1;min-height:280px}
/* Split mode */
.split-col .cvs-wrap{aspect-ratio:4/3;min-height:320px}
.split-col .img-grid.g2 .cvs-wrap{aspect-ratio:4/3;min-height:280px}
.split-col .img-grid.g3 .cvs-wrap{aspect-ratio:1/1;min-height:220px}
.cvs-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}
.cvs-bg{z-index:1}.cvs-dr{z-index:2;pointer-events:none}
.cvs-stat{position:absolute;top:.4rem;right:.4rem;z-index:5;background:rgba(0,0,0,.75);color:var(--teal);font:500 .6rem 'IBM Plex Mono',monospace;padding:.18rem .42rem;border-radius:4px;pointer-events:none;border:1px solid rgba(57,208,184,.22)}
.cvs-ol{position:absolute;bottom:.4rem;left:.4rem;right:.4rem;z-index:5;display:flex;flex-wrap:wrap;gap:.25rem;pointer-events:none}
.mtag{background:rgba(0,0,0,.78);color:var(--teal);font:.6rem 'IBM Plex Mono',monospace;padding:.17rem .38rem;border-radius:3px;border:1px solid rgba(57,208,184,.28);backdrop-filter:blur(4px)}
.mtag.lbl{color:#f0d060;border-color:rgba(240,208,96,.32)}

/* ═══ VIEWER NOTE ═══════════════════════════════════════════ */
.vnote{font-size:.72rem;color:var(--tx3);font-style:italic;font-family:'IBM Plex Mono',monospace;padding:.5rem 0 .1rem;grid-column:1/-1}

/* ═══ SPLIT MOD ROW ═════════════════════════════════════════ */
.split-row{display:flex;align-items:center;gap:.45rem;padding:.45rem 0 .75rem;flex-wrap:wrap}
.split-lbl{font-size:.67rem;color:var(--tx3);font-weight:500;white-space:nowrap}
.smod-btn{padding:.2rem .52rem;border-radius:5px;border:1px solid var(--bdr-s);background:var(--bg-o);color:var(--tx3);font-size:.67rem;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .1s}
.smod-btn:hover:not(:disabled){border-color:var(--teal2);color:var(--teal)}
.smod-btn.active{background:var(--teal-s);border-color:var(--teal2);color:var(--teal)}
.smod-btn:disabled{opacity:.22;cursor:not-allowed}

/* ═══ PLANE TOGGLES ══════════════════════════════════════════ */
.plane-row{display:flex;align-items:center;gap:.35rem;margin-bottom:.75rem;flex-wrap:wrap}
.plane-lbl{font-size:.7rem;color:var(--tx3);font-weight:500;white-space:nowrap;margin-right:.15rem}
.plane-btn{display:flex;align-items:center;gap:.28rem;padding:.26rem .62rem;border-radius:6px;border:1px solid var(--bdr);background:var(--bg-r);color:var(--tx3);font-size:.72rem;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .12s;user-select:none}
.plane-btn::before{content:'○';font-size:.65rem;margin-right:.15rem;opacity:.5}
.plane-btn.on{background:var(--teal-s);border-color:var(--teal2);color:var(--teal);font-weight:500}
.plane-btn.on::before{content:'●';opacity:1}
.plane-btn:hover{border-color:var(--teal3);color:var(--teal)}
.split-plane-rows{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem}
.split-plane-rows .plane-row{margin-bottom:0;background:var(--bg-r);border:1px solid var(--bdr-s);border-radius:8px;padding:.35rem .65rem}

/* ═══ TOOLS SECTION ═════════════════════════════════════════ */
.tools-wrap{background:var(--bg-s);border:1.5px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:2rem}
.tools-hdr{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-bottom:1px solid var(--bdr-s);background:var(--bg-r)}
.tools-title{font-size:.69rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);display:flex;align-items:center;gap:.45rem}
.tools-disc{font-size:.64rem;color:var(--tx3);font-style:italic;font-family:'IBM Plex Mono',monospace}
.tb-body{padding:.65rem 1rem;display:flex;flex-direction:column;gap:.5rem}
.tb-row{display:flex;align-items:center;gap:.28rem;flex-wrap:wrap}
.tb-lbl{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);min-width:60px;flex-shrink:0}
.tdiv{width:1px;height:20px;background:var(--bdr);margin:0 .1rem;flex-shrink:0}

/* ═══ TOOL BUTTONS ══════════════════════════════════════════ */
.tbtn{position:relative;display:flex;align-items:center;gap:.27rem;padding:.28rem .55rem;border-radius:6px;border:1px solid var(--bdr);background:var(--bg-r);color:var(--tx2);font-size:.7rem;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none}
.tbtn:hover{border-color:var(--teal2);color:var(--tx);background:var(--bg-o)}
.tbtn.active{background:var(--teal-g);border-color:var(--teal);color:var(--teal);box-shadow:0 0 0 1px var(--teal3)}
.tbtn.danger{border-color:rgba(220,80,80,.4);color:#d06060}
.tbtn.danger:hover{border-color:#e07070;background:rgba(220,80,80,.1);color:#e07070}
.tbtn.save{border-color:rgba(60,180,130,.4);color:#40b890}
.tbtn.save:hover{border-color:#50c896;background:rgba(60,180,130,.1);color:#50c896}

/* Tooltip */
.tbtn::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%) translateY(3px);background:#0d1117;color:#c8d0da;font-size:.6rem;font-family:'IBM Plex Mono',monospace;white-space:nowrap;padding:.2rem .52rem;border-radius:5px;border:1px solid #30363d;box-shadow:0 4px 12px rgba(0,0,0,.5);pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;z-index:50}
.tbtn:hover::after{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ PRESETS & SLIDERS ═════════════════════════════════════ */
.pbtn{padding:.22rem .5rem;border-radius:5px;border:1px solid var(--bdr-s);background:var(--bg-o);color:var(--tx3);font-size:.65rem;font-family:'IBM Plex Mono',monospace;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
.pbtn:hover{border-color:var(--teal3);color:var(--teal)}
.pbtn.active{background:var(--teal-s);border-color:var(--teal2);color:var(--teal)}
.sl-row{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap}
.sl-item{display:flex;align-items:center;gap:.38rem}
.sl-lbl{font-size:.64rem;color:var(--tx3);font-family:'IBM Plex Mono',monospace;white-space:nowrap;min-width:56px}
.sl-val{font-size:.64rem;color:var(--teal);font-family:'IBM Plex Mono',monospace;min-width:36px;text-align:right}
input[type=range].tsl{-webkit-appearance:none;width:88px;height:3px;border-radius:2px;background:var(--bdr);outline:none;cursor:pointer}
input[type=range].tsl::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--teal);cursor:pointer;transition:transform .1s}
input[type=range].tsl::-webkit-slider-thumb:hover{transform:scale(1.25)}

/* ═══ CROSS REFS ════════════════════════════════════════════ */
.xref-sec{margin-bottom:2rem}
.sec-title{font-size:.77rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--tx3);margin-bottom:.7rem}
.xref-grid{display:flex;flex-wrap:wrap;gap:.45rem}
.xref-btn{display:flex;align-items:center;gap:.38rem;padding:.38rem .85rem;border-radius:8px;border:1px solid var(--bdr);background:var(--bg-s);color:var(--tx2);font-size:.81rem;transition:all .12s;cursor:pointer}
.xref-btn:hover{border-color:var(--teal2);color:var(--teal);background:var(--teal-s)}
.xarr{font-size:.74rem;opacity:.5}

/* ═══ STATUS BAR ════════════════════════════════════════════ */
.sbar{display:flex;align-items:center;gap:1rem;padding:.6rem 1rem;background:var(--bg-r);border:1px solid var(--bdr-s);border-radius:8px;margin-bottom:1.5rem;font-size:.75rem;color:var(--tx3)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}

/* ═══ RT WARNING ════════════════════════════════════════════ */
.rt-warn{background:rgba(220,80,80,.08);border:1px solid rgba(220,80,80,.25);border-radius:6px;padding:.35rem .7rem;font-size:.64rem;color:#c06060;font-family:'IBM Plex Mono',monospace}

/* ═══ FULLSCREEN OVERLAY ════════════════════════════════════ */
.fs-ov{display:none;position:fixed;inset:0;z-index:var(--z-fs);background:#060a12;flex-direction:column}
.fs-ov.open{display:flex}
.fs-top{display:flex;align-items:center;justify-content:space-between;padding:.52rem 1rem;background:#0d1117;border-bottom:1px solid #21262d;flex-shrink:0;gap:.75rem}
.fs-left{display:flex;align-items:center;gap:.6rem;flex:1;flex-wrap:wrap}
.fs-title{font:.7rem/1 'IBM Plex Mono',monospace;color:var(--teal);font-weight:600;white-space:nowrap}
.fs-mods{display:flex;gap:.28rem;flex-wrap:wrap}
.fs-close{padding:.28rem .7rem;border-radius:6px;border:1px solid rgba(220,80,80,.4);background:rgba(220,80,80,.1);color:#d06060;font-size:.73rem;font-weight:500;cursor:pointer;flex-shrink:0;transition:all .12s;white-space:nowrap}
.fs-close:hover{border-color:#e07070;color:#e07070}
.fs-body{flex:1;position:relative;overflow:hidden;background:#060a12}
.fs-body canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}
.fs-body .cvs-stat{font-size:.7rem;top:.6rem;right:.6rem}
.fs-body .cvs-ol{bottom:5.5rem}

/* floating toolbar */
.fs-tb{position:absolute;bottom:.75rem;left:50%;transform:translateX(-50%);z-index:10;background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:10px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.6);padding:.5rem .85rem;display:flex;flex-direction:column;gap:.42rem;max-width:96vw;overflow-x:auto}
[data-theme="dim"] .fs-tb{background:rgba(30,40,55,.94);border-color:#7080a0}
.fs-tb .tbtn::after{bottom:auto;top:calc(100% + 7px);transform:translateX(-50%) translateY(-3px)}
.fs-tb .tbtn:hover::after{transform:translateX(-50%) translateY(0)}

/* hints */
.fs-hints{position:absolute;top:.55rem;left:50%;transform:translateX(-50%);z-index:12;display:flex;align-items:center;gap:.55rem;background:rgba(0,0,0,.65);border:1px solid rgba(57,208,184,.18);border-radius:8px;padding:.28rem .8rem;backdrop-filter:blur(12px);pointer-events:none;animation:hfade 7s ease forwards}
@keyframes hfade{0%,65%{opacity:1}100%{opacity:0}}
.hitem{display:flex;align-items:center;gap:.28rem;font-size:.63rem;color:rgba(200,220,220,.78);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.hkey{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:4px;padding:.04rem .32rem;font-size:.6rem;color:rgba(255,255,255,.7);font-weight:600}
.hsep{color:rgba(255,255,255,.2);font-size:.7rem}

/* ═══ RESPONSIVE ════════════════════════════════════════════ */
@media(max-width:900px){
  .page{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--bdr-s)}
  .sb-list{display:flex;flex-wrap:wrap;gap:.4rem;padding:0 1rem 1rem}
  .sb-item{padding:.38rem .72rem;border-radius:8px;border-left:none;border:1px solid var(--bdr)}
  .sb-ar{display:none}
  .main{padding:1.25rem 1rem}
  .info-grid,.img-grid.g3,.img-grid.g2,.img-grid.split{grid-template-columns:1fr!important}
  .s-hdr{flex-direction:column}
}
@media(max-width:640px){
  /* Topbar: hide breadcrumb text on very small screens */
  .breadcrumb>span:first-child{display:none}
  /* Tools panel: collapsible on mobile */
  .tools-wrap{margin-bottom:1rem}
  .tb-body{padding:.5rem .75rem}
  .tb-lbl{min-width:48px;font-size:.55rem}
  .tbtn{font-size:.65rem;padding:.22rem .42rem}
  /* Canvas minimum height adapted for mobile */
  .cvs-wrap{min-height:220px!important}
  /* Panel header smaller */
  .panel-hdr{padding:.35rem .6rem}
  /* View mode buttons row: scroll horizontally */
  .vbtn-row{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:.25rem}
  /* Modality toggle: scrollable */
  .mod-toggle-row{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  /* TTS panel: keep away from bottom edge on mobile */
  .tts-panel{bottom:4rem;right:.75rem;min-width:180px}
  /* Fullscreen toolbar: larger touch targets */
  .fs-tb .tbtn{padding:.38rem .6rem;font-size:.72rem}
  /* Slider touch friendly */
  input[type=range].tsl{width:72px}
  /* Tools collapse toggle */
  .tools-collapse-btn{display:flex}
}
@media(max-width:400px){
  .topbar{padding:0 .75rem}
  .main{padding:1rem .75rem}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}

/* Tools collapse button (mobile only) */
.tools-collapse-btn{
  display:none;align-items:center;gap:.35rem;
  padding:.25rem .6rem;border-radius:5px;border:1px solid var(--bdr);
  background:var(--bg-o);color:var(--tx3);font-size:.65rem;
  font-family:'IBM Plex Mono',monospace;cursor:pointer;
  transition:all .12s;margin-left:auto;
}
.tools-collapse-btn:hover{border-color:var(--teal2);color:var(--teal)}
.tools-body-collapsed .tb-body{display:none}
.tools-body-collapsed .tools-collapse-btn{color:var(--teal);border-color:var(--teal3)}

/* ═══ TTS MODULE ════════════════════════════════════════════ */
/* Speak button inline next to terms */
.tts-btn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;border:1px solid var(--bdr);background:var(--bg-o);color:var(--tx3);font-size:.65rem;cursor:pointer;transition:all .15s;vertical-align:middle;margin-left:.35rem;flex-shrink:0;line-height:1}
.tts-btn:hover{border-color:var(--teal2);color:var(--teal);background:var(--teal-s)}
.tts-btn.speaking{border-color:var(--teal);color:var(--teal);background:var(--teal-g);animation:tts-pulse 1s ease-in-out infinite}
.tts-btn.error{border-color:rgba(220,80,80,.5);color:#d06060}
@keyframes tts-pulse{0%,100%{box-shadow:0 0 0 0 rgba(57,208,184,.4)}50%{box-shadow:0 0 0 5px rgba(57,208,184,.0)}}

/* TTS Floating Panel */
.tts-panel{position:fixed;bottom:1.25rem;right:1.25rem;z-index:calc(var(--z-sticky) + 50);background:var(--bg-s);border:1px solid var(--bdr);border-radius:12px;padding:.7rem .9rem;box-shadow:0 8px 32px rgba(0,0,0,.45);min-width:200px;transition:opacity .2s,transform .2s;backdrop-filter:blur(16px)}
[data-theme="dim"] .tts-panel{box-shadow:0 8px 32px rgba(0,0,0,.18)}
.tts-panel.hidden{opacity:0;pointer-events:none;transform:translateY(8px)}
.tts-panel-title{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin-bottom:.55rem}
.tts-row{display:flex;align-items:center;gap:.38rem;margin-bottom:.42rem}
.tts-lbl{font-size:.65rem;color:var(--tx3);min-width:48px;font-family:'IBM Plex Mono',monospace}
.tts-seg{display:flex;border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.tts-seg button{padding:.2rem .48rem;font-size:.64rem;font-family:'IBM Plex Mono',monospace;border:none;background:var(--bg-o);color:var(--tx3);cursor:pointer;transition:all .1s;border-right:1px solid var(--bdr)}
.tts-seg button:last-child{border-right:none}
.tts-seg button:hover{background:var(--bg-r);color:var(--tx)}
.tts-seg button.active{background:var(--teal-g);color:var(--teal);font-weight:600}
.tts-now{font-size:.63rem;color:var(--tx3);font-family:'IBM Plex Mono',monospace;margin-top:.35rem;min-height:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.tts-now span{color:var(--teal)}
.tts-close{position:absolute;top:.38rem;right:.5rem;background:none;border:none;color:var(--tx3);font-size:.75rem;cursor:pointer;padding:.1rem .25rem;border-radius:4px;line-height:1}
.tts-close:hover{color:var(--tx)}

/* TTS toggle button in topbar */
.tts-toggle{display:flex;align-items:center;gap:.35rem;padding:.3rem .7rem;border-radius:99px;border:1px solid var(--bdr);background:var(--bg-r);color:var(--tx2);font-size:.78rem;font-weight:500;transition:all .15s;cursor:pointer}
.tts-toggle:hover{border-color:var(--teal2);color:var(--teal)}
.tts-toggle.active{border-color:var(--teal);color:var(--teal);background:var(--teal-s)}
</style>
</head>
<body>

<header class="topbar">
  <a href="../index.html" class="logo"><div class="logo-mark">OR</div><span class="logo-text">Omni<span>Rad</span></span></a>

      <li class="sb-item"        data-id="spleen"      tabindex="0"><span class="sb-icon">🫘</span><span class="sb-name">Spleen</span><span class="sb-ar">الطحال</span></li>

      <li class="sb-item"        data-id="gallbladder" tabindex="0"><span class="sb-icon">💧</span><span class="sb-name">Gallbladder</span><span class="sb-ar">المرارة</span></li>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const D = {
  liver:{
    name:'Liver',ar:'الكبد',sys:'Hepatobiliary',reg:'Upper Abdomen',
    loc:'Right hypochondriac region, extending to epigastric region',
    fn:'Metabolic processing, bile production, detoxification, glycogen storage, synthesis of plasma proteins and clotting factors.',
    note:'Largest solid organ in the body. Divided into right and left lobes by falciform ligament; 8 Couinaud segments.',
    tags:['Solid Organ','Hepatobiliary','Retroperitoneal: No','Couinaud: 8'],
    refs:['Gallbladder','Portal Vein','Hepatic Artery','IVC'],
    mods:{
      CT: {planes:['Axial','Coronal','Sagittal'],note:'Best assessed in portal venous phase (65–70 s)'},
      MRI:{planes:['Axial','Coronal','Sagittal'],note:'T1 in-phase/out-phase for fat; T2 for lesion characterization'},
      US: {planes:['Transverse','Longitudinal','Oblique'],note:'Isoechoic to mildly hyperechoic vs. renal cortex'},
    }
  },
  spleen:{
    name:'Spleen',ar:'الطحال',sys:'Lymphoreticular',reg:'Upper Abdomen',
    loc:'Left hypochondriac region, posterior to stomach',
    fn:'Blood filtration, immune surveillance, RBC sequestration, extramedullary haematopoiesis in pathologic states.',
    note:'Normal length ≤ 12 cm. Accessory spleen (splenule) in ~10% near splenic hilum.',
    tags:['Solid Organ','Lymphoreticular','Retroperitoneal: No','Length: ≤12 cm'],
    refs:['Pancreatic Tail','Splenic Artery','Left Kidney','Stomach'],
    mods:{
      CT: {planes:['Axial','Coronal'],note:'Homogeneous enhancement; mottled in arterial phase — normal'},
      MRI:{planes:['Axial','Coronal'],note:'Hypointense T1, markedly hyperintense T2'},
      US: {planes:['Coronal','Transverse'],note:'Hyperechoic compared to adjacent renal cortex'},
    }
  },
  kidney:{
    name:'Right Kidney',ar:'الكلية اليمنى',sys:'Urinary',reg:'Retroperitoneal',
    loc:'Right retroperitoneal space, T12–L3; lower than left kidney',
    fn:'Blood filtration, urine production, electrolyte balance, acid-base regulation, EPO and renin secretion.',
    note:'Cortex (nephrons) and medulla (pyramids). Right kidney 1–2 cm lower due to liver.',
    tags:['Solid Organ','Urinary','Retroperitoneal: Yes','Length: 9–12 cm'],
    refs:['Renal Artery','Renal Vein','Ureter','Adrenal Gland'],
    mods:{
      CT: {planes:['Axial','Coronal','Sagittal'],note:'Corticomedullary phase (25–70 s); nephrographic for masses'},
      MRI:{planes:['Axial','Coronal'],note:'T2: medullary pyramids hyperintense; T1+C: cortex enhances earlier'},
      US: {planes:['Longitudinal','Transverse'],note:'Sinus fat hyperechoic; cortex isoechoic to liver; pyramids hypoechoic'},
    }
  },
  pancreas:{
    name:'Pancreas',ar:'البنكرياس',sys:'Hepatobiliary / Endocrine',reg:'Retroperitoneal',
    loc:'Retroperitoneal, oblique at L1–L2 from head (R) to tail (L)',
    fn:'Exocrine: amylase, lipase. Endocrine: insulin and glucagon (islets of Langerhans).',
    note:'Head, neck, body, tail. Uncinate process hooks posterior to superior mesenteric vessels.',
    tags:['Retroperitoneal: Yes','Dual Function','Head/Neck/Body/Tail'],
    refs:['Common Bile Duct','Duodenum','Splenic Vein','SMA'],
    mods:{
      CT: {planes:['Axial','Coronal'],note:'Thin slices (0.5–1 mm), arterial + portal phases'},
      MRI:{planes:['Axial','Coronal'],note:'MRCP for duct anatomy; T1 fat-sat: normally hyperintense'},
      US: {planes:['Transverse','Oblique'],note:'Often obscured by bowel gas; isoechoic to slightly hyperechoic'},
    }
  },
  gallbladder:{
    name:'Gallbladder',ar:'المرارة',sys:'Hepatobiliary',reg:'Upper Abdomen',
    loc:'Gallbladder fossa, undersurface of right hepatic lobe (segments IV/V)',
    fn:'Bile concentration and storage; CCK-stimulated contraction releases bile into duodenum via CBD.',
    note:'Normal wall ≤ 3 mm (fasting). Phrygian cap (folded fundus) in ~4% — normal variant.',
    tags:['Hollow Organ','Hepatobiliary','Wall: ≤3 mm fasting','Volume: 30–50 mL'],
    refs:['Common Bile Duct','Liver','Cystic Duct','Duodenum'],
    mods:{
      CT: {planes:['Axial','Coronal'],note:'Non-contrast for stones; contrast for wall thickening'},
      MRI:{planes:['Axial','Coronal'],note:'T2: bile hyperintense; MRCP shows biliary anatomy'},
      US: {planes:['Transverse','Longitudinal','Oblique'],note:'First-line. Fasting required. Stones: echogenic + posterior acoustic shadow'},
    }
  }
};

const ALL_MODS   = ['CT','MRI','US','NM','PET','RT','Angio','X-Ray','Mammo'];
const MOD_CLS    = {CT:'b-ct',MRI:'b-mri',US:'b-us',NM:'b-nm',PET:'b-pet',RT:'b-rt',Angio:'b-angio','X-Ray':'b-xray',Mammo:'b-mammo'};
const WL_PRESETS = [{l:'Soft Tissue',w:400,v:40},{l:'Lung',w:1500,v:-600},{l:'Bone',w:1800,v:400},{l:'Brain',w:80,v:40},{l:'Liver',w:150,v:60},{l:'Abdomen',w:350,v:40},{l:'Mediastinum',w:350,v:50}];
const SIG_LBL    = ['T1','T2','FLAIR','DWI','ADC','T1+C','STIR'];
const DOP_LBL    = ['B-Mode','Color Doppler','Power Doppler','Spectral'];
const SEQ_FX={
  T1:{br:110,ct:130},T2:{br:85,ct:165},FLAIR:{br:78,ct:190},
  DWI:{br:92,ct:205},ADC:{br:100,ct:90},'T1+C':{br:122,ct:148},STIR:{br:75,ct:180},
  'B-Mode':{br:95,ct:110},
  'Color Doppler':{br:118,ct:128},
  'Power Doppler':{br:128,ct:118},
  Spectral:{br:80,ct:165},
  'Tc-99m':{br:100,ct:140},'Tl-201':{br:95,ct:145},
  'I-131':{br:88,ct:158},'Ga-67':{br:105,ct:135},'F-18 FDG':{br:92,ct:162},
  CR:{br:105,ct:110},PR:{br:88,ct:132},SD:{br:100,ct:100},PD:{br:112,ct:88}
};
const TRC_LBL    = ['Tc-99m','Tl-201','I-131','Ga-67','F-18 FDG'];
const PRC_LBL    = ['CR','PR','SD','PD'];
const OAR_LBL    = ['GTV','CTV','PTV','OAR-Cord','OAR-Parotid'];
const CTR_COL    = {GTV:'#ff4040',CTV:'#ff8c00',PTV:'#ffd700','OAR-Cord':'#60d0ff','OAR-Parotid':'#c060ff'};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let curStruct  = 'liver';
let curMod     = 'CT';
let curMod2    = 'MRI';   // split right panel
let viewMode   = 'normal'; // normal|split
let activeTool    = 'pan';
let activePanel   = null;  // idx of currently active panel (null = none)
let contLbl    = 'GTV';
let contCol    = '#ff4040';
let activePlanes = {};     // {modKey: Set of active plane names}
const PS       = {};       // panelStates[idx]

// ═══════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════
const H = document.documentElement;
document.getElementById('theme-btn').addEventListener('click',()=>{
  const t = H.dataset.theme==='dark'?'dim':'dark';
  H.dataset.theme=t;
  document.getElementById('t-icon').textContent = t==='dark'?'☾':'◑';
  document.getElementById('t-lbl').textContent  = t==='dark'?'Dim':'Dark';
  localStorage.setItem('omnirad-theme',t);
  Object.keys(PS).forEach(i=>drawBg(+i));
  if(document.getElementById('fs-ov').classList.contains('open')) drawFsBg();
});
const saved = localStorage.getItem('omnirad-theme')||'dark';
H.dataset.theme=saved;
document.getElementById('t-icon').textContent = saved==='dark'?'☾':'◑';
document.getElementById('t-lbl').textContent  = saved==='dark'?'Dim':'Dark';

// ═══════════════════════════════════════════════════════════
// RENDER PAGE
// ═══════════════════════════════════════════════════════════
function render(id, anim=true) {
  const main = document.getElementById('main');
  document.getElementById('bc').textContent = D[id]?.name||id;
  Object.keys(PS).forEach(k=>delete PS[k]);
  const go = () => { main.innerHTML = buildPage(id); bindPage(); bindTb(); requestAnimationFrame(()=>requestAnimationFrame(()=>initPanels())); };
  if(anim){ main.classList.add('fading'); setTimeout(()=>{ go(); main.classList.remove('fading'); },150); }
  else go();
}

function buildPage(id) {
  const s = D[id];
  const avail = Object.keys(s.mods);
  const modBtns = ALL_MODS.map(m=>{
    const a=avail.includes(m),act=m===curMod?' active':'',dis=!a?' disabled':'';
    return `<button class="mod-btn${act}"${dis} data-m="${m}">${m}</button>`;
  }).join('');

  const active1  = getActivePlanes(curMod);
  let gridCls    = viewMode==='split' ? 'img-grid-split-wrap'
                 : `img-grid ${active1.length>=3?'g3':active1.length===2?'g2':'g1'}`;

  // Build panels HTML
  let panelsHTML = '';
  let planeRowH  = '';

  if(viewMode==='split'){
    const avail2 = avail.filter(m=>m!==curMod);
    if(!avail.includes(curMod2)||curMod2===curMod) curMod2=avail2[0]||avail[0];
    const lp=getActivePlanes(curMod), rp=getActivePlanes(curMod2);
    const lCls=lp.length>=3?'g3':lp.length===2?'g2':'g1';
    const rCls=rp.length>=3?'g3':rp.length===2?'g2':'g1';
    panelsHTML=`
      <div class="split-col"><div class="img-grid ${lCls}" id="split-left">${buildPanelsHtml(s,curMod,0,false)}</div></div>
      <div class="split-col"><div class="img-grid ${rCls}" id="split-right">${buildPanelsHtml(s,curMod2,lp.length,false)}</div></div>`;
    planeRowH = buildSplitPlaneRows(avail);
  } else {
    panelsHTML = buildPanelsHtml(s, curMod, 0);
    planeRowH  = buildPlaneRow(curMod);
  }

  const splitRow = viewMode==='split' ? buildSplitRow(avail) : '';

  return `
  <div class="sbar"><span class="sdot"></span><span>Phase 1 · MVP · <strong>Upper Abdomen</strong> · 5 structures · Placeholder images</span></div>
  <div class="s-hdr">
    <div>
      <div class="s-eyebrow">${s.sys} · ${s.reg}</div>
      <h1 class="s-name">${s.name}</h1>
      <div class="s-ar">${s.ar}</div>
      <div class="s-tags">${s.tags.map((t,i)=>`<span class="tag${i===0?' sys':''}">${t}</span>`).join('')}</div>
    </div>
    <div class="s-meta">
      <div class="meta-card"><div class="meta-lbl">Region</div><div class="meta-val">${s.reg}</div></div>
      <div class="meta-card"><div class="meta-lbl">System</div><div class="meta-val">${s.sys}</div></div>
    </div>
  </div>
  <div class="info-grid">
    <div class="info-card"><div class="info-lbl">Location</div><div class="info-txt">${s.loc}</div></div>
    <div class="info-card"><div class="info-lbl">Function</div><div class="info-txt">${s.fn}</div></div>
    <div class="info-card"><div class="info-lbl">Clinical Note</div><div class="info-txt">${s.note}</div></div>
  </div>
  <div class="viewer-wrap">
    <div class="viewer-hdr">
      <div class="viewer-title">Multimodal Viewer</div>

// ── Plane management ────────────────────────────────────
function planeKey(mod){ return `${curStruct}__${mod}`; }

function getActivePlanes(mod) {
  const allPlanes = D[curStruct]?.mods[mod]?.planes || [];
  if(!allPlanes.length) return [];
  const key = planeKey(mod);
  if(!activePlanes[key]) {
    // Default: first plane only
    activePlanes[key] = new Set([allPlanes[0]]);
  }
  // Only return planes that still exist for this mod
  return allPlanes.filter(p => activePlanes[key].has(p));
}

function togglePlane(mod, plane) {
  const key = planeKey(mod);
  const allPlanes = D[curStruct]?.mods[mod]?.planes || [];
  if(!activePlanes[key]) activePlanes[key] = new Set([allPlanes[0]]);
  const s = activePlanes[key];
  if(s.has(plane)) {
    // Only allow removal if more than 1 active
    if(s.size > 1) s.delete(plane);
  } else {
    s.add(plane);
  }
}

function buildSplitPlaneRows(avail) {
  // Show plane toggles for both left and right modalities
  const leftAllPlanes  = D[curStruct]?.mods[curMod]?.planes||[];
  const rightAllPlanes = D[curStruct]?.mods[curMod2]?.planes||[];
  const leftActive     = getActivePlanes(curMod);
  const rightActive    = getActivePlanes(curMod2);

  const leftBtns  = leftAllPlanes.length>1 ? leftAllPlanes.map(p=>
    `<button class="plane-btn${leftActive.includes(p)?' on':''}" data-plane="${p}" data-planemod="${curMod}">${p}</button>`
  ).join('') : '';

  const rightBtns = rightAllPlanes.length>1 ? rightAllPlanes.map(p=>
    `<button class="plane-btn${rightActive.includes(p)?' on':''}" data-plane="${p}" data-planemod="${curMod2}">${p}</button>`
  ).join('') : '';

  if(!leftBtns && !rightBtns) return '';

  return `<div class="split-plane-rows" id="split-plane-rows">
    <div class="plane-row" id="plane-row-${curMod}">
      <span class="plane-lbl" style="color:var(--teal);font-weight:600">${curMod}</span>
      ${leftBtns||'<span style="font-size:.67rem;color:var(--tx3)">Single plane</span>'}
    </div>
    <div class="plane-row" id="plane-row-${curMod2}">
      <span class="plane-lbl" style="color:var(--teal);font-weight:600">${curMod2}</span>
      ${rightBtns||'<span style="font-size:.67rem;color:var(--tx3)">Single plane</span>'}
    </div>
  </div>`;
}

function buildPlaneRow(mod) {
  const allPlanes = D[curStruct]?.mods[mod]?.planes || [];
  if(allPlanes.length <= 1) return ''; // no toggle needed for single plane
  const active = getActivePlanes(mod);
  const btns = allPlanes.map(p =>
    `<button class="plane-btn${active.includes(p)?' on':''}" data-plane="${p}" data-planemod="${mod}">${p}</button>`
  ).join('');
  return `<div class="plane-row" id="plane-row-${mod}">
    <span class="plane-lbl">Planes</span>${btns}
  </div>`;
}

function buildPanelsHtml(s, mod, offset, onlyFirst=false) {
  const allPlanes = s.mods[mod]?.planes||[];
  let list;
  if(onlyFirst) {
    // Split right panel: always show only first plane of this modality
    list = [allPlanes[0]].filter(Boolean);
  } else {
    list = getActivePlanes(mod);
  }
  const note = s.mods[mod]?.note||'';
  const mc   = MOD_CLS[mod]||'b-ct';
  if(!list.length) return `<div style="padding:2rem;color:var(--tx3);text-align:center;grid-column:1/-1">No ${mod} images available</div>`;
  return list.map((p,i)=>{
    const idx = i+offset;
    return `<div class="panel">
      <div class="panel-hdr">
        <span class="panel-lbl">${p}</span>
        <div class="panel-right">
          <span class="mod-badge ${mc}">${mod}</span>
          <button class="xbtn" data-expand="${idx}" title="Expand · Dbl-click">⤢</button>
        </div>
      </div>
      <div class="cvs-wrap" id="cw-${idx}" data-idx="${idx}" data-mod="${mod}" data-plane="${p}">
        <canvas id="bg-${idx}"></canvas>
        <canvas id="dr-${idx}" style="pointer-events:none;z-index:2;position:absolute;top:0;left:0;width:100%;height:100%"></canvas>
        <div class="cvs-stat" id="st-${idx}">pan | ×1.0</div>
        <div class="cvs-ol"   id="ol-${idx}"></div>
      </div>
    </div>`;
  }).join('') + `<p class="vnote">📋 ${note}</p>`;
}

function buildSplitRow(avail) {
  const btns = ALL_MODS.map(m=>{
    const a=avail.includes(m)&&m!==curMod,act=m===curMod2?' active':'',dis=(!a)?' disabled':'';
    return `<button class="smod-btn${act}"${dis} data-sm="${m}">${m}</button>`;
  }).join('');
  return `<div class="split-row" id="split-row"><span class="split-lbl">Right panel:</span>${btns}</div>`;
}

// ═══════════════════════════════════════════════════════════
// BIND PAGE EVENTS
// ═══════════════════════════════════════════════════════════
function bindPage() {
  // Modality buttons
  document.querySelectorAll('.mod-btn[data-m]').forEach(b=>b.addEventListener('click',()=>{
    if(b.disabled) return;
    curMod = b.dataset.m;
    document.querySelectorAll('.mod-btn[data-m]').forEach(x=>x.classList.toggle('active',x.dataset.m===curMod));
    const badge=document.getElementById('tb-badge');
    if(badge){badge.textContent=curMod;badge.className=`mod-badge ${MOD_CLS[curMod]||'b-ct'}`;}
    refreshViewer();
  }));

  // View mode
  document.querySelectorAll('.vbtn[data-v]').forEach(b=>b.addEventListener('click',()=>{
    if(b.dataset.v==='expand'){ openFs(curMod); return; }
    viewMode = b.dataset.v;
    document.querySelectorAll('.vbtn[data-v]').forEach(x=>x.classList.toggle('active',x.dataset.v===viewMode));
    refreshViewer();
  }));

  // Plane toggles
  bindPlaneToggles();

  // Expand buttons & dblclick
  document.addEventListener('click', e=>{
    const xb=e.target.closest('[data-expand]');
    if(xb){ const cw=document.getElementById(`cw-${xb.dataset.expand}`); openFs(cw?.dataset.mod||curMod); }
  },{capture:false});
}

function refreshViewer() {
  const s=D[curStruct], avail=Object.keys(s.mods);
  const grid=document.getElementById('img-grid'); if(!grid) return;

  // Clear old panel states
  Array.from(grid.querySelectorAll('.cvs-wrap')).forEach(w=>delete PS[+w.dataset.idx]);

  if(viewMode==='split'){
    // Split: each side is a column wrapper
    if(!avail.includes(curMod2)||curMod2===curMod) curMod2=avail.filter(m=>m!==curMod)[0]||avail[0];
    const lp=getActivePlanes(curMod), rp=getActivePlanes(curMod2);
    const lCls=lp.length>=3?'g3':lp.length===2?'g2':'g1';
    const rCls=rp.length>=3?'g3':rp.length===2?'g2':'g1';
    // Use a 2-col wrapper grid; each side has its own sub-grid
    grid.className='img-grid-split-wrap';
    grid.innerHTML=`
      <div class="split-col">
        <div class="img-grid ${lCls}" id="split-left">${buildPanelsHtml(s,curMod,0,false)}</div>
      </div>
      <div class="split-col">
        <div class="img-grid ${rCls}" id="split-right">${buildPanelsHtml(s,curMod2,lp.length,false)}</div>
      </div>`;
  } else {
    const active1=getActivePlanes(curMod);
    const cls=active1.length>=3?'g3':active1.length===2?'g2':'g1';
    grid.className=`img-grid ${cls}`;
    grid.innerHTML=buildPanelsHtml(s,curMod,0);
  }

  // Plane rows — always rebuild from scratch to avoid duplication
  document.querySelectorAll('.plane-row,.split-plane-rows').forEach(r=>r.remove());
  const planeHtml = viewMode==='split' ? buildSplitPlaneRows(avail) : buildPlaneRow(curMod);
  if(planeHtml){
    const div=document.createElement('div');
    div.innerHTML=planeHtml;
    const el=div.firstElementChild;
    if(el) grid.parentNode.insertBefore(el,grid);
  }
  bindPlaneToggles();

  // Split row
  const sr=document.getElementById('split-row');
  if(viewMode==='split' && !sr){
    const row=document.createElement('div');
    row.innerHTML=buildSplitRow(avail);
    const pr=document.querySelector('.split-plane-rows,.plane-row')||grid;
    grid.parentNode.insertBefore(row.firstElementChild,pr.nextSibling||grid);
    bindSplitRow();
  } else if(viewMode!=='split' && sr){
    sr.remove();
  } else if(viewMode==='split' && sr){
    sr.innerHTML=`<span class="split-lbl">Right panel:</span>`+ALL_MODS.map(m=>{
      const a=avail.includes(m)&&m!==curMod,act=m===curMod2?' active':'',dis=!a?' disabled':'';
      return`<button class="smod-btn${act}"${dis} data-sm="${m}">${m}</button>`;
    }).join('');
    bindSplitRow();
  }

  bindTb();
  requestAnimationFrame(()=>requestAnimationFrame(()=>initPanels()));
}

function bindPlaneToggles(){
  document.querySelectorAll('.plane-btn[data-plane]').forEach(b=>{
    // Clone to clear old listeners
    const nb=b.cloneNode(true);
    b.replaceWith(nb);
    nb.addEventListener('click',()=>{
      const mod=nb.dataset.planemod||curMod;
      togglePlane(mod, nb.dataset.plane);
      refreshViewer();
    });
  });
}

function bindSplitRow(){
  document.querySelectorAll('.smod-btn[data-sm]').forEach(b=>b.addEventListener('click',()=>{
    if(b.disabled)return;
    curMod2=b.dataset.sm;
    refreshViewer();
  }));
}

// TOOLBAR
// ═══════════════════════════════════════════════════════════
function bindTb() {
  const old=document.getElementById('tb-body'); if(!old) return;
  // Clone to remove all accumulated listeners
  const tb=old.cloneNode(false);
  old.replaceWith(tb);
  tb.id='tb-body';
  tb.innerHTML = buildTbHtml(curMod);

  tb.addEventListener('click', e=>{
    const btn=e.target.closest('.tbtn[data-t]');
    if(btn){ handleTool(btn.dataset.t,tb); return; }
    const pb=e.target.closest('.pbtn');
    if(pb){ handlePreset(pb,tb); }
  });

  tb.addEventListener('input', e=>{
    const sl=e.target; if(!sl.classList.contains('tsl')) return;
    const v=+sl.value;
    const vm={'sl-w':'sv-w','sl-l':'sv-l','sl-br':'sv-br','sl-ct':'sv-ct','sl-gn':'sv-gn','sl-po':'sv-po'};
    const sfx={'sl-br':'%','sl-ct':'%','sl-gn':'%','sl-po':'%'};
    const vEl=tb.querySelector('#'+vm[sl.id]);
    if(vEl) vEl.textContent=v+(sfx[sl.id]||'');
    if(sl.id==='sl-w'||sl.id==='sl-l'){
      const w=+(tb.querySelector('#sl-w')?.value||400), lv=+(tb.querySelector('#sl-l')?.value||40);
      applyWL(w,lv);
    } else if(sl.id==='sl-br') applyBC(v,null);
    else if(sl.id==='sl-ct') applyBC(null,v);
    else if(sl.id==='sl-gn') applyBC(v,null);
  });
}

function handleTool(t, tb) {
  const acts=['rotate-cw','rotate-ccw','flip-h','flip-v','invert','reset','save','tic'];
  if(acts.includes(t)){ applyAction(t); return; }
  setTool(t);
}

function handlePreset(pb, tb) {
  if(pb.dataset.ww!==undefined){
    const w=+pb.dataset.ww, lv=+pb.dataset.wl;
    tb.querySelectorAll('.pbtn[data-ww]').forEach(b=>b.classList.toggle('active',b===pb));
    const sw=tb.querySelector('#sl-w'),sl=tb.querySelector('#sl-l');
    const svw=tb.querySelector('#sv-w'),svl=tb.querySelector('#sv-l');
    if(sw){sw.value=w;if(svw)svw.textContent=w;}
    if(sl){sl.value=lv;if(svl)svl.textContent=lv;}
    applyWL(w,lv); return;
  }
  if(pb.dataset.cm!==undefined){
    pb.closest('.tb-row')?.querySelectorAll('.pbtn[data-cm]').forEach(b=>b.classList.toggle('active',b===pb));
    setStat(`Colormap: ${pb.dataset.cm}`); return;
  }
  if(pb.dataset.sq!==undefined){
    const lbl=pb.dataset.sq;
    const grp=pb.closest('.tb-row');
    const wasActive=pb.classList.contains('active');
    grp?.querySelectorAll('.pbtn[data-sq]').forEach(b=>b.classList.remove('active'));
    // Target ACTIVE panel only
    const ap=getActivePS(); if(!ap) return;
    const {idx,s}=ap;
    // Remove lbl annos from active panel only
    s.annos=s.annos.filter(a=>a.t!=='lbl');
    if(!wasActive){
      pb.classList.add('active');
      const FX=SEQ_FX;
      const eff=FX[lbl]||{br:100,ct:100};
      s.br=eff.br; s.ct=eff.ct;
      s.annos.push({t:'lbl',d:[10,22,lbl]});
      drawBg(idx); drawAnno(idx);
      const sbr=document.getElementById('sl-br'),sct=document.getElementById('sl-ct'),sgn=document.getElementById('sl-gn');
      if(sbr){sbr.value=eff.br;const sv=document.getElementById('sv-br');if(sv)sv.textContent=eff.br+'%';}
      if(sct){sct.value=eff.ct;const sv=document.getElementById('sv-ct');if(sv)sv.textContent=eff.ct+'%';}
      if(sgn){sgn.value=eff.br;const sv=document.getElementById('sv-gn');if(sv)sv.textContent=eff.br+'%';}
    } else {
      s.br=100; s.ct=100; drawBg(idx); drawAnno(idx);
      const sbr=document.getElementById('sl-br'),sct=document.getElementById('sl-ct'),sgn=document.getElementById('sl-gn');
      if(sbr){sbr.value=100;const sv=document.getElementById('sv-br');if(sv)sv.textContent='100%';}
      if(sct){sct.value=100;const sv=document.getElementById('sv-ct');if(sv)sv.textContent='100%';}
      if(sgn){sgn.value=100;const sv=document.getElementById('sv-gn');if(sv)sv.textContent='100%';}
    }
    return;
  }
  if(pb.dataset.oar!==undefined){
    const lbl=pb.dataset.oar;
    contLbl=lbl; contCol=CTR_COL[lbl]||'#60d090';
    pb.closest('.tb-row')?.querySelectorAll('.pbtn[data-oar]').forEach(b=>b.classList.toggle('active',b===pb));
    setTool('contour'); return;
  }
}

        <div class="sl-item"><span class="sl-lbl">Opacity</span><input type="range" class="tsl" id="sl-po" min="0" max="100" value="60"><span class="sl-val" id="sv-po">60%</span></div>
      </div>
    </div>`;
  } else if(mod==='RT'){
    spec=`
    <div class="tb-row">
      <span class="tb-lbl">RT-IGRT</span>
      <button class="tbtn${activeTool==='isodose'?' active':''}"    data-t="isodose"    data-tip="Click → isodose lines 100/80/50/20% (illustrative)">〰 Isodose</button>
      <button class="tbtn${activeTool==='field-size'?' active':''}" data-t="field-size" data-tip="Drag → radiation field size (cm×cm)*">⬜ Field Size</button>
      <button class="tbtn${activeTool==='ssd'?' active':''}"        data-t="ssd"        data-tip="Drag → Source-to-Skin Distance (mm*)">↕ SSD</button>
      <button class="tbtn${activeTool==='contour'?' active':''}"    data-t="contour"    data-tip="Draw → GTV/CTV/PTV/OAR contour">✏ Contour</button>
    </div>
    <div class="tb-row">
      <span class="tb-lbl">Volumes</span>
      ${OAR_LBL.map(l=>`<button class="pbtn" data-oar="${l}" style="color:${CTR_COL[l]||'#60d090'};border-color:${CTR_COL[l]||'#60d090'}44">${l}</button>`).join('')}
    </div>
    <div class="tb-row"><div class="rt-warn">⚠ RT tools are for anatomical education only — not for clinical RT planning or dose prescription</div></div>`;
  } else {
    spec=`
    <div class="tb-row">
      <span class="tb-lbl">${mod} Tools</span>
      <button class="tbtn${activeTool==='ctr'?' active':''}" data-t="ctr" data-tip="Drag → Cardiothoracic Ratio estimate*">❤ CTR</button>
    </div>
    <div class="tb-row">
      <span class="tb-lbl">Display</span>
      <div class="sl-row">
        <div class="sl-item"><span class="sl-lbl">Brightness</span><input type="range" class="tsl" id="sl-br" min="50" max="200" value="100"><span class="sl-val" id="sv-br">100%</span></div>
        <div class="sl-item"><span class="sl-lbl">Contrast</span><input type="range" class="tsl" id="sl-ct" min="50" max="250" value="100"><span class="sl-val" id="sv-ct">100%</span></div>
      </div>
    </div>`;
  }
  return base+spec;
}

// ═══════════════════════════════════════════════════════════
// CANVAS ENGINE
// ═══════════════════════════════════════════════════════════
function initPanels() {
  const tryInit=(attempt=0)=>{
    let anyFailed=false;
    document.querySelectorAll('.cvs-wrap').forEach(wrap=>{
      const idx=+wrap.dataset.idx;
      if(PS[idx]&&PS[idx].W>10) return; // already initialized
      const mod=wrap.dataset.mod||curMod;
      const bgC=document.getElementById(`bg-${idx}`);
      const drC=document.getElementById(`dr-${idx}`);
      if(!bgC||!drC){anyFailed=true;return;}
      const W=wrap.offsetWidth||wrap.clientWidth||0;
      const Ht=wrap.offsetHeight||wrap.clientHeight||0;
      if((W<10||Ht<10)&&attempt<4){anyFailed=true;return;}
      const FW=W||400, FHt=Ht||300;
      bgC.width=drC.width=FW; bgC.height=drC.height=FHt;
      PS[idx]={bg:bgC.getContext('2d'),dr:drC.getContext('2d'),W:FW,H:FHt,
        zoom:1,px:0,py:0,rot:0,fh:1,fv:1,br:100,ct:100,inv:false,
        annos:[],pts:[],cpts:[],mod,drawing:false,sx:0,sy:0,lx:0,ly:0};
      drawBg(idx);
      bindCvs(idx,wrap);
      // Watch for size changes (orientation change, sidebar collapse, etc.)
      if(window.ResizeObserver){
        const ro=new ResizeObserver(()=>{
          const nW=wrap.offsetWidth, nHt=wrap.offsetHeight;
          if(nW>10&&nHt>10&&(Math.abs(nW-(PS[idx]?.W||0))>4||Math.abs(nHt-(PS[idx]?.H||0))>4)){
            delete PS[idx];
            requestAnimationFrame(()=>initPanels());
          }
        });
        ro.observe(wrap);
      }
    });
    if(anyFailed&&attempt<4) setTimeout(()=>tryInit(attempt+1),80*(attempt+1));
    else {
      setTool(activeTool);
      // Auto-activate first panel if none active
      const keys=Object.keys(PS);
      if(keys.length && (activePanel===null || !PS[activePanel])){
        setActivePanel(+keys[0]);
      }
    }
  };
  tryInit();
}

// ── Background draw ───────────────────────────────────────
function drawBg(idx) {
  const s=PS[idx]; if(!s) return;
  const ctx=s.bg, W=s.W, Ht=s.H, mod=s.mod;
  const dark=document.documentElement.dataset.theme==='dark'; // FIX: use explicit reference
  ctx.clearRect(0,0,W,Ht);
  ctx.save();
  ctx.translate(W/2+s.px, Ht/2+s.py);
  ctx.scale(s.zoom*s.fh, s.zoom*s.fv);
  ctx.rotate(s.rot*Math.PI/180);
  ctx.translate(-W/2,-Ht/2);

  // Background
  ctx.fillStyle=dark?'#0b0f18':'#1a2535'; ctx.fillRect(0,0,W,Ht);

  // Grid
  const gc=dark?'rgba(57,208,184,.06)':'rgba(30,160,140,.10)';
  ctx.strokeStyle=gc; ctx.lineWidth=.8;
  for(let x=W/6;x<W;x+=W/6){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,Ht);ctx.stroke();}
  for(let y=Ht/6;y<Ht;y+=Ht/6){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Crosshair
  const xc=dark?'rgba(57,208,184,.18)':'rgba(30,160,140,.30)';
  ctx.strokeStyle=xc; ctx.lineWidth=.9; ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,Ht);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,Ht/2);ctx.lineTo(W,Ht/2);ctx.stroke();
  ctx.setLineDash([]);

  // Organ circle
  const r=Math.min(W,Ht)*.30;
  ctx.beginPath(); ctx.arc(W/2,Ht/2,r,0,Math.PI*2);
  ctx.fillStyle=dark?'rgba(30,130,115,.10)':'rgba(20,120,105,.20)'; ctx.fill();
  ctx.strokeStyle=dark?'rgba(57,208,184,.32)':'rgba(30,160,140,.60)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2,Ht/2,r*.52,0,Math.PI*2);
  ctx.strokeStyle=dark?'rgba(57,208,184,.12)':'rgba(30,160,140,.25)'; ctx.lineWidth=.8; ctx.stroke();

  // W/L effect — brightness/contrast applied via CSS filter shows here as visual hint
  // Draw a subtle vignette showing the current filter level
  if(s.ct>120){
    const grad=ctx.createRadialGradient(W/2,Ht/2,r*.4,W/2,Ht/2,r*1.2);
    grad.addColorStop(0,'rgba(57,208,184,.04)');
    grad.addColorStop(1,'rgba(0,0,0,.0)');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,Ht);
  }

  // Labels
  const tx=dark?'rgba(57,208,184,.65)':'rgba(30,160,140,.90)';
  ctx.fillStyle=tx; ctx.textAlign='center';
  ctx.font=`700 ${Math.min(W,Ht)*.042}px IBM Plex Mono,monospace`;
  ctx.fillText((D[curStruct]?.name||'').toUpperCase(), W/2, Ht/2+r+Math.min(W,Ht)*.072);
  ctx.font=`700 ${Math.min(W,Ht)*.038}px IBM Plex Mono,monospace`; ctx.textAlign='left';
  ctx.fillText(mod, W*.032, Ht*.068);
  ctx.restore();

  // CSS filter for brightness/contrast/invert
  const bgEl=document.getElementById(`bg-${idx}`);
  if(bgEl) bgEl.style.filter=`brightness(${s.br}%) contrast(${s.ct}%)${s.inv?' invert(1)':''}`;
}

// ── Annotations draw ──────────────────────────────────────
function drawAnno(idx) {
  const s=PS[idx]; if(!s) return;
  const ctx=s.dr, W=s.W, Ht=s.H;
  ctx.clearRect(0,0,W,Ht);
  ctx.font='500 11px IBM Plex Mono,monospace';
  const T='rgba(57,208,184,.95)',Y='#f0d060',P='#f06080',G='#60d090';
  s.annos.forEach(a=>drawA(ctx,a,T,Y,P,G,W,Ht));
  // Overlay tags
  const ol=document.getElementById(`ol-${idx}`); if(!ol)return;
  const mt=s.annos.filter(a=>['measure','ssd','roi-rect','roi-ellipse','follicle','suv-roi','hu-probe','suv-probe','mtv'].includes(a.t)).slice(-4).map(a=>{
    if(a.t==='measure'||a.t==='ssd'){const d=dist2(a.d);return`<span class="mtag">${a.t==='ssd'?'↕':'📏'} ${d}mm*</span>`;}
    if(['roi-rect','field-size','roi-counts'].includes(a.t))return`<span class="mtag">⬜ ${Math.round(Math.abs(a.d[2]*a.d[3])*.12)}mm²*</span>`;
    if(['roi-ellipse','follicle','suv-roi'].includes(a.t))return`<span class="mtag">⭕ A:${Math.round(Math.abs(a.d[2])*.6)} B:${Math.round(Math.abs(a.d[3])*.6)}mm*</span>`;
    if(a.t==='hu-probe')return`<span class="mtag">🔢 ${a.d[3]}</span>`;
    if(a.t==='suv-probe')return`<span class="mtag">☢ SUV:${a.d[3]}</span>`;
    if(a.t==='mtv')return`<span class="mtag">🧬 MTV≈${Math.round(Math.abs(a.d[2]*a.d[3])*.08)}cm³*</span>`;
    return'';
  });
  const lt=s.annos.filter(a=>a.t==='lbl').map(a=>`<span class="mtag lbl">🏷 ${a.d[2]}</span>`);
  ol.innerHTML=[...mt,...lt].join('');
}
function dist2(d){return Math.round(Math.sqrt((d[2]-d[0])**2+(d[3]-d[1])**2)*.35)}

function drawA(ctx,a,T,Y,P,G,W,H){
  ctx.setLineDash([]);ctx.lineWidth=1.5;
  if(a.t==='measure'||a.t==='ssd'){
    const[x1,y1,x2,y2]=a.d,d=dist2(a.d);
    ctx.strokeStyle=a.t==='ssd'?'#60d0ff':T;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.fillStyle=Y;ctx.fillText(`${a.t==='ssd'?'SSD≈':''}${d}mm*`,(x1+x2)/2+4,(y1+y2)/2-5);
  }else if(a.t==='angle'){
    const[x1,y1,x2,y2,x3,y3]=a.d;
    let d=Math.abs((Math.atan2(y3-y2,x3-x2)-Math.atan2(y1-y2,x1-x2))*180/Math.PI);
    if(d>180)d=360-d;
    ctx.strokeStyle=P;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.stroke();
    ctx.fillStyle=P;ctx.fillText(`${d.toFixed(1)}°`,x2+5,y2-5);
  }else if(['roi-rect','field-size','roi-counts'].includes(a.t)){
    const[x,y,w,h]=a.d;ctx.strokeStyle=G;ctx.setLineDash([4,3]);ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);
    ctx.fillStyle=G;ctx.fillText(`${Math.round(Math.abs(w*h)*.12)}mm²*`,x+3,y-4);
  }else if(['roi-ellipse','follicle','suv-roi'].includes(a.t)){
    const[cx,cy,rx,ry]=a.d;ctx.strokeStyle=G;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.ellipse(cx,cy,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=G;ctx.fillText(`A:${Math.round(Math.abs(rx)*.6)} B:${Math.round(Math.abs(ry)*.6)}mm*`,cx+Math.abs(rx)+4,cy);
  }else if(a.t==='hu-probe'||a.t==='suv-probe'){
    const[x,y,,lb]=a.d;ctx.fillStyle=Y;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();ctx.fillText(lb,x+8,y-5);
  }else if(a.t==='mtv'){
    const[x,y,w,h]=a.d;ctx.strokeStyle='#ff6060';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);
    ctx.fillStyle='#ff6060';ctx.fillText(`MTV≈${Math.round(Math.abs(w*h)*.08)}cm³*`,x+3,y-4);
  }else if(a.t==='h-line'){
    ctx.strokeStyle=Y;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(0,a.d[0]);ctx.lineTo(W,a.d[0]);ctx.stroke();ctx.setLineDash([]);
  }else if(a.t==='depth'){
    const xpos=a.d[0];
    const canH=H||300;
    // Draw depth scale on left side of clicked position
    for(let i=0;i<=10;i++){
      const dy=canH*i/10;
      const isMaj=i%5===0;
      ctx.strokeStyle=isMaj?'rgba(57,208,184,.85)':'rgba(57,208,184,.35)';
      ctx.lineWidth=isMaj?1.8:.7;
      ctx.beginPath();ctx.moveTo(xpos,dy);ctx.lineTo(xpos+(isMaj?16:8),dy);ctx.stroke();
      if(isMaj){
        ctx.fillStyle='rgba(57,208,184,.9)';
        ctx.font='600 10px IBM Plex Mono,monospace';
        ctx.fillText(`${i}cm*`,xpos+18,dy+4);
      }
    }
    ctx.lineWidth=1.5;
    // Vertical line
    ctx.strokeStyle='rgba(57,208,184,.35)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(xpos,0);ctx.lineTo(xpos,canH);ctx.stroke();
  }else if(a.t==='isodose'){
    const[cx,cy]=a.d;[{r:28,p:'100%',c:'#ff4040'},{r:52,p:'80%',c:'#ff8c00'},{r:72,p:'50%',c:'#ffd700'},{r:94,p:'20%',c:'#40c0ff'}].forEach(lv=>{ctx.strokeStyle=lv.c;ctx.lineWidth=1.8;ctx.setLineDash([5,3]);ctx.beginPath();ctx.arc(cx,cy,lv.r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=lv.c;ctx.fillText(lv.p,cx+lv.r+4,cy);});ctx.lineWidth=1.5;
  }else if(a.t==='contour'){
    const[pts,lb,col]=a.d;if(pts.length<2)return;ctx.strokeStyle=col;ctx.lineWidth=2.2;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);pts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.closePath();ctx.stroke();ctx.fillStyle=col+'28';ctx.fill();ctx.fillStyle=col;ctx.fillText(lb,pts[0][0]+4,pts[0][1]-6);
  }else if(a.t==='annotate'){
    const[x,y,tx]=a.d;ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(x-2,y-14,ctx.measureText(tx).width+8,18);ctx.fillStyle=T;ctx.fillText(tx,x+2,y);
  }else if(a.t==='lbl'){
    // Draw sequence label as fixed-size overlay — top-left corner
    const[,, text]=a.d;
    const fs=16; // fixed 16px — readable on any canvas size
    ctx.font=`700 ${fs}px IBM Plex Mono,monospace`;
    const tw=ctx.measureText(text).width;
    const lx=10, ly=28; // always top-left
    ctx.fillStyle='rgba(0,0,0,.80)';
    ctx.fillRect(lx-4,ly-fs-2,tw+12,fs+8);
    ctx.fillStyle='#f0d060';
    ctx.fillText(text,lx+2,ly);
    ctx.strokeStyle='rgba(240,208,96,.55)';
    ctx.lineWidth=1; ctx.setLineDash([]);
    ctx.strokeRect(lx-4,ly-fs-2,tw+12,fs+8);
  }
}

// ── Canvas event binding ──────────────────────────────────
function bindCvs(idx, wrap) {
  const s=PS[idx];
  function pos(e){const r=wrap.getBoundingClientRect();return[(e.clientX-r.left)*s.W/r.width,(e.clientY-r.top)*s.H/r.height];}
  wrap.addEventListener('wheel',e=>{e.preventDefault();s.zoom=Math.max(.3,Math.min(12,s.zoom*(e.deltaY>0?.9:1.1)));drawBg(idx);stat(idx);},{passive:false});
  wrap.addEventListener('dblclick',()=>openFs(s.mod));
  wrap.addEventListener('pointerdown',e=>{
    // Activate this panel on any click
    setActivePanel(idx);
    wrap.setPointerCapture(e.pointerId);
    const[x,y]=pos(e),t=activeTool;
    s.drawing=true;s.sx=x;s.sy=y;s.lx=e.clientX;s.ly=e.clientY;
    if(t==='angle'){s.pts.push([x,y]);if(s.pts.length===3){s.annos.push({t:'angle',d:[...s.pts[0],...s.pts[1],...s.pts[2]]});s.pts=[];drawAnno(idx);}else stat(idx,`Angle: click ${s.pts.length}/3`);s.drawing=false;return;}
    if(t==='hu-probe'){s.annos.push({t:'hu-probe',d:[x,y,null,`HU:${Math.round(Math.random()*350-80)}*`]});drawAnno(idx);s.drawing=false;return;}
    if(t==='suv-probe'){s.annos.push({t:'suv-probe',d:[x,y,null,(Math.random()*12+.5).toFixed(1)]});drawAnno(idx);s.drawing=false;return;}
    if(t==='h-line'){s.annos.push({t:'h-line',d:[y]});drawAnno(idx);s.drawing=false;return;}
    if(t==='depth'){s.annos.push({t:'depth',d:[x]});drawAnno(idx);s.drawing=false;return;}
    if(t==='isodose'){s.annos.push({t:'isodose',d:[x,y]});drawAnno(idx);s.drawing=false;return;}
    if(t==='annotate'){const tx=prompt('Annotation:');if(tx)s.annos.push({t:'annotate',d:[x,y,tx]});drawAnno(idx);s.drawing=false;return;}
    if(t==='contour'){s.cpts=[[x,y]];}
  });
  wrap.addEventListener('pointermove',e=>{
    if(!s.drawing)return;const[x,y]=pos(e),t=activeTool;
    if(t==='pan'){s.px+=e.clientX-s.lx;s.py+=e.clientY-s.ly;s.lx=e.clientX;s.ly=e.clientY;drawBg(idx);return;}
    if(t==='contour'){s.cpts.push([x,y]);drawAnno(idx);const ctx=s.dr;ctx.strokeStyle=contCol;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(s.cpts[0][0],s.cpts[0][1]);s.cpts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.stroke();return;}
    const ctx=s.dr,w=x-s.sx,h=y-s.sy;drawAnno(idx);ctx.strokeStyle='rgba(57,208,184,.75)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    if(['roi-ellipse','follicle','suv-roi'].includes(t)){ctx.beginPath();ctx.ellipse(s.sx+w/2,s.sy+h/2,Math.abs(w/2),Math.abs(h/2),0,0,Math.PI*2);ctx.stroke();}
    else if(t==='ssd'||t==='measure'){ctx.beginPath();ctx.moveTo(s.sx,s.sy);ctx.lineTo(x,y);ctx.stroke();}
    else{ctx.strokeRect(s.sx,s.sy,w,h);}
    ctx.setLineDash([]);
  });
  wrap.addEventListener('pointerup',e=>{
    if(!s.drawing)return;s.drawing=false;
    const[x,y]=pos(e),t=activeTool,w=x-s.sx,h=y-s.sy,mn=6;
    if(t==='contour'){if(s.cpts.length>3)s.annos.push({t:'contour',d:[s.cpts,contLbl,contCol]});s.cpts=[];drawAnno(idx);return;}
    if(t==='pan')return;
    if(['measure','ssd'].includes(t)&&(Math.abs(w)>mn||Math.abs(h)>mn))s.annos.push({t:t,d:[s.sx,s.sy,x,y]});
    else if(['roi-rect','field-size','roi-counts'].includes(t)&&Math.abs(w)>mn&&Math.abs(h)>mn)s.annos.push({t:'roi-rect',d:[s.sx,s.sy,w,h]});
    else if(t==='mtv'&&Math.abs(w)>mn&&Math.abs(h)>mn)s.annos.push({t:'mtv',d:[s.sx,s.sy,w,h]});
    else if(['roi-ellipse','follicle','suv-roi'].includes(t)&&Math.abs(w)>mn&&Math.abs(h)>mn)s.annos.push({t:'roi-ellipse',d:[s.sx+w/2,s.sy+h/2,w/2,h/2]});
    else if(t==='roi-signal'&&Math.abs(w)>mn&&Math.abs(h)>mn){const sg=Math.round(Math.random()*500+80);s.annos.push({t:'roi-rect',d:[s.sx,s.sy,w,h]});s.annos.push({t:'annotate',d:[s.sx,s.sy+h+14,`SI≈${sg}*`]});}
    else if(t==='ctr'&&Math.abs(w)>mn){const ctr=(Math.abs(w)/s.W*1.85).toFixed(2);s.annos.push({t:'ssd',d:[s.sx,s.sy,x,y]});s.annos.push({t:'annotate',d:[s.sx,s.sy-10,`CTR≈${ctr}*`]});}
    drawAnno(idx);stat(idx);
  });
}

// ── Tool / action helpers ─────────────────────────────────
function setActivePanel(idx) {
  if(activePanel === idx) return;
  activePanel = idx;
  // Update visual indicator on all panels
  document.querySelectorAll('.panel').forEach(p=>{
    const cw=p.querySelector('.cvs-wrap');
    const isActive=cw&&+cw.dataset.idx===idx;
    p.classList.toggle('panel-active', isActive);
    // Show/hide ACTIVE badge
    let badge=p.querySelector('.panel-active-badge');
    if(isActive){
      if(!badge){badge=document.createElement('div');badge.className='panel-active-badge';badge.textContent='ACTIVE';p.querySelector('.cvs-wrap')?.appendChild(badge);}
    } else {
      badge?.remove();
    }
  });
  // Update toolbar label
  const s=PS[idx];
  if(s){
    const badge=document.getElementById('tb-badge');
    if(badge){badge.textContent=s.mod;badge.className=`mod-badge ${MOD_CLS[s.mod]||'b-ct'}`;}
    stat(idx,`active | ×${s.zoom.toFixed(1)}`);
  }
}

function getActivePS() {
  // Return PS of active panel, or first panel if none active
  if(activePanel!==null && PS[activePanel]) return {idx:activePanel, s:PS[activePanel]};
  const keys=Object.keys(PS);
  if(!keys.length) return null;
  const idx=+keys[0];
  return {idx, s:PS[idx]};
}

function setTool(t){
  activeTool=t;
  document.querySelectorAll('.tbtn[data-t]').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  const cur={pan:'grab',measure:'crosshair',angle:'crosshair','roi-rect':'crosshair','roi-ellipse':'crosshair',annotate:'text','hu-probe':'cell','suv-probe':'cell','roi-signal':'crosshair',isodose:'copy',contour:'cell','h-line':'row-resize',depth:'col-resize',ctr:'crosshair','field-size':'crosshair',ssd:'ns-resize',mtv:'crosshair','suv-roi':'crosshair',follicle:'crosshair','roi-counts':'crosshair',cobb:'crosshair'}[t]||'crosshair';

function applyAction(t){

  const ap=getActivePS();

  if(t==='flip-h')     s.fh*=-1;
  if(t==='flip-v')     s.fv*=-1;
  if(t==='invert')     s.inv=!s.inv;
  if(t==='reset'){
    Object.assign(s,{zoom:1,px:0,py:0,rot:0,fh:1,fv:1,br:100,ct:100,inv:false,annos:[],pts:[]});

const FS={bg:null,dr:null,W:0,H:0,zoom:1,px:0,py:0,rot:0,fh:1,fv:1,br:100,ct:100,inv:false,annos:[],pts:[],cpts:[],mod:'CT',drawing:false,sx:0,sy:0,lx:0,ly:0,bound:false};

function openFs(mod) {
  FS.mod=mod||curMod;
  const ov=document.getElementById('fs-ov');
  ov.classList.add('open');

  mr.innerHTML=ALL_MODS.map(m=>{

    return`<button class="mod-btn${act}"${dis} style="font-size:.67rem;padding:.22rem .6rem;" data-fsm="${m}">${m}</button>`;
  }).join('');
  mr.querySelectorAll('[data-fsm]').forEach(b=>b.addEventListener('click',()=>{

function initFsCvs(){
  const body=document.getElementById('fs-body');if(!body)return;
  const bgC=document.getElementById('fs-bg');
  const drC=document.getElementById('fs-dr');
  if(!bgC||!drC)return;
  // fs-body uses flex:1 — get actual rendered size
  const W=body.clientWidth||window.innerWidth;
  const Ht=body.clientHeight||window.innerHeight-56;
  if(W<10||Ht<10){
    // Not rendered yet — retry
    requestAnimationFrame(()=>initFsCvs());
    return;
  }
  bgC.width=drC.width=W; bgC.height=drC.height=Ht;
  // Preserve annotations if reinitializing (modality change)
  const prevAnnos=FS.annos||[];
  Object.assign(FS,{bg:bgC.getContext('2d'),dr:drC.getContext('2d'),W,H:Ht,
    zoom:1,px:0,py:0,rot:0,fh:1,fv:1,br:100,ct:100,inv:false,
    annos:[],pts:[],cpts:[],drawing:false});
  drawFsBg(); drawFsAnno();
  if(!FS.bound){bindFsCvs();FS.bound=true;}

  // Show hints
  const old=body.querySelector('.fs-hints');if(old)old.remove();
  const hints=document.createElement('div');hints.className='fs-hints';
  hints.innerHTML=`<span class="hitem"><span class="hkey">ESC</span>Close fullscreen</span><span class="hsep">·</span><span class="hitem"><span class="hkey">Scroll</span>Zoom</span><span class="hsep">·</span><span class="hitem"><span class="hkey">Drag</span>Pan</span><span class="hsep">·</span><span class="hitem"><span class="hkey">Dbl-click</span>Reset zoom</span><span class="hsep">·</span><span class="hitem">Hover tools for tips</span>`;
  body.appendChild(hints);
}

function drawFsBg(){
  const s=FS,ctx=s.bg;if(!ctx||!s.W||!s.H)return;
  const{W,H,mod}=s,dark=H_th();
  ctx.clearRect(0,0,W,H);ctx.save();
  ctx.translate(W/2+s.px,H/2+s.py);ctx.scale(s.zoom*s.fh,s.zoom*s.fv);ctx.rotate(s.rot*Math.PI/180);ctx.translate(-W/2,-H/2);
  ctx.fillStyle=dark?'#060a12':'#1a2535';ctx.fillRect(0,0,W,H);
  const gc=dark?'rgba(57,208,184,.06)':'rgba(30,160,140,.10)';
  ctx.strokeStyle=gc;ctx.lineWidth=1;
  for(let x=W/8;x<W;x+=W/8){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=H/8;y<H;y+=H/8){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.strokeStyle=dark?'rgba(57,208,184,.20)':'rgba(30,160,140,.32)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);
  const r=Math.min(W,H)*.32;
  ctx.beginPath();ctx.arc(W/2,H/2,r,0,Math.PI*2);
  ctx.fillStyle=dark?'rgba(30,130,115,.10)':'rgba(20,120,105,.20)';ctx.fill();
  ctx.strokeStyle=dark?'rgba(57,208,184,.36)':'rgba(30,160,140,.62)';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,r*.52,0,Math.PI*2);
  ctx.strokeStyle=dark?'rgba(57,208,184,.14)':'rgba(30,160,140,.28)';ctx.lineWidth=1;ctx.stroke();
  const tx=dark?'rgba(57,208,184,.70)':'rgba(30,160,140,.92)';
  ctx.fillStyle=tx;ctx.textAlign='center';
  ctx.font=`700 ${Math.min(W,H)*.038}px IBM Plex Mono,monospace`;
  ctx.fillText((D[curStruct]?.name||'').toUpperCase(),W/2,H/2+r+Math.min(W,H)*.065);
  ctx.font=`700 ${Math.min(W,H)*.032}px IBM Plex Mono,monospace`;ctx.textAlign='left';
  ctx.fillText(mod,W*.022,H*.056);
  ctx.restore();
  const el=document.getElementById('fs-bg');
  if(el)el.style.filter=`brightness(${s.br}%) contrast(${s.ct}%)${s.inv?' invert(1)':''}`;
}
function H_th(){return document.documentElement.dataset.theme==='dark';}

function drawFsAnno(){
  const s=FS,ctx=s.dr;if(!ctx||!s.W||!s.H)return;
  ctx.clearRect(0,0,s.W,s.H);
  ctx.font='500 12px IBM Plex Mono,monospace';
  const T='rgba(57,208,184,.95)',Y='#f0d060',P='#f06080',G='#60d090';

  const ol=document.getElementById('fs-ol');if(!ol)return;
  const mt=s.annos.filter(a=>['measure','ssd','roi-rect','roi-ellipse','follicle','suv-roi','hu-probe','suv-probe','mtv'].includes(a.t)).slice(-4).map(a=>{
    if(a.t==='measure'||a.t==='ssd'){const d=dist2(a.d);return`<span class="mtag">${a.t==='ssd'?'↕':'📏'} ${d}mm*</span>`;}
    if(['roi-rect','field-size','roi-counts'].includes(a.t))return`<span class="mtag">⬜ ${Math.round(Math.abs(a.d[2]*a.d[3])*.12)}mm²*</span>`;
    if(['roi-ellipse','follicle','suv-roi'].includes(a.t))return`<span class="mtag">⭕ A:${Math.round(Math.abs(a.d[2])*.6)} B:${Math.round(Math.abs(a.d[3])*.6)}mm*</span>`;

  });

}

function bindFsCvs(){
  const body=document.getElementById('fs-body');if(!body)return;
  const s=FS;
  function pos(e){return[(e.clientX-body.getBoundingClientRect().left)*s.W/body.clientWidth,(e.clientY-body.getBoundingClientRect().top)*s.H/body.clientHeight];}
  body.addEventListener('wheel',e=>{e.preventDefault();s.zoom=Math.max(.3,Math.min(12,s.zoom*(e.deltaY>0?.9:1.1)));drawFsBg();const st=document.getElementById('fs-stat');if(st)st.textContent=`${activeTool} | ×${s.zoom.toFixed(1)}`;},{passive:false});
  body.addEventListener('dblclick',()=>{s.zoom=1;s.px=0;s.py=0;drawFsBg();const st=document.getElementById('fs-stat');if(st)st.textContent='pan | ×1.0';});
  body.addEventListener('pointerdown',e=>{
    if(e.target.closest('.fs-tb,.fs-hints,.cvs-stat,.cvs-ol'))return;
    body.setPointerCapture(e.pointerId);
    const[x,y]=pos(e),t=activeTool;
    s.drawing=true;s.sx=x;s.sy=y;s.lx=e.clientX;s.ly=e.clientY;
    if(t==='angle'){s.pts.push([x,y]);if(s.pts.length===3){s.annos.push({t:'angle',d:[...s.pts[0],...s.pts[1],...s.pts[2]]});s.pts=[];drawFsAnno();}s.drawing=false;return;}
    if(t==='hu-probe'){s.annos.push({t:'hu-probe',d:[x,y,null,`HU:${Math.round(Math.random()*350-80)}*`]});drawFsAnno();s.drawing=false;return;}
    if(t==='suv-probe'){s.annos.push({t:'suv-probe',d:[x,y,null,(Math.random()*12+.5).toFixed(1)]});drawFsAnno();s.drawing=false;return;}
    if(t==='h-line'){s.annos.push({t:'h-line',d:[y]});drawFsAnno();s.drawing=false;return;}
    if(t==='depth'){s.annos.push({t:'depth',d:[x]});drawFsAnno();s.drawing=false;return;}
    if(t==='isodose'){s.annos.push({t:'isodose',d:[x,y]});drawFsAnno();s.drawing=false;return;}
    if(t==='annotate'){const tx=prompt('Annotation:');if(tx)s.annos.push({t:'annotate',d:[x,y,tx]});drawFsAnno();s.drawing=false;return;}
    if(t==='contour'){s.cpts=[[x,y]];}
  });
  body.addEventListener('pointermove',e=>{
    if(!s.drawing)return;const[x,y]=pos(e),t=activeTool;
    if(t==='pan'){s.px+=e.clientX-s.lx;s.py+=e.clientY-s.ly;s.lx=e.clientX;s.ly=e.clientY;drawFsBg();return;}
    if(t==='contour'){s.cpts.push([x,y]);drawFsAnno();const ctx=s.dr;ctx.strokeStyle=contCol;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(s.cpts[0][0],s.cpts[0][1]);s.cpts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.stroke();return;}
    const ctx=s.dr,w=x-s.sx,h=y-s.sy;drawFsAnno();ctx.strokeStyle='rgba(57,208,184,.75)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    if(['roi-ellipse','follicle','suv-roi'].includes(t)){ctx.beginPath();ctx.ellipse(s.sx+w/2,s.sy+h/2,Math.abs(w/2),Math.abs(h/2),0,0,Math.PI*2);ctx.stroke();}
    else if(['ssd','measure'].includes(t)){ctx.beginPath();ctx.moveTo(s.sx,s.sy);ctx.lineTo(x,y);ctx.stroke();}
    else{ctx.strokeRect(s.sx,s.sy,w,h);}
    ctx.setLineDash([]);
  });
  body.addEventListener('pointerup',e=>{
    if(!s.drawing)return;s.drawing=false;
    const[x,y]=pos(e),t=activeTool,w=x-s.sx,h=y-s.sy,mn=6;
    if(t==='contour'){if(s.cpts.length>3)s.annos.push({t:'contour',d:[s.cpts,contLbl,contCol]});s.cpts=[];drawFsAnno();return;}
    if(t==='pan')return;
    if(['measure','ssd'].includes(t)&&(Math.abs(w)>mn||Math.abs(h)>mn))s.annos.push({t:t,d:[s.sx,s.sy,x,y]});
    else if(['roi-rect','field-size','roi-counts'].includes(t)&&Math.abs(w)>mn&&Math.abs(h)>mn)s.annos.push({t:'roi-rect',d:[s.sx,s.sy,w,h]});
    else if(t==='mtv'&&Math.abs(w)>mn&&Math.abs(h)>mn)s.annos.push({t:'mtv',d:[s.sx,s.sy,w,h]});
    else if(['roi-ellipse','follicle','suv-roi'].includes(t)&&Math.abs(w)>mn&&Math.abs(h)>mn)s.annos.push({t:'roi-ellipse',d:[s.sx+w/2,s.sy+h/2,w/2,h/2]});
    else if(t==='roi-signal'&&Math.abs(w)>mn&&Math.abs(h)>mn){const sg=Math.round(Math.random()*500+80);s.annos.push({t:'roi-rect',d:[s.sx,s.sy,w,h]});s.annos.push({t:'annotate',d:[s.sx,s.sy+h+14,`SI≈${sg}*`]});}
    else if(t==='ctr'&&Math.abs(w)>mn){const ctr=(Math.abs(w)/s.W*1.85).toFixed(2);s.annos.push({t:'ssd',d:[s.sx,s.sy,x,y]});s.annos.push({t:'annotate',d:[s.sx,s.sy-10,`CTR≈${ctr}*`]});}
    drawFsAnno();const st=document.getElementById('fs-stat');if(st)st.textContent=`${t} | ×${s.zoom.toFixed(1)}`;
  });
}

function buildFsTb(){
  const old=document.getElementById('fs-tb');if(!old)return;

  const tb=old.cloneNode(false);

  tb.id='fs-tb';

  tb.addEventListener('click',e=>{

        }

      } else if(pb.dataset.oar!==undefined){

        pb.closest('.tb-row')?.querySelectorAll('.pbtn[data-oar]').forEach(b=>b.classList.toggle('active',b===pb));

  },{capture:false});
  tb.addEventListener('input',e=>{

    else if(sl.id==='sl-br'){FS.br=v;drawFsBg();}else if(sl.id==='sl-ct'){FS.ct=v;drawFsBg();}else if(sl.id==='sl-gn'){FS.br=v;drawFsBg();}
  });

function applyFsAction(t){
  if(t==='rotate-cw') FS.rot=(FS.rot+90)%360;
  if(t==='rotate-ccw')FS.rot=(FS.rot-90+360)%360;
