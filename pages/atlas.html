// ═══════════════════════════════════════════════════════════
// TTS MODULE — Task #7
// Web Speech API · EN/AR · Slow/Normal/Fast
// ═══════════════════════════════════════════════════════════
const TTS = {
  enabled : false,
  lang    : 'en',   // 'en' | 'ar'
  rate    : 1.0,    // 0.7 | 1.0 | 1.4
  speaking: false,
  synth   : window.speechSynthesis || null,
  current : null,   // active tts-btn element
};

// ── Lang map ──────────────────────────────────────────────
const TTS_LANG = { en:'en-US', ar:'ar-SA' };

// ── Speak ─────────────────────────────────────────────────
function ttsSpeak(text, btn) {
  if (!TTS.synth) { ttsError(btn, 'TTS not supported'); return; }

  // Stop any current speech
  TTS.synth.cancel();
  if (TTS.current && TTS.current !== btn) {
    TTS.current.classList.remove('speaking');
    TTS.current.textContent = '🔊';
  }

  // If same button pressed again → toggle off
  if (TTS.current === btn && TTS.speaking) {
    TTS.speaking = false;
    TTS.current  = null;
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
    ttsNow('');
    return;
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang  = TTS_LANG[TTS.lang] || 'en-US';
  utter.rate  = TTS.rate;
  utter.pitch = 1;

  // Try to pick best voice
  const voices = TTS.synth.getVoices();
  const match  = voices.find(v => v.lang.startsWith(TTS.lang==='ar'?'ar':'en'));
  if (match) utter.voice = match;

  utter.onstart = () => {
    TTS.speaking = true;
    TTS.current  = btn;
    btn.classList.add('speaking');
    btn.textContent = '⏹';
    ttsNow(text);
  };
  utter.onend = utter.onerror = () => {
    TTS.speaking = false;
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
    if (TTS.current === btn) TTS.current = null;
    if (utter.error) ttsError(btn, utter.error);
  };

  TTS.synth.speak(utter);
}

function ttsError(btn, msg) {
  if (btn) { btn.classList.add('error'); setTimeout(()=>btn.classList.remove('error'),1500); }
  console.warn('TTS error:', msg);
}

function ttsNow(text) {
  const el = document.getElementById('tts-now');
  if (!el) return;
  el.textContent = '';
  if (text) {
    el.appendChild(document.createTextNode('Speaking: '));
    const span = document.createElement('span');
    span.textContent = text;
    el.appendChild(span);
  } else {
    el.textContent = 'Click 🔊 on any term';
  }
}

// ── Build speak button ────────────────────────────────────
function ttsMkBtn(text, arText) {
  const btn = document.createElement('button');
  btn.className   = 'tts-btn';
  btn.textContent = '🔊';
  btn.title       = `Pronounce: ${text}`;
  btn.setAttribute('aria-label', `Pronounce ${text}`);
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (!TTS.enabled) { ttsShowPanel(); }
    const spk = TTS.lang === 'ar' && arText ? arText : text;
    ttsSpeak(spk, btn);
  });
  return btn;
}

// ── Inject TTS buttons into current page ──────────────────
function ttsInjectButtons() {
  if (!TTS.enabled) return;

  // Structure name (h1.s-name)
  document.querySelectorAll('.s-name').forEach(el => {
    if (el.querySelector('.tts-btn')) return;
    const name = el.textContent.trim();
    // Get Arabic name from next sibling .s-ar
    const arEl = el.nextElementSibling;
    const ar   = arEl && arEl.classList.contains('s-ar') ? arEl.textContent.trim() : '';
    el.appendChild(ttsMkBtn(name, ar));
  });

  // Arabic name (.s-ar)
  document.querySelectorAll('.s-ar').forEach(el => {
    if (el.querySelector('.tts-btn')) return;
    const ar = el.textContent.trim();
    if (!ar) return;
    el.appendChild(ttsMkBtn(ar, ar));
  });

  // Info card labels (Location, Function, Clinical Note) — just the label
  document.querySelectorAll('.info-lbl').forEach(el => {
    if (el.querySelector('.tts-btn')) return;
    const lbl = el.textContent.trim();
    el.appendChild(ttsMkBtn(lbl, ''));
  });

  // Sidebar structure names
  document.querySelectorAll('.sb-name').forEach(el => {
    if (el.querySelector('.tts-btn')) return;
    const sib = el.nextElementSibling;
    const ar  = sib && sib.classList.contains('sb-ar') ? sib.textContent.trim() : '';
    el.appendChild(ttsMkBtn(el.textContent.replace('🔊','').trim(), ar));
  });
}

// ── Show / hide panel ────────────────────────────────────
function ttsShowPanel() {
  document.getElementById('tts-panel').classList.remove('hidden');
  TTS.enabled = true;
  document.getElementById('tts-toggle').classList.add('active');
  ttsInjectButtons();
}
function ttsHidePanel() {
  document.getElementById('tts-panel').classList.add('hidden');
  TTS.enabled = false;
  document.getElementById('tts-toggle').classList.remove('active');
  if (TTS.synth) TTS.synth.cancel();
}

// ── Panel controls ────────────────────────────────────────
document.getElementById('tts-toggle').addEventListener('click', () => {
  TTS.enabled ? ttsHidePanel() : ttsShowPanel();
});
document.getElementById('tts-close').addEventListener('click', ttsHidePanel);

document.getElementById('tts-lang-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]'); if (!btn) return;
  TTS.lang = btn.dataset.lang;
  document.querySelectorAll('#tts-lang-seg button').forEach(b => b.classList.toggle('active', b===btn));
  if (TTS.synth) TTS.synth.cancel();
});

document.getElementById('tts-speed-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-rate]'); if (!btn) return;
  TTS.rate = parseFloat(btn.dataset.rate);
  document.querySelectorAll('#tts-speed-seg button').forEach(b => b.classList.toggle('active', b===btn));
});

// Re-inject buttons after each render (render replaces main innerHTML)
const _origRender = render;
// Patch render to re-inject TTS buttons after DOM update
const _origGo = ()=>{};
// We hook into the render cycle via MutationObserver on #main
const _ttsObs = new MutationObserver(() => {
  if (TTS.enabled) setTimeout(ttsInjectButtons, 200);
});
_ttsObs.observe(document.getElementById('main'), { childList: true, subtree: false });

// Pre-load voices (some browsers need this)
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
