<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Comparison</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root,[data-theme="dark"]{--bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.38);--acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.10);--border:rgba(45,212,200,.15);--border-s:rgba(232,240,245,.08);--nav-bg:rgba(8,14,20,.92);--acc-ink:#08100e}
[data-theme="dim"]{--bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.42);--acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.10);--border:rgba(11,107,100,.15);--border-s:rgba(15,30,42,.1);--nav-bg:rgba(237,242,248,.92);--acc-ink:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--onav-h,56px);-webkit-font-smoothing:antialiased}
body[dir="rtl"]{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
a{text-decoration:none;color:inherit}
.strip{background:var(--bg-e);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.strip-grp{display:flex;align-items:center;gap:6px}
.strip-lbl{font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--text-m);font-family:'IBM Plex Mono',monospace;margin-inline-end:4px}
.strip select{padding:7px 11px;background:var(--bg-s);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:12.5px;font-weight:600}
.strip select:focus{outline:none;border-color:var(--acc)}
.chip{padding:6px 11px;font-size:11px;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--text-s);cursor:pointer;border-radius:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;transition:.12s}
.chip:hover{color:var(--acc);border-color:var(--acc-dim)}
.chip.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
.info-tag{margin-inline-start:auto;font-size:11px;color:var(--text-m);font-family:'IBM Plex Mono',monospace}
.grid{padding:14px 20px 24px;display:grid;gap:10px}
.grid.cols-1{grid-template-columns:1fr}
.grid.cols-2{grid-template-columns:repeat(2,1fr)}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
.grid.cols-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1280px){.grid.cols-3,.grid.cols-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}}
.cell{display:flex;flex-direction:column;background:var(--bg-e);border:1px solid var(--border-s);border-radius:10px;overflow:hidden;min-height:520px}
.cell-head{padding:6px 8px;background:rgba(0,0,0,.35);display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border-s)}
.cell-head select{background:var(--bg-s);border:1px solid var(--acc-dim);color:var(--acc);font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;padding:4px 8px;border-radius:4px;cursor:pointer;max-width:130px}
.cell-head select:focus{outline:none;border-color:var(--acc)}
.cell-body{flex:1;display:flex}
.desc-bar{padding:14px 20px;background:var(--bg-e);border-top:1px solid var(--border-s);font-size:13.5px;color:var(--text-s);line-height:1.7}
.desc-bar strong{color:var(--acc)}
.disc{padding:14px 20px 24px;font-size:11px;color:var(--text-m);text-align:center;line-height:1.7}
</style>
</head>
<body>

<div class="strip">
  <div class="strip-grp"><span class="strip-lbl" data-i18n="compare.structure">Structure</span><select id="selStruct"></select></div>
  <div class="strip-grp"><span class="strip-lbl" data-i18n="compare.view">View</span>
    <button class="chip" data-cols="1">1</button>
    <button class="chip on" data-cols="2">2×</button>
    <button class="chip" data-cols="3">3×</button>
    <button class="chip" data-cols="4">4×</button>
  </div>
  <div class="strip-grp"><span class="strip-lbl" data-i18n="compare.sync">Sync</span>
    <button class="chip on" id="btnSync" title="Synchronize WW/WL/Zoom across panes">LINK</button>
  </div>
  <div class="info-tag" data-i18n="common.educational">⚕️ Educational only</div>
</div>

<div class="grid cols-2" id="grid"></div>

<div class="desc-bar" id="descBar"><strong>OmniRad</strong> <span> — pick a structure. Each pane lets you pick modality · plane · variant independently.</span></div>
<div class="disc">⚕️ Educational tool — not for diagnosis or clinical use.<br>© 2026 OmniRad Platform.</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/i18n.js"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/data/anatomy-master.js"></script>
<script src="../modules/data/anatomy-master-v2.js"></script>
<script src="../modules/omnirad-term.js"></script>
<script src="../modules/omnirad-search.js"></script>
<script src="../modules/omnirad-typography.js"></script>
<script src="../modules/omnirad-avatars.js"></script>
<script src="../modules/omnirad-nav.js" data-base="../"></script>
<!-- Sprint 4d: Standardized Naming System (shared across pages) -->
<script src="../modules/data/dicom-body-parts.js"></script>
<script src="../modules/data/radiology-playbook.js"></script>
<script src="../modules/data/radiology-arabic.js"></script>
<script src="../modules/omnirad-naming.js"></script>
<script src="../modules/structures.js"></script>
<script src="../modules/viewer.js"></script>
<script src="../modules/omnirad-cloud.js"></script>
<script>
const S = window.OMNIRAD_STRUCTURES || [];
const U = window.OMNIRAD_STRUCT_UTIL || {};
const $ = id => document.getElementById(id);
const state = { structId:(S[0]&&S[0].id)||'brain', cols:2, sync:true, cells:[], cloudCache:{} };

(function(){
  const sel = $('selStruct');
  const REGION_AR = {
    'Head & CNS':'الرأس والجهاز العصبي','Head & Neck':'الرأس والرقبة','Chest':'الصدر',
    'Abdomen':'البطن','Pelvis':'الحوض','Musculoskeletal':'الجهاز العضلي الهيكلي',
    'Spine':'العمود الفقري','Upper limb':'الطرف العلوي','Lower limb':'الطرف السفلي'
  };
  const isAr = () => (window.OmniRadI18n && OmniRadI18n.lang === 'ar');
  function rebuild(){
    const ar = isAr();
    const groups = {};
    S.forEach(s => { const k = s.region || 'Other'; (groups[k] = groups[k] || []).push(s); });
    const order = ['Head & CNS','Head & Neck','Chest','Abdomen','Pelvis','Spine','Upper limb','Lower limb','Musculoskeletal'];
    const keys = Object.keys(groups).sort((a,b)=>{
      const ia = order.indexOf(a), ib = order.indexOf(b);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
    sel.innerHTML = keys.map(k => {
      const label = ar ? (REGION_AR[k] || k) : k;
      return `<optgroup label="${label}">` + groups[k].map(s => `<option value="${s.id}">${ar ? s.ar : s.en} · ${ar ? s.en : s.ar}</option>`).join('') + `</optgroup>`;
    }).join('');
    sel.value = state.structId;
  }
  rebuild();
  window.addEventListener('omnirad-lang', rebuild);
  sel.addEventListener('change', e=>{ state.structId = e.target.value; renderGrid(); updateDesc(); });
})();
function structure(){ return S.find(s=>s.id===state.structId) || S[0]; }
function updateDesc(){ const st = structure(); $('descBar').innerHTML = `<strong data-term="${st.id}">${st.en} · ${st.ar}</strong> — ${st.desc || ''}`; if (window.OmniRadTerm && OmniRadTerm.scan) OmniRadTerm.scan($('descBar')); }

document.querySelectorAll('[data-cols]').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('[data-cols]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); state.cols = parseInt(b.dataset.cols);
    renderGrid();
  });
});
$('btnSync').addEventListener('click', ()=>{
  state.sync = !state.sync; $('btnSync').classList.toggle('on', state.sync);
  renderGrid();
});

function renderGrid(){
  const grid = $('grid'); grid.className = 'grid cols-' + state.cols;
  // destroy old viewers
  state.cells.forEach(c => { try { c.viewer.destroy(); } catch(e){} });
  grid.innerHTML = ''; state.cells = [];
  const st = structure();
  const mods = U.modalitiesFor(st.id);
  for (let i = 0; i < state.cols; i++){
    const modality = mods[i % mods.length] || mods[0] || '';
    const planes = U.planesFor(st.id, modality);
    const plane = planes[0] || '';
    const variants = U.variantsFor(st.id, modality, plane);
    const variant = (variants[0] && variants[0].variant) || '';
    makeCell(grid, i, { modality, plane, variant });
  }
}

function makeCell(grid, i, init){
  const cell = document.createElement('div'); cell.className = 'cell';
  cell.innerHTML = `
    <div class="cell-head">
      <select class="c-mod"></select>
      <select class="c-plane"></select>
      <select class="c-var"></select>
    </div>
    <div class="cell-body"></div>`;
  grid.appendChild(cell);
  const body = cell.querySelector('.cell-body');
  const linkKey = state.sync ? ('cmp-'+state.structId) : null;
  const viewer = OmniRadViewer.create(body, { compact:false, linkKey });
  const c = {
    cell, viewer,
    modSel: cell.querySelector('.c-mod'),
    planeSel: cell.querySelector('.c-plane'),
    varSel: cell.querySelector('.c-var'),
    modality: init.modality, plane: init.plane, variant: init.variant
  };
  state.cells.push(c);
  fillSelects(c);
  loadCell(c);
}

function fillSelects(c){
  const st = structure();
  const mods = U.modalitiesFor(st.id);
  c.modSel.innerHTML = mods.map(m=>`<option value="${m}"${m===c.modality?' selected':''}>${m}</option>`).join('');
  const planes = U.planesFor(st.id, c.modality);
  if (!planes.includes(c.plane)) c.plane = planes[0] || '';
  c.planeSel.innerHTML = planes.map(pl=>`<option value="${pl}"${pl===c.plane?' selected':''}>${pl}</option>`).join('');
  const vars = U.variantsFor(st.id, c.modality, c.plane);
  if (!vars.some(v=>v.variant===c.variant)) c.variant = (vars[0]&&vars[0].variant)||'';
  c.varSel.innerHTML = vars.map(v=>`<option value="${v.variant}"${v.variant===c.variant?' selected':''}>${v.variant}</option>`).join('');
  c.modSel.onchange = e => { c.modality = e.target.value; fillSelects(c); loadCell(c); };
  c.planeSel.onchange = e => { c.plane = e.target.value; fillSelects(c); loadCell(c); };
  c.varSel.onchange = e => { c.variant = e.target.value; loadCell(c); };
}

async function loadCell(c){
  const st = structure();
  // Prefer approved cloud image; fall back to bundled structures.js
  let cloudUrl = null;
  try {
    if (window.OmniRadCloud) {
      const key = st.id + '|' + c.modality + '|' + c.plane + '|' + c.variant;
      let row = state.cloudCache[key];
      if (!row){
        const rows = await OmniRadCloud.fetchApproved({ structId: st.id, modality: c.modality, plane: c.plane, sequence: c.variant, limit: 1 });
        row = rows[0]; if (row) state.cloudCache[key] = row;
      }
      if (row && row.image_path) cloudUrl = await OmniRadCloud.signedUrl(row.image_path, 3600);
    }
  } catch(e){ console.warn('[compare] cloud lookup', e); }

  if (cloudUrl){
    c.viewer.load(cloudUrl, {
      ww: 300, wl: 150,
      title: `${c.modality} · ${c.plane}`, subtitle: `${c.variant} · ☁ approved`,
      name: `${st.id}_${c.modality}_${c.plane}_${c.variant}`
    });
    return;
  }
  const img = U.findImage(st.id, c.modality, c.plane, c.variant);
  if (!img){ c.viewer.load('', { title:`${c.modality} · ${c.plane}`, subtitle: c.variant }); return; }
  c.viewer.load(img.path, {
    ww: img.ww || 300, wl: img.wl || 150,
    title: `${c.modality} · ${c.plane}`, subtitle: c.variant,
    name: `${st.id}_${c.modality}_${c.plane}_${c.variant}`
  });
}

window.addEventListener('omnirad-lang', updateDesc);
updateDesc();
renderGrid();
</script>
</body>
</html>
