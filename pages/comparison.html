<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Comparison</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root,[data-theme="dark"]{
  --bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--bg-ov:#162030;
  --text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.38);
  --acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.10);
  --border:rgba(45,212,200,.12);--border-s:rgba(232,240,245,.08);
  --nav-bg:rgba(8,14,20,.92);--acc-ink:#08100e;
  --viewer-bg:#000;--viewer-anno:#a3e635;--viewer-orient:#f59e0b;
}
[data-theme="dim"]{
  --bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--bg-ov:#d6dde6;
  --text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.42);
  --acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.10);
  --border:rgba(11,107,100,.15);--border-s:rgba(15,30,42,.1);
  --nav-bg:rgba(237,242,248,.92);--acc-ink:#fff;
  --viewer-bg:#000;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-top:var(--onav-h,56px)}
body[dir="rtl"]{font-family:'IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
a{text-decoration:none;color:inherit}

/* ─────── Top control strip ─────── */
.strip{background:var(--bg-e);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.strip-grp{display:flex;align-items:center;gap:6px}
.strip-lbl{font-size:9.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--text-m);font-family:'IBM Plex Mono',monospace;margin-inline-end:4px}
.strip select{padding:7px 11px;background:var(--bg-s);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:12.5px;font-weight:600}
.strip select:focus{outline:none;border-color:var(--acc)}
.chip{padding:6px 11px;font-size:11px;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--text-s);cursor:pointer;border-radius:14px;font-family:inherit;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;transition:.12s}
.chip:hover{color:var(--acc);border-color:var(--acc-dim)}
.chip.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
.strip .info-tag{margin-inline-start:auto;font-size:11px;color:var(--text-m);font-family:'IBM Plex Mono',monospace}

/* ─────── Comparison grid ─────── */
.grid{padding:16px 22px 32px;display:grid;gap:12px}
.grid.cols-1{grid-template-columns:1fr}
.grid.cols-2{grid-template-columns:repeat(2,1fr)}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
.grid.cols-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1180px){ .grid.cols-3,.grid.cols-4{grid-template-columns:repeat(2,1fr)} }
@media(max-width:720px){ .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr} }

.pane{position:relative;background:var(--viewer-bg);border-radius:8px;overflow:hidden;aspect-ratio:1/1;user-select:none}
.pane .pane-head{position:absolute;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);z-index:2;pointer-events:none}
.pane .pane-name{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:var(--acc);letter-spacing:.05em}
.pane .pane-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.04em;text-transform:uppercase}
.pane canvas{display:block;width:100%;height:100%;cursor:ns-resize;image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges}
.pane .anno{position:absolute;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--viewer-anno);text-shadow:0 0 3px rgba(0,0,0,.9);pointer-events:none;line-height:1.4}
.pane .anno-bl{bottom:6px;left:8px}
.pane .anno-br{bottom:6px;right:8px;text-align:right}
.pane .orient{position:absolute;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;color:var(--viewer-orient);text-shadow:0 0 3px rgba(0,0,0,.9);pointer-events:none}
.pane .orient-r{top:50%;left:6px;transform:translateY(-50%)}
.pane .orient-l{top:50%;right:6px;transform:translateY(-50%)}
.pane.empty{display:flex;align-items:center;justify-content:center;background:var(--bg-e);color:var(--text-m);font-size:12px}

/* ─────── Info bar ─────── */
.desc-bar{padding:14px 22px;background:var(--bg-e);border-top:1px solid var(--border-s);font-size:13.5px;color:var(--text-s);line-height:1.7}
.desc-bar strong{color:var(--acc)}
.disc{padding:14px 22px 28px;font-size:11px;color:var(--text-m);text-align:center;line-height:1.7}
</style>
</head>
<body>

<!-- Top control strip -->
<div class="strip">
  <div class="strip-grp">
    <span class="strip-lbl">Structure</span>
    <select id="selStruct"></select>
  </div>
  <div class="strip-grp">
    <span class="strip-lbl">View</span>
    <button class="chip" data-cols="1">1</button>
    <button class="chip on" data-cols="2">2×</button>
    <button class="chip" data-cols="3">3×</button>
    <button class="chip" data-cols="4">4×</button>
  </div>
  <div class="strip-grp" id="modChips" style="flex-wrap:wrap"></div>
  <div class="strip-grp">
    <span class="strip-lbl">Sync</span>
    <button class="chip on" id="btnSync" title="Synchronize WW/WL/Zoom/Pan across panes">LINK</button>
  </div>
  <div class="info-tag">⚕️ Educational only</div>
</div>

<!-- Comparison grid -->
<div class="grid cols-2" id="grid"></div>

<!-- Description -->
<div class="desc-bar" id="descBar">
  <strong>OmniRad Comparison</strong> — pick a structure and 2–4 modalities to see them side by side, the way radiologists actually read.
</div>

<div class="disc">
  ⚕️ Educational tool — not for diagnosis or clinical use.<br>
  © 2026 OmniRad Platform. All rights reserved.
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/omnirad-nav.js" data-base="../"></script>

<script>
/* Shared structures list (same source of truth as atlas.html) */
const STRUCTURES = [
  { id:'brain', en:'Brain · الدماغ', desc:'Central nervous system organ. Best evaluated with MRI for parenchymal detail and CT for acute hemorrhage.',
    modalities:[
      { id:'MRI T2', path:'../images/structures/brain/mri_t2_original.png', ww:280, wl:120 },
      { id:'MRI T1', path:'../images/structures/brain/mri_original.png',    ww:300, wl:150 },
      { id:'MRI PD', path:'../images/structures/brain/mri_pd_original.png', ww:220, wl:110 }
    ]},
  { id:'neck', en:'Neck · الرقبة', desc:'Cervical spine, airway, thyroid and vascular structures.',
    modalities:[
      { id:'MRI T2', path:'../images/structures/neck/mri_t2_original.png', ww:260, wl:110 },
      { id:'MRI T1', path:'../images/structures/neck/mri_original.png',    ww:280, wl:140 }
    ]},
  { id:'thorax', en:'Thorax · الصدر', desc:'Chest wall, mediastinum, cardiothoracic structures.',
    modalities:[
      { id:'MRI T2', path:'../images/structures/thorax/mri_t2_original.png', ww:300, wl:120 },
      { id:'MRI T1', path:'../images/structures/thorax/mri_original.png',    ww:280, wl:130 }
    ]},
  { id:'abdomen', en:'Abdomen · البطن', desc:'Global abdominal view including solid organs, bowel, and vasculature.',
    modalities:[
      { id:'MRI T2', path:'../images/structures/abdomen/mri_t2_original.png', ww:280, wl:110 },
      { id:'MRI T1', path:'../images/structures/abdomen/mri_original.png',    ww:260, wl:140 }
    ]},
  { id:'liver', en:'Liver · الكبد', desc:'Largest solid abdominal organ, RUQ beneath the right hemidiaphragm.',
    modalities:[
      { id:'CT (original)', path:'../images/structures/liver/ct_original.png', ww:150, wl:60 },
      { id:'CT (colored)',  path:'../images/structures/liver/ct_colored.png',  ww:250, wl:128 }
    ]},
  { id:'kidney', en:'Kidney · الكلية', desc:'Retroperitoneal, right lower than left. T12–L3 span.',
    modalities:[
      { id:'CT (original)', path:'../images/structures/kidney/ct_original.png', ww:170, wl:60 },
      { id:'CT (colored)',  path:'../images/structures/kidney/ct_colored.png',  ww:250, wl:128 }
    ]},
  { id:'spleen', en:'Spleen · الطحال', desc:'LUQ, behind stomach, along ribs 9–11.',
    modalities:[
      { id:'MRI (original)', path:'../images/structures/spleen/mri_original.png', ww:220, wl:100 },
      { id:'MRI (colored)',  path:'../images/structures/spleen/mri_colored.png',  ww:250, wl:128 }
    ]},
  { id:'bladder', en:'Urinary bladder · المثانة', desc:'Anterior pelvis, behind pubic symphysis.',
    modalities:[
      { id:'CT (original)', path:'../images/structures/bladder/ct_original.png', ww:200, wl:70 },
      { id:'CT (colored)',  path:'../images/structures/bladder/ct_colored.png',  ww:250, wl:128 }
    ]},
  { id:'bone', en:'Bone · العظم', desc:'CT bone window — trabecular vs cortical detail.',
    modalities:[
      { id:'CT (original)', path:'../images/structures/bone/ct_original.png', ww:2000, wl:400 },
      { id:'CT (colored)',  path:'../images/structures/bone/ct_colored.png',  ww:2000, wl:400 }
    ]}
];

/* ─────── State ─────── */
const S = {
  structId: STRUCTURES[0].id,
  selectedModalityIds: [],
  cols: 2,
  sync: true,
  imgCache: {},
  panes: [] // { modId, canvas, ctx, img, ww, wl, zoom, panX, panY, invert }
};

const $ = (id) => document.getElementById(id);
function struct(){ return STRUCTURES.find(s=>s.id===S.structId); }

/* Populate structure select */
function fillSelect(){
  const sel = $('selStruct');
  sel.innerHTML = STRUCTURES.map(s=>`<option value="${s.id}">${s.en}</option>`).join('');
  sel.value = S.structId;
}

/* Modality chips */
function renderModChips(){
  const wrap = $('modChips'); wrap.innerHTML = '<span class="strip-lbl">Modality</span>';
  const st = struct();
  st.modalities.forEach((m)=>{
    const b = document.createElement('button');
    b.className = 'chip' + (S.selectedModalityIds.includes(m.id) ? ' on' : '');
    b.textContent = m.id;
    b.addEventListener('click', ()=>{
      const i = S.selectedModalityIds.indexOf(m.id);
      if (i >= 0) S.selectedModalityIds.splice(i, 1);
      else S.selectedModalityIds.push(m.id);
      renderModChips(); renderGrid();
    });
    wrap.appendChild(b);
  });
}

/* Build the grid of panes */
function renderGrid(){
  const grid = $('grid'); grid.className = 'grid cols-' + S.cols;
  grid.innerHTML = '';
  S.panes = [];
  const st = struct();
  const chosen = st.modalities.filter(m => S.selectedModalityIds.includes(m.id));
  const count = Math.max(chosen.length, S.cols);
  for (let i = 0; i < count; i++){
    const m = chosen[i] || null;
    const pane = document.createElement('div');
    pane.className = 'pane' + (m ? '' : ' empty');
    if (!m){ pane.innerHTML = '<span>Empty pane — pick another modality</span>'; grid.appendChild(pane); continue; }
    pane.innerHTML = `
      <div class="pane-head">
        <span class="pane-name">${m.id}</span>
        <span class="pane-sub">${m.plane || 'Axial'}</span>
      </div>
      <canvas></canvas>
      <div class="orient orient-r">R</div>
      <div class="orient orient-l">L</div>
      <div class="anno anno-bl">WW <span class="v-ww">—</span> · WL <span class="v-wl">—</span></div>
      <div class="anno anno-br">Zoom <span class="v-zoom">1.00×</span></div>
    `;
    grid.appendChild(pane);
    const cvs = pane.querySelector('canvas');
    const p = {
      modId: m.id, mod: m,
      canvas: cvs, ctx: cvs.getContext('2d'),
      img: null,
      ww: m.ww || 300, wl: m.wl || 150,
      zoom: 1, panX: 0, panY: 0, invert: false,
      pane: pane,
      elWW: pane.querySelector('.v-ww'),
      elWL: pane.querySelector('.v-wl'),
      elZoom: pane.querySelector('.v-zoom')
    };
    S.panes.push(p);
    // interactions per pane
    let drag = null;
    cvs.addEventListener('mousedown', (e)=>{ drag = { x:e.clientX, y:e.clientY, ww:p.ww, wl:p.wl, zoom:p.zoom, panX:p.panX, panY:p.panY }; });
    window.addEventListener('mouseup', ()=>{ drag = null; });
    cvs.addEventListener('mousemove', (e)=>{
      if (!drag) return;
      const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
      const upd = { ww: Math.max(1, Math.round(drag.ww + dx * 2)), wl: Math.round(drag.wl + dy * 2) };
      if (S.sync) S.panes.forEach(q => { q.ww = upd.ww; q.wl = upd.wl; drawPane(q); refreshPane(q); });
      else { p.ww = upd.ww; p.wl = upd.wl; drawPane(p); refreshPane(p); }
    });
    cvs.addEventListener('wheel', (e)=>{
      e.preventDefault();
      const d = -Math.sign(e.deltaY) * 0.1;
      const upd = z => Math.max(0.25, Math.min(6, z + d));
      if (S.sync) S.panes.forEach(q => { q.zoom = upd(q.zoom); drawPane(q); refreshPane(q); });
      else { p.zoom = upd(p.zoom); drawPane(p); refreshPane(p); }
    }, { passive:false });
    loadPane(p);
  }
  // Auto-fit sizes
  requestAnimationFrame(fitAllCanvases);
}

function fitAllCanvases(){
  S.panes.forEach(p=>{
    const rect = p.canvas.parentElement.getBoundingClientRect();
    const s = Math.max(200, Math.min(rect.width, rect.height));
    p.canvas.width = s; p.canvas.height = s;
    drawPane(p);
  });
}
window.addEventListener('resize', fitAllCanvases);

function loadPane(p){
  const path = p.mod.path;
  const cached = S.imgCache[path];
  const done = (img)=>{ p.img = img; drawPane(p); refreshPane(p); };
  if (cached && cached.complete) return done(cached);
  const img = new Image(); img.crossOrigin = 'anonymous';
  img.onload = ()=>{ S.imgCache[path] = img; done(img); };
  img.onerror = ()=>{ p.pane.querySelector('.pane-sub').textContent = 'image not found'; };
  img.src = path;
}

function drawPane(p){
  if (!p.img) return;
  const w = p.canvas.width, h = p.canvas.height, ctx = p.ctx;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
  const scale = Math.min(w/p.img.width, h/p.img.height) * p.zoom;
  const iw = p.img.width * scale, ih = p.img.height * scale;
  const x = (w - iw)/2 + p.panX, y = (h - ih)/2 + p.panY;
  ctx.drawImage(p.img, x, y, iw, ih);
  try {
    const id = ctx.getImageData(0, 0, w, h); const d = id.data;
    const minV = p.wl - p.ww/2, maxV = p.wl + p.ww/2;
    for (let i = 0; i < d.length; i += 4){
      const g = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114);
      let v = (g - minV) / (maxV - minV);
      v = Math.max(0, Math.min(1, v));
      if (p.invert) v = 1 - v;
      const out = Math.round(v * 255);
      d[i] = d[i+1] = d[i+2] = out;
    }
    ctx.putImageData(id, 0, 0);
  } catch(e) {}
}
function refreshPane(p){
  p.elWW.textContent = p.ww;
  p.elWL.textContent = p.wl;
  p.elZoom.textContent = p.zoom.toFixed(2) + '×';
}

/* ─────── Wire top controls ─────── */
$('selStruct').addEventListener('change', (e)=>{
  S.structId = e.target.value;
  const st = struct();
  // Default: select first 2 modalities so the compare view is populated
  S.selectedModalityIds = st.modalities.slice(0, Math.min(2, st.modalities.length)).map(m=>m.id);
  renderModChips(); renderGrid();
  $('descBar').innerHTML = '<strong>' + st.en + '</strong> — ' + st.desc;
});
document.querySelectorAll('[data-cols]').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('[data-cols]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    S.cols = parseInt(b.dataset.cols);
    renderGrid();
  });
});
$('btnSync').addEventListener('click', ()=>{ S.sync = !S.sync; $('btnSync').classList.toggle('on', S.sync); });

/* Bootstrap */
fillSelect();
const st0 = struct();
S.selectedModalityIds = st0.modalities.slice(0, Math.min(2, st0.modalities.length)).map(m=>m.id);
$('descBar').innerHTML = '<strong>' + st0.en + '</strong> — ' + st0.desc;
renderModChips(); renderGrid();
</script>
</body>
</html>
