<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — My Progress</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root,[data-theme="dark"]{--bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.38);--acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.10);--border:rgba(45,212,200,.12);--border-s:rgba(232,240,245,.08);--nav-bg:rgba(8,14,20,.92);--acc-ink:#08100e}
[data-theme="dim"]{--bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.42);--acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.10);--border:rgba(11,107,100,.15);--border-s:rgba(15,30,42,.1);--nav-bg:rgba(237,242,248,.92);--acc-ink:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--onav-h,56px);-webkit-font-smoothing:antialiased}
body[dir="rtl"]{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
.wrap{max-width:1000px;margin:0 auto;padding:40px 24px 60px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--acc-dim)}
h1{font-size:clamp(1.8rem,4vw,2.4rem);font-weight:700;letter-spacing:-.02em;margin-bottom:26px}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--bg-e);border:1px solid var(--border);border-radius:14px;padding:22px 22px 20px}
.stat .l{font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--text-m);font-family:'IBM Plex Mono',monospace;margin-bottom:8px}
.stat .n{font-size:34px;font-weight:700;color:var(--text);letter-spacing:-.03em;line-height:1}
.stat .s{font-size:11.5px;color:var(--text-s);margin-top:4px}
.stat .acc-n{color:var(--acc)}
.sec{background:var(--bg-e);border:1px solid var(--border-s);border-radius:14px;padding:22px;margin-bottom:16px}
.sec h2{font-size:14px;font-weight:700;letter-spacing:.02em;margin-bottom:14px;display:flex;align-items:center;gap:9px}
.sec h2 .dot{width:8px;height:22px;border-radius:3px;background:var(--acc)}
.bar{height:8px;background:var(--bg-s);border-radius:4px;overflow:hidden;margin-top:8px}
.bar > div{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc-dim));transition:width .3s}
.bar-row{margin-bottom:12px}
.bar-row .top{display:flex;justify-content:space-between;font-size:12px}
.bar-row .top .name{color:var(--text);font-weight:600}
.bar-row .top .val{color:var(--text-m);font-family:'IBM Plex Mono',monospace}
.empty{text-align:center;padding:30px 20px;color:var(--text-m);font-size:13px}
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">My progress</div>
  <h1>Your learning at a glance.</h1>

  <div class="row">
    <div class="stat"><div class="l">SRS cards seen</div><div class="n" id="stSrsTot">—</div><div class="s">Total in your deck</div></div>
    <div class="stat"><div class="l">SRS due today</div><div class="n acc-n" id="stSrsDue">—</div><div class="s">Waiting for review</div></div>
    <div class="stat"><div class="l">Daily accuracy</div><div class="n acc-n" id="stDailyPct">—</div><div class="s">Since you started</div></div>
    <div class="stat"><div class="l">Current streak</div><div class="n" id="stStreak">—</div><div class="s">Consecutive days</div></div>
  </div>

  <div class="sec">
    <h2><span class="dot"></span>SRS by mastery</h2>
    <div id="mastery"></div>
  </div>

  <div class="sec">
    <h2><span class="dot"></span>Recent activity</h2>
    <div id="activity" class="empty">No activity yet — try the Daily Challenge or start an SRS session.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/omnirad-nav.js" data-base="../"></script>
<script>
const $ = id => document.getElementById(id);
function load(k, d){ try { return JSON.parse(localStorage.getItem(k) || 'null') || d; } catch { return d; } }

const srs = load('omnirad_srs_v1', []);
const daily = load('omnirad_daily', {});
const streak = load('omnirad_streak', { n: 0 });

const now = Date.now();
$('stSrsTot').textContent = srs.length || '0';
$('stSrsDue').textContent = srs.filter(c => c.due <= now).length || '0';
$('stDailyPct').textContent = daily.total ? Math.round((daily.correct || 0) * 100 / daily.total) + '%' : '—';
$('stStreak').textContent = daily.streak || streak.n || 0;

/* Mastery breakdown by rep count */
function bucket(c){
  if (c.reps === 0) return 'New / learning';
  if (c.interval < 7) return 'Young';
  if (c.interval < 30) return 'Mature';
  return 'Solid';
}
const buckets = { 'New / learning':0, 'Young':0, 'Mature':0, 'Solid':0 };
srs.forEach(c => { buckets[bucket(c)] += 1; });
const total = srs.length || 1;
const wrap = $('mastery');
if (srs.length === 0) {
  wrap.innerHTML = '<div class="empty">Your SRS deck is empty. Start an SRS session to add cards.</div>';
} else {
  wrap.innerHTML = Object.entries(buckets).map(([name, v]) => `
    <div class="bar-row">
      <div class="top"><span class="name">${name}</span><span class="val">${v} / ${total}</span></div>
      <div class="bar"><div style="width:${(v/total)*100}%"></div></div>
    </div>`).join('');
}
</script>
</body>
</html>
