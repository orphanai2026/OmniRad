<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>ChatGPT URL test</title>
<style>
body{font-family:system-ui;background:#080e14;color:#e8f0f5;padding:40px;max-width:720px;margin:0 auto;line-height:1.6}
h1{color:#2dd4c8;margin-bottom:20px}
textarea{width:100%;min-height:140px;background:#0c1520;color:#e8f0f5;border:1px solid rgba(45,212,200,.3);border-radius:8px;padding:12px;font-family:'IBM Plex Mono',monospace;font-size:13px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:#2dd4c8;color:#08100e;font-weight:800;font-size:14px;border:none;border-radius:10px;cursor:pointer;margin-top:14px;text-decoration:none;font-family:inherit}
.btn:hover{opacity:.9}
.note{margin-top:20px;padding:14px;background:rgba(45,212,200,.08);border:1px solid rgba(45,212,200,.3);border-radius:8px;font-size:13px}
.result{margin-top:14px;font-family:monospace;font-size:11.5px;color:rgba(232,240,245,.6);word-break:break-all;padding:10px;background:#0c1520;border-radius:6px;border-inline-start:3px solid #2dd4c8}
</style>
</head>
<body>
<h1>🧪 اختبار: ChatGPT URL Query API</h1>
<p>الصق أي برومبت واضغط الزر — سيفتح ChatGPT في تبويب جديد مع البرومبت مكتوباً مسبقاً.</p>

<textarea id="p">Educational illustration of a CT axial section of the brain, adult male, normal appearance, with bilingual (English + Arabic) anatomical labels, non-contrast phase, soft tissue window, high resolution 4K, clean neutral background.</textarea>

<button class="btn" onclick="go()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>
  Open in ChatGPT
</button>

<div class="result" id="url">—</div>

<div class="note">
  <strong>ما تلاحظه:</strong><br>
  ✅ نجح → البرومبت ظهر في مربع الكتابة مباشرة (المطلوب)<br>
  ⚠️ ظهرت صفحة فارغة → ChatGPT لا يدعم <code>?q=</code> حالياً — نبقى على bookmarklet
</div>

<script>
function go(){
  const p = document.getElementById('p').value.trim();
  if (!p) return alert('اكتب برومبت أولاً');
  const url = 'https://chatgpt.com/?q=' + encodeURIComponent(p);
  document.getElementById('url').textContent = url;
  window.open(url, '_blank');
}
go(); // preview URL on load
</script>
</body>
</html>
