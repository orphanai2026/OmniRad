<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Spaced Repetition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root,[data-theme="dark"]{--bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.38);--acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.10);--border:rgba(45,212,200,.12);--border-s:rgba(232,240,245,.08);--nav-bg:rgba(8,14,20,.92);--acc-ink:#08100e}
[data-theme="dim"]{--bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.42);--acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.10);--border:rgba(11,107,100,.15);--border-s:rgba(15,30,42,.1);--nav-bg:rgba(237,242,248,.92);--acc-ink:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--onav-h,56px);-webkit-font-smoothing:antialiased}
body[dir="rtl"]{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
.wrap{max-width:720px;margin:0 auto;padding:40px 24px 60px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--acc-dim)}
h1{font-size:clamp(1.8rem,4vw,2.4rem);font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.sub{color:var(--text-s);font-size:14px;line-height:1.65;margin-bottom:26px;max-width:56ch}
.card{background:var(--bg-e);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:18px;min-height:280px;display:flex;flex-direction:column;justify-content:space-between}
.card.flip .front{display:none}
.card:not(.flip) .back{display:none}
.q{font-size:22px;font-weight:700;line-height:1.4;text-align:center;flex:1;display:flex;align-items:center;justify-content:center;padding:18px 0}
.a{font-size:15px;line-height:1.7;color:var(--text-s);padding:8px 0}
.a strong{color:var(--acc)}
.a .ar{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic',sans-serif;direction:rtl;text-align:right;color:var(--text-m);font-size:13px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border-s)}
.rate{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:20px}
.rate button{padding:12px 6px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg-s);color:var(--text-s);cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;transition:.15s;font-family:'IBM Plex Mono',monospace}
.rate button:hover{border-color:var(--acc-dim);color:var(--acc)}
.rate button.r0{border-color:rgba(248,113,113,.5);color:#f87171}
.rate button.r3{border-color:rgba(74,222,128,.5);color:#4ade80}
.flip-btn{margin-top:12px;padding:11px;background:var(--acc);color:var(--acc-ink);border:none;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px;width:100%}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.stat{background:var(--bg-e);border:1px solid var(--border-s);border-radius:12px;padding:12px 14px;text-align:center}
.stat .n{font-size:20px;font-weight:700;color:var(--acc)}
.stat .l{font-size:10px;font-weight:600;color:var(--text-m);letter-spacing:.1em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-top:2px}
.done{text-align:center;padding:60px 20px;color:var(--text-s)}
.done h2{color:var(--text);margin-bottom:8px}
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow"><span data-i18n="srs.title">Spaced repetition</span> · SM-2</div>
  <h1 data-i18n="srs.h1">Study to remember, not to cram.</h1>
  <p class="sub">Cards are scheduled by the SM-2 algorithm: cards you struggle with come back sooner, easy ones spread further apart. That's how you build durable knowledge.</p>

  <div class="stats">
    <div class="stat"><div class="n" id="stDue">—</div><div class="l" data-i18n="srs.due">Due today</div></div>
    <div class="stat"><div class="n" id="stTotal">—</div><div class="l" data-i18n="srs.total">Total cards</div></div>
    <div class="stat"><div class="n" id="stStreak">0</div><div class="l" data-i18n="srs.streakDays">Streak (days)</div></div>
  </div>

  <div id="deck"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/i18n.js"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/data/anatomy-master.js?v=loinc-r2"></script>
<script src="../modules/data/anatomy-master-v2.js?v=loinc-r2"></script>
<script src="../modules/omnirad-term.js"></script>
<script src="../modules/omnirad-search.js"></script>
<script src="../modules/omnirad-typography.js"></script>
<script src="../modules/omnirad-avatars.js"></script>
<script src="../modules/omnirad-nav.js" data-base="../"></script>
<script>
/* Seed cards — expandable */
const SEED = [
  { q:'Which modality is first-line for acute stroke?', a:'<strong>Non-contrast CT head</strong> — to rule out hemorrhage before thrombolysis.', ar:'CT بلا صبغة لاستبعاد النزيف قبل حل الخثرة.' },
  { q:'Right kidney position vs left?', a:'The <strong>right kidney</strong> is lower (displaced by the liver). Right T12–L3, Left T11–L2.', ar:'اليمنى أخفض من اليسرى (بسبب الكبد).' },
  { q:'ACL tear — modality of choice?', a:'<strong>MRI</strong> — reference standard for ACL and meniscal injuries.', ar:'MRI هو المعيار المرجعي.' },
  { q:'Contents of the portal triad?', a:'<strong>Portal vein</strong> · hepatic <strong>artery</strong> · bile <strong>duct</strong>.', ar:'الوريد البابي، الشريان الكبدي، القناة الصفراوية.' },
  { q:'Right lung — how many lobes?', a:'<strong>Three</strong> lobes (upper, middle, lower). Left has two.', ar:'ثلاثة فصوص في اليمنى.' },
  { q:'Best sequence for acute cerebral infarct?', a:'<strong>DWI / ADC</strong> — detects cytotoxic edema within minutes.', ar:'DWI/ADC يكشف الاحتشاء خلال دقائق.' },
  { q:'ACR first-line for cholelithiasis?', a:'<strong>Right upper quadrant ultrasound</strong> — highest sensitivity, no radiation.', ar:'سونار الربع الأيمن العلوي.' },
  { q:'Rotator cuff muscles?', a:'<strong>S.I.T.S.</strong> — Supraspinatus, Infraspinatus, Teres minor, Subscapularis.', ar:'فوق الشوكة، تحت الشوكة، المدوّرة الصغرى، تحت الكتف.' }
];

const KEY = 'omnirad_srs_v1';
const $ = id => document.getElementById(id);
function loadDeck(){
  try { const raw = localStorage.getItem(KEY); if (raw) return JSON.parse(raw); } catch {}
  const init = SEED.map((c,i) => ({ id:i, ...c, due:0, ef:2.5, interval:0, reps:0 }));
  localStorage.setItem(KEY, JSON.stringify(init));
  return init;
}
function saveDeck(d){ localStorage.setItem(KEY, JSON.stringify(d)); }
let deck = loadDeck();
let currentIdx = -1, flipped = false;

function updateStats(){
  const now = Date.now();
  const due = deck.filter(c => c.due <= now).length;
  $('stDue').textContent = due;
  $('stTotal').textContent = deck.length;
  $('stStreak').textContent = (JSON.parse(localStorage.getItem('omnirad_streak') || '{"n":0}')).n || 0;
}
function pickNext(){
  const now = Date.now();
  const due = deck.map((c,i) => [c, i]).filter(([c]) => c.due <= now).sort((a,b) => a[0].due - b[0].due);
  if (due.length === 0) return -1;
  return due[0][1];
}
function render(){
  updateStats();
  const w = $('deck');
  currentIdx = pickNext();
  if (currentIdx < 0){
    w.innerHTML = '<div class="done"><h2>All caught up ✨</h2><p>No cards due right now. Come back tomorrow.</p></div>';
    return;
  }
  flipped = false;
  const c = deck[currentIdx];
  w.innerHTML = `
    <div class="card" id="thecard">
      <div class="front">
        <div class="q">${c.q}</div>
        <button class="flip-btn" onclick="doFlip()" data-i18n="srs.showAnswer">Show answer</button>
      </div>
      <div class="back">
        <div class="q">${c.q}</div>
        <div class="a">${c.a}<div class="ar">${c.ar || ''}</div></div>
        <div class="rate">
          <button class="r0" onclick="rate(0)" data-i18n="srs.again">Again</button>
          <button onclick="rate(1)" data-i18n="srs.hard">Hard</button>
          <button onclick="rate(2)" data-i18n="srs.good">Good</button>
          <button class="r3" onclick="rate(3)" data-i18n="srs.easy">Easy</button>
        </div>
      </div>
    </div>`;
}
window.doFlip = () => { const el = document.getElementById('thecard'); el.classList.add('flip'); flipped = true; };
window.rate = (q) => {
  const c = deck[currentIdx];
  // SM-2 (simplified). q ∈ {0,1,2,3} maps to SM-2 quality: 0→2, 1→3, 2→4, 3→5.
  const qual = q + 2;
  if (qual < 3) { c.reps = 0; c.interval = 1; }
  else {
    c.reps += 1;
    if (c.reps === 1) c.interval = 1;
    else if (c.reps === 2) c.interval = 6;
    else c.interval = Math.round(c.interval * c.ef);
    c.ef = Math.max(1.3, c.ef + (0.1 - (5 - qual) * (0.08 + (5 - qual) * 0.02)));
  }
  c.due = Date.now() + c.interval * 86400000;
  saveDeck(deck);
  render();
};
render();
</script>
</body>
</html>
