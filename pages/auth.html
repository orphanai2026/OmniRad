<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Sign in</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap');
:root { --bg:#080e14; --bg-s:#0c1520; --bg-e:#101e2a; --text:#e8f0f5; --text-s:rgba(232,240,245,.65); --text-m:rgba(232,240,245,.4); --acc:#2dd4c8; --acc-ink:#08100e; --border:rgba(45,212,200,.15); --line:rgba(232,240,245,.08); --err:#f87171; }
[data-theme="dim"] { --bg:#e6ecf3; --bg-s:#edf2f8; --bg-e:#f6f9fc; --text:#0f1e2a; --text-s:rgba(15,30,42,.65); --text-m:rgba(15,30,42,.42); --acc:#0b6b64; --acc-ink:#fff; --border:rgba(11,107,100,.2); --line:rgba(15,30,42,.1); --err:#c53030; }
* { box-sizing: border-box; }
body { margin:0; min-height:100vh; font-family:'IBM Plex Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; padding:24px; }
body[dir="rtl"] { font-family:'IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif; }
.card { width:100%; max-width:420px; background:var(--bg-e); border:1px solid var(--border); border-radius:16px; padding:34px 30px; box-shadow:0 24px 60px -30px rgba(0,0,0,.5); }
.brand { display:flex; align-items:center; gap:10px; margin-bottom:22px; }
.mark { width:36px; height:36px; background:var(--acc); border-radius:9px; display:grid; place-items:center; color:var(--acc-ink); font-weight:700; font-size:14px; letter-spacing:-.03em; }
.name { font-weight:700; font-size:19px; letter-spacing:-.02em; }
.name span { color:var(--acc); }
h1 { font-size:24px; font-weight:700; letter-spacing:-.02em; margin:8px 0 4px; }
.sub { font-size:13.5px; color:var(--text-s); margin-bottom:22px; }
.tabs { display:flex; gap:6px; padding:5px; background:var(--bg-s); border:1px solid var(--line); border-radius:11px; margin-bottom:18px; }
.tabs button { flex:1; padding:9px 10px; border:none; border-radius:7px; background:transparent; color:var(--text-s); font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:.15s; }
.tabs button.on { background:var(--acc); color:var(--acc-ink); }
label { display:block; margin-bottom:12px; }
.lbl { display:block; font-size:12px; font-weight:600; color:var(--text-s); margin-bottom:5px; }
input { width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:9px; background:var(--bg-s); color:var(--text); font-family:inherit; font-size:14px; }
input:focus { outline:none; border-color:var(--acc); }
button.primary { width:100%; margin-top:6px; padding:12px; border:none; border-radius:10px; background:var(--acc); color:var(--acc-ink); font-family:inherit; font-size:14.5px; font-weight:700; cursor:pointer; transition:transform .15s,opacity .15s; }
button.primary:hover { transform:translateY(-1px); }
button.primary:disabled { opacity:.55; cursor:wait; }
.msg { font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:14px; display:none; }
.msg.err { background:rgba(248,113,113,.12); color:var(--err); border:1px solid rgba(248,113,113,.35); display:block; }
.msg.ok { background:rgba(45,212,200,.12); color:var(--acc); border:1px solid var(--border); display:block; }
.small { text-align:center; margin-top:16px; font-size:12px; color:var(--text-m); }
.small a { color:var(--acc); text-decoration:none; }
.lang { position:fixed; top:20px; inset-inline-end:20px; background:var(--bg-e); border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-family:inherit; font-size:12.5px; font-weight:700; color:var(--text); cursor:pointer; }
.disc { margin-top:20px; padding-top:16px; border-top:1px solid var(--line); font-size:11.5px; color:var(--text-m); text-align:center; line-height:1.7; }
</style>
</head>
<body>

<button class="lang" id="langBtn" onclick="toggleLang()">🌐 عربي</button>

<div class="card">
  <div class="brand">
    <div class="mark">OR</div>
    <div class="name">Omni<span>Rad</span></div>
  </div>

  <h1 id="title">Welcome back.</h1>
  <div class="sub" id="subtitle">Sign in to your OmniRad account.</div>

  <div class="tabs" role="tablist">
    <button id="tSignIn" class="on" onclick="switchMode('signin')">Sign in</button>
    <button id="tSignUp" onclick="switchMode('signup')">Sign up</button>
  </div>

  <div class="msg" id="msg"></div>

  <label id="nameField" style="display:none">
    <span class="lbl" id="lblName">Display name</span>
    <input type="text" id="fName" autocomplete="name" placeholder="Full name">
  </label>

  <label>
    <span class="lbl" id="lblEmail">Email</span>
    <input type="email" id="fEmail" autocomplete="email" required placeholder="you@example.com">
  </label>

  <label>
    <span class="lbl" id="lblPass">Password</span>
    <input type="password" id="fPass" autocomplete="current-password" required placeholder="••••••••">
  </label>

  <button class="primary" id="submitBtn" onclick="submit()">Sign in →</button>

  <div class="small" id="switchNote">
    New here? <a href="#" onclick="event.preventDefault();switchMode('signup')">Create an account</a>
  </div>

  <div class="disc" id="disc">
    ⚕️ Educational tool — not for diagnosis or clinical use.<br>
    © 2026 OmniRad Platform · All rights reserved.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/supabase.js"></script>
<script>
let MODE = 'signin';
let LANG = localStorage.getItem('omnirad_lang') || 'en';
const T = {
  en: {
    title_signin:'Welcome back.', title_signup:'Create your account.',
    sub_signin:'Sign in to your OmniRad account.', sub_signup:'Join OmniRad — educational bilingual radiology.',
    signin:'Sign in', signup:'Sign up',
    lblName:'Display name', lblEmail:'Email', lblPass:'Password',
    btn_signin:'Sign in →', btn_signup:'Create account →',
    switch_signin:'New here? <a href="#" onclick="event.preventDefault();switchMode(\'signup\')">Create an account</a>',
    switch_signup:'Already have an account? <a href="#" onclick="event.preventDefault();switchMode(\'signin\')">Sign in</a>',
    disc:'⚕️ Educational tool — not for diagnosis or clinical use.<br>© 2026 OmniRad Platform · All rights reserved.',
    langBtn:'🌐 عربي', dir:'ltr', family:'IBM Plex Sans'
  },
  ar: {
    title_signin:'مرحباً بعودتك.', title_signup:'أنشئ حسابك.',
    sub_signin:'سجّل الدخول إلى حسابك في OmniRad.', sub_signup:'انضم إلى OmniRad — أشعة تعليمية ثنائية اللغة.',
    signin:'تسجيل الدخول', signup:'إنشاء حساب',
    lblName:'الاسم الظاهر', lblEmail:'البريد الإلكتروني', lblPass:'كلمة المرور',
    btn_signin:'دخول ←', btn_signup:'إنشاء الحساب ←',
    switch_signin:'مستخدم جديد؟ <a href="#" onclick="event.preventDefault();switchMode(\'signup\')">أنشئ حساباً</a>',
    switch_signup:'لديك حساب بالفعل؟ <a href="#" onclick="event.preventDefault();switchMode(\'signin\')">سجّل الدخول</a>',
    disc:'⚕️ أداة تعليمية — ليست للتشخيص أو الاستخدام السريري.<br>© 2026 منصة OmniRad · جميع الحقوق محفوظة.',
    langBtn:'🌐 English', dir:'rtl', family:'IBM Plex Sans Arabic'
  }
};
function applyLang() {
  const t = T[LANG];
  document.documentElement.lang = LANG;
  document.body.dir = t.dir;
  document.getElementById('tSignIn').textContent = t.signin;
  document.getElementById('tSignUp').textContent = t.signup;
  document.getElementById('lblName').textContent = t.lblName;
  document.getElementById('lblEmail').textContent = t.lblEmail;
  document.getElementById('lblPass').textContent = t.lblPass;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('disc').innerHTML = t.disc;
  refreshMode();
}
function toggleLang() {
  LANG = LANG === 'en' ? 'ar' : 'en';
  localStorage.setItem('omnirad_lang', LANG);
  applyLang();
}
function refreshMode() {
  const t = T[LANG];
  document.getElementById('title').textContent = MODE === 'signin' ? t.title_signin : t.title_signup;
  document.getElementById('subtitle').textContent = MODE === 'signin' ? t.sub_signin : t.sub_signup;
  document.getElementById('submitBtn').textContent = MODE === 'signin' ? t.btn_signin : t.btn_signup;
  document.getElementById('switchNote').innerHTML = MODE === 'signin' ? t.switch_signin : t.switch_signup;
  document.getElementById('nameField').style.display = MODE === 'signup' ? 'block' : 'none';
  document.getElementById('tSignIn').classList.toggle('on', MODE === 'signin');
  document.getElementById('tSignUp').classList.toggle('on', MODE === 'signup');
  document.getElementById('fPass').autocomplete = MODE === 'signup' ? 'new-password' : 'current-password';
}
function switchMode(m) { MODE = m; refreshMode(); hideMsg(); }
function showMsg(text, kind) {
  const el = document.getElementById('msg');
  el.textContent = text; el.className = 'msg ' + (kind || 'err');
}
function hideMsg() { document.getElementById('msg').style.display = 'none'; }
async function submit() {
  hideMsg();
  const email = document.getElementById('fEmail').value.trim();
  const pass  = document.getElementById('fPass').value;
  const name  = document.getElementById('fName').value.trim();
  const btn = document.getElementById('submitBtn'); btn.disabled = true;
  try {
    if (MODE === 'signup') {
      await OmniRadAuth.signUp(email, pass, name);
      showMsg(LANG === 'ar' ? 'تحقّق من بريدك لتأكيد الحساب، ثم سجّل الدخول.' : 'Check your email to confirm your account, then sign in.', 'ok');
      switchMode('signin');
    } else {
      await OmniRadAuth.signIn(email, pass);
      location.href = '../index.html';
    }
  } catch (e) {
    showMsg(e.message || 'Authentication error', 'err');
  } finally { btn.disabled = false; }
}
applyLang();
// Redirect if already signed in
(async()=>{
  const u = await OmniRadAuth.currentUser();
  if (u) location.href = '../index.html';
})();
</script>
</body>
</html>
