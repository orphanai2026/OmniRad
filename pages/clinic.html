<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Clinic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root,[data-theme="dark"]{--bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--bg-ov:#162030;--text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.38);--acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.10);--border:rgba(45,212,200,.12);--border-s:rgba(232,240,245,.08);--nav-bg:rgba(8,14,20,.92);--acc-ink:#08100e;--urgent:#f87171;--elective:#a3e635}
[data-theme="dim"]{--bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--bg-ov:#d6dde6;--text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.42);--acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.10);--border:rgba(11,107,100,.15);--border-s:rgba(15,30,42,.1);--nav-bg:rgba(237,242,248,.92);--acc-ink:#fff;--urgent:#c53030;--elective:#0e8f4a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--onav-h,56px);-webkit-font-smoothing:antialiased}
body[dir="rtl"]{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
.wrap{max-width:1100px;margin:0 auto;padding:40px 24px 60px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--acc-dim)}
h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.lead{color:var(--text-s);font-size:14.5px;line-height:1.7;max-width:60ch;margin-bottom:26px}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{padding:7px 14px;font-size:12px;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--text-s);cursor:pointer;border-radius:999px;font-family:inherit;transition:.15s}
.chip:hover{color:var(--acc);border-color:var(--acc-dim)}
.chip.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.case{background:var(--bg-e);border:1px solid var(--border);border-radius:14px;padding:22px;transition:transform .18s,border-color .18s;cursor:pointer}
.case:hover{transform:translateY(-2px);border-color:var(--acc-dim)}
.case-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.case-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:999px;font-family:'IBM Plex Mono',monospace}
.case-tag.urgent{color:var(--urgent);border:1px solid rgba(248,113,113,.4);background:rgba(248,113,113,.08)}
.case-tag.elective{color:var(--elective);border:1px solid rgba(163,230,53,.4);background:rgba(163,230,53,.08)}
.case-title{font-size:15px;font-weight:700}
.case-vitals{display:flex;gap:12px;flex-wrap:wrap;color:var(--text-m);font-size:12px;font-family:'IBM Plex Mono',monospace;margin-bottom:10px}
.case-vitals span{padding:2px 8px;background:var(--bg-ov);border-radius:4px}
.case-body{font-size:13px;color:var(--text-s);line-height:1.65;margin-bottom:12px}
.case-mod{display:flex;align-items:center;gap:8px;padding-top:12px;border-top:1px dashed var(--border-s);font-size:12px;color:var(--text-m)}
.case-mod strong{color:var(--acc);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em;padding:2px 7px;background:var(--acc-sub);border-radius:3px}
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow" data-i18n="clinic.title">Clinic · applied cases</div>
  <h1 data-i18n="clinic.h1">Practice how radiologists think.</h1>
  <p class="lead"><span data-i18n="clinic.lead">Structured clinical vignettes with the imaging pathway. Read the case, pick the modality, review the reasoning — grounded in ACR appropriateness criteria.</span></p>

  <div class="chip-row" id="filters"></div>
  <div class="grid" id="cases"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/i18n.js"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/data/anatomy-master.js"></script>
<script src="../modules/data/anatomy-master-v2.js"></script>
<script src="../modules/omnirad-term.js"></script>
<script src="../modules/omnirad-search.js"></script>
<script src="../modules/omnirad-typography.js"></script>
<script src="../modules/omnirad-avatars.js"></script>
<script src="../modules/omnirad-nav.js" data-base="../"></script>
<script>
const CASES = [
  { region:'Neuro', urgency:'urgent',  title:'Sudden right-sided weakness — age 68',
    vitals:['M · 68y','BP 168/94','GCS 14'],
    body:'Right hemiparesis for 40 minutes, no headache, no trauma. Symptom onset < 4.5h — thrombolysis window under consideration.',
    mod:'Non-contrast CT head', acr:9 },
  { region:'Neuro', urgency:'urgent',  title:'Thunderclap headache — age 42',
    vitals:['F · 42y','No neuro deficit'],
    body:'Worst headache of life, peaked at 60 seconds, with photophobia and neck stiffness.',
    mod:'Non-contrast CT head (± LP)', acr:9 },
  { region:'Chest', urgency:'urgent',  title:'Acute dyspnea after long flight',
    vitals:['M · 55y','HR 118','SpO₂ 91%'],
    body:'Pleuritic chest pain and dyspnea after 12-hour flight. Wells score high, D-dimer elevated.',
    mod:'CT pulmonary angiography (CTPA)', acr:9 },
  { region:'Chest', urgency:'elective', title:'Chronic cough — age 62 smoker',
    vitals:['M · 62y','40 pack-year'],
    body:'Persistent dry cough > 3 months, mild weight loss. Chest radiograph shows a 12 mm pulmonary nodule.',
    mod:'HRCT chest', acr:9 },
  { region:'Abdomen', urgency:'urgent', title:'Right lower quadrant pain — young adult',
    vitals:['F · 22y','Temp 37.9°C'],
    body:'Migratory periumbilical → RLQ pain, anorexia, mild leukocytosis.',
    mod:'CT abdomen with IV contrast', acr:9 },
  { region:'Abdomen', urgency:'urgent', title:'Right upper quadrant pain, fever',
    vitals:['F · 46y','Temp 38.5°C'],
    body:'Postprandial RUQ pain, positive Murphy sign, elevated WBC.',
    mod:'RUQ ultrasound', acr:9 },
  { region:'MSK', urgency:'elective',   title:'Knee twist during sport',
    vitals:['M · 26y','Effusion +'],
    body:'Non-contact pivot injury, immediate swelling, positive Lachman test.',
    mod:'MRI knee', acr:9 },
  { region:'GU', urgency:'urgent',       title:'Sudden severe testicular pain',
    vitals:['M · 17y','< 4h onset'],
    body:'Sudden left testicular pain, high-riding testis, absent cremasteric reflex.',
    mod:'Scrotal Doppler ultrasound', acr:9 }
];
const $ = id => document.getElementById(id);
const REGIONS = ['All', ...new Set(CASES.map(c => c.region))];
let filter = 'All';
function renderFilters(){
  const w = $('filters'); w.innerHTML = '';
  REGIONS.forEach(r => {
    const b = document.createElement('button');
    b.className = 'chip' + (r === filter ? ' on' : '');
    b.textContent = r;
    b.addEventListener('click', () => { filter = r; renderFilters(); renderCases(); });
    w.appendChild(b);
  });
}
function renderCases(){
  const w = $('cases'); w.innerHTML = '';
  const list = filter === 'All' ? CASES : CASES.filter(c => c.region === filter);
  list.forEach(c => {
    const d = document.createElement('div'); d.className = 'case';
    d.innerHTML = `
      <div class="case-head">
        <div class="case-title">${c.title}</div>
        <div class="case-tag ${c.urgency}">${c.urgency==="urgent"?(window.OmniRadI18n?OmniRadI18n.t("clinic.urgent"):"urgent"):(window.OmniRadI18n?OmniRadI18n.t("clinic.elective"):"elective")}</div>
      </div>
      <div class="case-vitals">${c.vitals.map(v=>'<span>'+v+'</span>').join('')}</div>
      <div class="case-body">${c.body}</div>
      <div class="case-mod"><span data-i18n="clinic.recommended">Recommended imaging</span> → <strong>${c.mod}</strong> · ACR ${c.acr}/9</div>`;
    w.appendChild(d);
  });
}
renderFilters(); renderCases();
</script>
</body>
</html>
