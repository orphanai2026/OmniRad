<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Mnemonics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root,[data-theme="dark"]{--bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--bg-ov:#162030;--text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.38);--acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.10);--border:rgba(45,212,200,.12);--border-s:rgba(232,240,245,.08);--nav-bg:rgba(8,14,20,.92);--acc-ink:#08100e}
[data-theme="dim"]{--bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--bg-ov:#d6dde6;--text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.42);--acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.10);--border:rgba(11,107,100,.15);--border-s:rgba(15,30,42,.1);--nav-bg:rgba(237,242,248,.92);--acc-ink:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--onav-h,56px);-webkit-font-smoothing:antialiased}
body[dir="rtl"]{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
a{text-decoration:none;color:inherit}
.page-head{max-width:1100px;margin:0 auto;padding:40px 24px 20px;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.eyebrow::before,.eyebrow::after{content:'';width:24px;height:1px;background:var(--acc-dim)}
h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.lead{color:var(--text-s);font-size:14.5px;line-height:1.7;max-width:60ch;margin:0 auto}
.filter-bar{max-width:1100px;margin:0 auto;padding:16px 24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.chip{padding:7px 14px;font-size:12px;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--text-s);cursor:pointer;border-radius:999px;font-family:inherit;transition:.15s}
.chip:hover{color:var(--acc);border-color:var(--acc-dim)}
.chip.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
.grid{max-width:1100px;margin:0 auto;padding:8px 24px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--bg-e);border:1px solid var(--border);border-radius:14px;padding:22px;transition:transform .18s,border-color .18s}
.card:hover{transform:translateY(-2px);border-color:var(--acc-dim)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.card-title{font-size:16px;font-weight:700;color:var(--text)}
.card-region{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-m);font-family:'IBM Plex Mono',monospace;padding:3px 8px;border:1px solid var(--border-s);border-radius:999px;white-space:nowrap}
.mnemonic{font-size:15px;font-weight:600;color:var(--acc);line-height:1.6;padding:11px 13px;background:var(--acc-sub);border-radius:8px;margin-bottom:10px;font-family:'IBM Plex Mono',monospace}
.expansion{font-size:13px;color:var(--text-s);line-height:1.7}
.expansion strong{color:var(--text);font-weight:600}
.ar{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic',sans-serif;direction:rtl;text-align:right;font-size:12.5px;color:var(--text-m);margin-top:8px;padding-top:8px;border-top:1px dashed var(--border-s)}
</style>
</head>
<body>

<div class="page-head">
  <div class="eyebrow" data-i18n="mnemonics.title">Mnemonics</div>
  <h1 data-i18n="mnemonics.h1">Learn anatomy the way it sticks.</h1>
  <p class="lead"><span data-i18n="mnemonics.lead">Bilingual mnemonics for radiologic anatomy — quick memory aids that actually make it easier to recognize structures.</span></p>
</div>

<div class="filter-bar" id="chips"></div>
<div class="grid" id="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/i18n.js"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/omnirad-nav.js" data-base="../"></script>
<script>
const MNEMONICS = [
  { region:'Head & Neck', title:'Cranial nerves',
    m:'On Old Olympus Towering Tops, A Finn And German Viewed Some Hops',
    e:'<strong>O</strong>lfactory · <strong>O</strong>ptic · <strong>O</strong>culomotor · <strong>T</strong>rochlear · <strong>T</strong>rigeminal · <strong>A</strong>bducens · <strong>F</strong>acial · <strong>A</strong>coustic · <strong>G</strong>lossopharyngeal · <strong>V</strong>agus · <strong>S</strong>pinal accessory · <strong>H</strong>ypoglossal',
    ar:'ترتيب الأعصاب القحفية الاثني عشر' },
  { region:'Head & Neck', title:'Facial nerve branches',
    m:'To Zanzibar By Motor Car',
    e:'<strong>T</strong>emporal · <strong>Z</strong>ygomatic · <strong>B</strong>uccal · <strong>M</strong>arginal mandibular · <strong>C</strong>ervical',
    ar:'فروع العصب الوجهي الخمسة' },
  { region:'Chest', title:'Right lung fissures',
    m:'Oblique and Horizontal — 3 lobes',
    e:'The right lung has <strong>3 lobes</strong> divided by <strong>oblique</strong> and <strong>horizontal</strong> fissures. Left has 2 lobes with a cardiac notch (no horizontal fissure).',
    ar:'الرئة اليمنى ٣ فصوص، اليسرى فصان' },
  { region:'Chest', title:'Structures of the mediastinum (posterior)',
    m:'D.A.T.E.S.',
    e:'<strong>D</strong>escending aorta · <strong>A</strong>zygos · <strong>T</strong>horacic duct · <strong>E</strong>sophagus · <strong>S</strong>ympathetic chain',
    ar:'مكوّنات المنصف الخلفي' },
  { region:'Abdomen', title:'Layers of abdominal wall',
    m:'Spare Some Extra Money For Torn Pants',
    e:'<strong>S</strong>kin · <strong>S</strong>uperficial fascia · <strong>E</strong>xternal oblique · <strong>M</strong>useum (internal oblique) · <strong>F</strong>ascia · <strong>T</strong>ransversus abdominis · <strong>P</strong>eritoneum',
    ar:'طبقات جدار البطن الأمامي' },
  { region:'Abdomen', title:'Retroperitoneal organs',
    m:'S.A.D. P.U.C.K.E.R.',
    e:'<strong>S</strong>uprarenals · <strong>A</strong>orta / IVC · <strong>D</strong>uodenum (2nd–4th) · <strong>P</strong>ancreas (except tail) · <strong>U</strong>reters · <strong>C</strong>olon (ascending & descending) · <strong>K</strong>idneys · <strong>E</strong>sophagus (distal) · <strong>R</strong>ectum',
    ar:'الأعضاء خلف الصفاق' },
  { region:'Abdomen', title:'Portal triad',
    m:'Portal Vein posterior; Artery on my LEFT, Duct on my RIGHT',
    e:'Portal <strong>vein</strong> lies posterior; hepatic <strong>artery</strong> to the left, bile <strong>duct</strong> to the right — as you look at the porta hepatis anteriorly.',
    ar:'ثلاثي البوابة الكبدي' },
  { region:'Pelvis', title:'Layers of the scrotum',
    m:'Some Damn Englishman Called It The Testis',
    e:'<strong>S</strong>kin · <strong>D</strong>artos · <strong>E</strong>xternal spermatic fascia · <strong>C</strong>remaster · <strong>I</strong>nternal spermatic fascia · <strong>T</strong>unica vaginalis · <strong>T</strong>unica albuginea · <strong>T</strong>estis',
    ar:'طبقات الصفن' },
  { region:'Musculoskeletal', title:'Carpal bones (proximal → distal row)',
    m:'Some Lovers Try Positions That They Cannot Handle',
    e:'<strong>S</strong>caphoid · <strong>L</strong>unate · <strong>T</strong>riquetrum · <strong>P</strong>isiform · <strong>T</strong>rapezium · <strong>T</strong>rapezoid · <strong>C</strong>apitate · <strong>H</strong>amate',
    ar:'عظام الرسغ الثمانية' },
  { region:'Musculoskeletal', title:'Rotator cuff muscles',
    m:'S.I.T.S.',
    e:'<strong>S</strong>upraspinatus · <strong>I</strong>nfraspinatus · <strong>T</strong>eres minor · <strong>S</strong>ubscapularis',
    ar:'الكفة المدوّرة' }
];
const REGIONS = ['All', ...new Set(MNEMONICS.map(m => m.region))];
let filter = 'All';

function renderChips(){
  const w = document.getElementById('chips'); w.innerHTML = '';
  REGIONS.forEach(r => {
    const b = document.createElement('button');
    b.className = 'chip' + (r === filter ? ' on' : '');
    b.textContent = r;
    b.addEventListener('click', () => { filter = r; renderChips(); renderGrid(); });
    w.appendChild(b);
  });
}
function renderGrid(){
  const g = document.getElementById('grid'); g.innerHTML = '';
  const list = filter === 'All' ? MNEMONICS : MNEMONICS.filter(m => m.region === filter);
  list.forEach(m => {
    const c = document.createElement('div'); c.className = 'card';
    c.innerHTML = `
      <div class="card-head">
        <div class="card-title">${m.title}</div>
        <div class="card-region">${m.region}</div>
      </div>
      <div class="mnemonic">${m.m}</div>
      <div class="expansion">${m.e}</div>
      <div class="ar">${m.ar}</div>`;
    g.appendChild(c);
  });
}
renderChips(); renderGrid();
</script>
</body>
</html>
