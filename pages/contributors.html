<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRad — Contributors</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root,[data-theme="dark"]{--bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--bg-ov:#162030;--text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.38);--acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.10);--border:rgba(45,212,200,.15);--border-s:rgba(232,240,245,.08);--nav-bg:rgba(8,14,20,.92);--acc-ink:#08100e}
[data-theme="dim"]{--bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--bg-ov:#d6dde6;--text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.42);--acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.10);--border:rgba(11,107,100,.15);--border-s:rgba(15,30,42,.1);--nav-bg:rgba(237,242,248,.92);--acc-ink:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--onav-h,56px);-webkit-font-smoothing:antialiased}
body[dir="rtl"]{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
a{text-decoration:none;color:inherit}
.wrap{max-width:1100px;margin:0 auto;padding:40px 24px 60px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--acc-dim)}
h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.lead{color:var(--text-s);font-size:14.5px;line-height:1.7;max-width:60ch;margin-bottom:26px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:26px}
.card{background:var(--bg-e);border:1px solid var(--border);border-radius:14px;padding:22px;position:relative}
.avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc-dim));display:grid;place-items:center;font-weight:700;font-size:22px;color:var(--acc-ink);margin-bottom:14px;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.name{font-size:16px;font-weight:700;margin-bottom:4px}
.name-ar{font-family:'Noto Sans Arabic',sans-serif;font-size:14px;color:var(--text-s);margin-bottom:8px}
.role{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:10px}
.bio{font-size:12.5px;color:var(--text-s);line-height:1.65}
.bio-ar{font-family:'Noto Sans Arabic',sans-serif;font-size:12px;color:var(--text-m);margin-top:6px;padding-top:6px;border-top:1px dashed var(--border-s)}
.link{margin-top:10px;font-size:11px;color:var(--acc);font-family:'IBM Plex Mono',monospace;word-break:break-all;display:inline-block}
.link:hover{text-decoration:underline}
.empty{text-align:center;padding:60px 20px;color:var(--text-m);font-size:14px}
.disc{margin-top:24px;padding-top:16px;border-top:1px solid var(--border-s);font-size:11px;color:var(--text-m);text-align:center}
.role-badge{display:inline-block;padding:2px 8px;font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;border-radius:999px;background:var(--acc-sub);color:var(--acc);margin-bottom:8px}
</style>

<style id="bg-identity-css">
/* ============ PLATFORM BACKGROUND IDENTITY (portable) ============ */
html{background:var(--bg,#020509)!important}
body{background:transparent!important}
.bg-identity{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.bg-identity .glow{position:absolute;inset:0;background:
  radial-gradient(58% 44% at 78% 2%,rgba(45,212,200,.18),transparent 60%),
  radial-gradient(52% 42% at 8% 98%,rgba(45,212,200,.11),transparent 62%),
  radial-gradient(90% 70% at 50% 120%,rgba(11,60,72,.35),transparent 70%)}
.bg-identity .grid{position:absolute;inset:0;opacity:.9;background-image:
  linear-gradient(rgba(45,212,200,.06) 1px,transparent 1px),
  linear-gradient(90deg,rgba(45,212,200,.06) 1px,transparent 1px);
  background-size:58px 58px;-webkit-mask-image:radial-gradient(ellipse 95% 75% at 50% 26%,#000,transparent 88%);mask-image:radial-gradient(ellipse 95% 75% at 50% 26%,#000,transparent 88%)}
.bg-identity .motif{position:absolute;top:-40px;inset-inline-start:-140px;width:560px;height:560px;
  background:url(../index-assets/patterns/arabic-geometry.svg) center/contain no-repeat;opacity:.5;
  filter:blur(1.4px);-webkit-mask:radial-gradient(circle at 50% 50%,#000 20%,transparent 68%);mask:radial-gradient(circle at 50% 50%,#000 20%,transparent 68%);
  animation:motspin 140s linear infinite}
.bg-identity .motif-2{top:auto;bottom:-190px;inset-inline-start:auto;inset-inline-end:-190px;width:640px;height:640px;
  opacity:.3;animation-duration:200s;animation-direction:reverse}
@keyframes motspin{to{transform:rotate(360deg)}}
.bg-identity .skyline{position:absolute;left:0;right:0;bottom:0;height:min(24vw,330px);
  background:url(../index-assets/skyline-teal-alpha.png) center bottom/82% auto no-repeat;opacity:.42;
  -webkit-mask-image:linear-gradient(to top,#000 55%,transparent 96%),linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
  mask-image:linear-gradient(to top,#000 55%,transparent 96%),linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
  -webkit-mask-composite:source-in;mask-composite:intersect}
.bg-identity .vignette{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 40%,transparent 55%,rgba(2,5,9,.6) 100%)}
.bg-identity .beam{position:absolute;inset:0;background:linear-gradient(115deg,transparent 40%,rgba(45,212,200,.05) 50%,transparent 60%);
  background-size:300% 300%;animation:beamdrift 14s ease-in-out infinite}
@keyframes beamdrift{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
@media(prefers-reduced-motion:reduce){.bg-identity .motif,.bg-identity .beam{animation:none}}
</style>
</head>
<body>
<div class="bg-identity" aria-hidden="true">
  <div class="glow"></div><div class="grid"></div><div class="beam"></div><div class="motif"></div><div class="motif motif-2"></div><div class="skyline"></div><div class="vignette"></div>
</div>
<div class="wrap">
  <div class="eyebrow" data-i18n="common.contributors">Contributors</div>
  <h1 data-i18n="contributors.h1">The people building OmniRad.</h1>
  <p class="lead" data-i18n="contributors.lead">Radiologists, educators and developers helping shape the platform. Members complete their own profiles; admins assign roles. All copyright remains with OmniRad.</p>

  <div class="grid" id="grid"></div>

  <div class="disc">⚕️ © 2026 OmniRad Platform · All concept, design and reproduction rights reserved.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/i18n.js"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/data/anatomy-master.js?v=loinc-r2"></script>
<script src="../modules/data/anatomy-master-v2.js?v=loinc-r2"></script>
<script src="../modules/omnirad-term.js?v=resolveid"></script>
<script src="../modules/omnirad-search.js"></script>
<script src="../modules/omnirad-typography.js"></script>
<script src="../modules/omnirad-avatars.js"></script>
<script src="../modules/omnirad-nav.js?v=favicon" data-base="../"></script>
<script>
const $ = id => document.getElementById(id);
const PRESET_PREFIX = 'preset:';
const PRESETS = {
  brain:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12c-6 0-10 4-10 10 0 2 .5 4 1.5 5.5C11 29 9 32 9 36c0 4 3 7 6 8 0 4 4 8 9 8 3 0 6-2 8-4 2 2 5 4 8 4 5 0 9-4 9-8 3-1 6-4 6-8 0-4-2-7-4.5-8.5C51.5 26 52 24 52 22c0-6-4-10-10-10-3 0-6 2-8 5-2-3-5-5-8-5z"/><path d="M32 17v34"/></svg>',
  heart:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M32 54s-20-10-20-26c0-6 5-12 12-12 4 0 6 2 8 5 2-3 4-5 8-5 7 0 12 6 12 12 0 16-20 26-20 26z"/><path d="M14 28h8l3-4 4 8 3-6 3 4h13"/></svg>',
  lungs:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M32 10v22M14 34c-4 3-4 12 0 18 4 4 8 2 8-2V22c0-3-4-3-6 0-2 3-2 8-2 12M50 34c4 3 4 12 0 18-4 4-8 2-8-2V22c0-3 4-3 6 0 2 3 2 8 2 12"/></svg>',
  kidney:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12c-6 4-10 12-10 20s4 16 10 20c4 2 8-2 8-6v-6c0-4 4-4 4 0v6c0 4 4 6 8 4 6-4 10-12 10-18s-4-16-10-20c-8-4-14 4-14 8v4c0 4-4 4-4 0v-4z"/></svg>',
  liver:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 22c0-6 6-10 14-10h22c6 0 10 4 10 10s-4 22-14 26c-8 3-16 4-22 2-6-2-10-8-10-14z"/><path d="M22 22h14M22 30h20M22 38h16"/></svg>',
  spine:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M32 6v52"/><rect x="24" y="10" width="16" height="6" rx="2"/><rect x="24" y="18" width="16" height="6" rx="2"/><rect x="24" y="26" width="16" height="6" rx="2"/><rect x="24" y="34" width="16" height="6" rx="2"/><rect x="24" y="42" width="16" height="6" rx="2"/><rect x="24" y="50" width="16" height="6" rx="2"/></svg>',
  bone:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 20c-3 0-5 2-5 5s2 5 5 5c0 3 2 5 5 5l14-14c0-3 2-5 5-5s5-2 5-5-2-5-5-5c0-3-2-5-5-5s-5 2-5 5L19 20c-3 0-5 0-5 0z" transform="rotate(-15 32 32)"/></svg>',
  stetho:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10v18c0 6 5 11 11 11s11-5 11-11V10"/><circle cx="48" cy="42" r="6"/><path d="M48 48v6c0 2-2 4-4 4h-8c-2 0-4-2-4-4v-4"/></svg>',
  xray:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="10" width="48" height="36" rx="3"/><path d="M18 22l10 12M28 22l-10 12M36 22h12M36 28h12M36 34h8"/></svg>',
  mri:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="14" width="48" height="36" rx="4"/><circle cx="32" cy="32" r="12"/><circle cx="32" cy="32" r="4"/><path d="M32 20v-6M32 50v-6M20 32h-6M50 32h-6"/></svg>',
  ct:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="32" r="22"/><circle cx="32" cy="32" r="10"/><path d="M32 10v6M32 54v-6M10 32h6M54 32h-6"/></svg>',
  us:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c-6 0-10 4-10 10v10c0 12 10 20 22 20s22-8 22-20V20c0-6-4-10-10-10z"/></svg>'
};
function renderAvatar(container, url, name){
  container.innerHTML = '';
  if (url && url.startsWith(PRESET_PREFIX)){
    const k = url.slice(PRESET_PREFIX.length);
    const svg = PRESETS[k];
    if (svg){ container.innerHTML = svg.replace('<svg', '<svg width="72%" height="72%" style="color:var(--acc-ink)"'); return; }
  }
  if (url){ container.innerHTML = '<img src="'+url+'" alt="">'; return; }
  container.textContent = initials(name);
}
function initials(name){ return (name||'?').split(/\s+/).filter(Boolean).slice(0,2).map(s=>s[0]||'').join('').toUpperCase(); }
async function load(){
  const isAr = (window.OmniRadI18n && OmniRadI18n.lang === 'ar');
  let data = [];
  if (window.OmniRadAuth && OmniRadAuth.client){
    // Public read policy filters to show_on_contributors=true
    const { data:rows, error } = await OmniRadAuth.client
      .from('profiles')
      .select('id, display_name, display_name_ar, role_title_en, role_title_ar, bio_en, bio_ar, link, avatar_url, role')
      .eq('show_on_contributors', true)
      .in('role', ['contributor','reviewer','admin'])
      .order('display_name');
    if (!error) data = rows || [];
  }
  const grid = $('grid'); grid.innerHTML = '';
  if (!data.length){
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">' +
      (isAr ? 'قائمة المساهمين قيد الإعداد.' : 'Contributors list is being prepared.') +
      '</div>';
    return;
  }
  data.forEach(c => {
    const nameEn = c.display_name || '';
    const nameAr = c.display_name_ar || '';
    const roleTitle = isAr ? (c.role_title_ar || c.role_title_en || '') : (c.role_title_en || c.role_title_ar || '');
    const d = document.createElement('div'); d.className = 'card';
    d.innerHTML = `
      <div class="avatar" id="ava-${c.id}"></div>
      <span class="role-badge">${c.role}</span>
      <div class="name">${nameEn}</div>
      ${nameAr ? `<div class="name-ar">${nameAr}</div>` : ''}
      ${roleTitle ? `<div class="role">${roleTitle}</div>` : ''}
      ${(c.bio_en || c.bio_ar) ? `<div class="bio">${c.bio_en || ''}${c.bio_ar ? '<div class="bio-ar">' + c.bio_ar + '</div>' : ''}</div>` : ''}
      ${c.link ? `<a href="${c.link}" target="_blank" rel="noopener" class="link">${c.link}</a>` : ''}
    `;
    grid.appendChild(d);
    renderAvatar(d.querySelector('.avatar'), c.avatar_url, nameEn || nameAr);
  });
}
window.addEventListener('omnirad-lang', load);
load();
</script>
</body>
</html>
