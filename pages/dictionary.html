<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Anatomical Dictionary · OmniRad</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root,[data-theme="dark"]{--bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--bg-ov:#162030;--text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.38);--acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.12);--acc-ink:#08100e;--border:rgba(45,212,200,.18);--border-s:rgba(232,240,245,.08);--panel:#101e2a;--panel-ov:#162030;--latin:#c7a3ff;--latin-sub:rgba(199,163,255,.12)}
[data-theme="dim"]{--bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--bg-ov:#edf2f8;--text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.42);--acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.1);--acc-ink:#ffffff;--border:rgba(15,58,58,.16);--border-s:rgba(15,58,58,.08);--panel:#ffffff;--panel-ov:#f6f9fc;--latin:#6d4bb0;--latin-sub:rgba(109,75,176,.1)}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--onav-h,56px);-webkit-font-smoothing:antialiased}
body[dir="rtl"]{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
.wrap{max-width:1240px;margin:0 auto;padding:36px 22px 40px}

.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--acc-dim)}
h1{font-size:clamp(1.9rem,3.8vw,2.5rem);font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.lead{color:var(--text-s);font-size:14.5px;line-height:1.7;margin-bottom:16px;max-width:760px}

/* Source provenance strip (Rosetta identity) */
.sources{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.src-pill{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;background:var(--bg-e);border:1px solid var(--border-s);border-radius:999px;font-size:11.5px;color:var(--text-s);text-decoration:none;transition:all .16s}
.src-pill:hover{border-color:var(--acc);color:var(--acc)}
.src-pill b{font-weight:700;color:var(--text)}
.src-pill .v{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-m)}
.src-pill:hover .v{color:var(--acc-dim)}
.src-pill.attr{background:var(--acc-sub);border-color:transparent;color:var(--acc);font-weight:600}

/* Toolbar */
.card{background:var(--bg-e);border:1px solid var(--border-s);border-radius:16px;padding:18px 20px;margin-bottom:8px}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:240px;position:relative}
.search{width:100%;padding:13px 15px 13px 42px;background:var(--panel-ov);border:1.5px solid var(--border-s);border-radius:11px;color:var(--text);font-family:inherit;font-size:14.5px;outline:none;transition:border-color .18s}
body[dir="rtl"] .search{padding:13px 42px 13px 15px}
.search:focus{border-color:var(--acc)}
.search-ic{position:absolute;top:50%;transform:translateY(-50%);inset-inline-start:14px;color:var(--text-m);pointer-events:none}

/* Language lens (segmented control) */
.lens{display:inline-flex;background:var(--panel-ov);border:1.5px solid var(--border-s);border-radius:11px;padding:3px;gap:2px}
.lens button{border:0;background:transparent;color:var(--text-s);font-family:inherit;font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.lens button.on{background:var(--acc);color:var(--acc-ink)}
.lens .ar-lbl{font-family:'Noto Sans Arabic',sans-serif}

.region-filter{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.region-btn{padding:7px 13px;border-radius:8px;border:1.5px solid var(--border-s);background:transparent;color:var(--text-s);font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.region-btn:hover{border-color:var(--acc);color:var(--acc)}
.region-btn.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
.stats{margin:14px 2px 0;font-size:11.5px;color:var(--text-m);font-family:'IBM Plex Mono',monospace;display:flex;gap:14px;flex-wrap:wrap}
.stats b{color:var(--acc)}

/* Region blocks + periodic table */
.region-block{margin-top:30px}
.region-title{display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(90deg,var(--rc-sub,var(--acc-sub)) 0%,transparent 72%);border-inline-start:3px solid var(--rc,var(--acc));border-radius:10px;margin-bottom:14px}
.region-title h2{margin:0;font-size:15px;font-weight:800;color:var(--text);letter-spacing:.01em}
.region-title .count{background:var(--rc,var(--acc));color:#08100e;border-radius:999px;padding:2px 10px;font-size:11px;font-weight:800;font-family:'IBM Plex Mono',monospace;margin-inline-start:auto}

.ptable{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:9px}
.pt-tile{position:relative;aspect-ratio:1/1.06;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:14px 8px 10px;background:var(--panel);border:1px solid var(--border-s);border-radius:13px;cursor:pointer;overflow:hidden;text-align:center;font-family:inherit;transition:transform .16s,border-color .16s,box-shadow .16s}
.pt-tile::before{content:'';position:absolute;top:0;inset-inline:0;height:3px;background:var(--rc,var(--acc));opacity:.85}
.pt-tile:hover{transform:translateY(-3px);border-color:var(--rc,var(--acc));box-shadow:0 14px 32px -10px var(--rc,var(--acc))}
.pt-tile.on{border-color:var(--rc,var(--acc));background:var(--rc-sub,var(--acc-sub))}
.pt-idx{position:absolute;top:7px;inset-inline-start:9px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-m);letter-spacing:.04em}
.pt-dots{position:absolute;top:8px;inset-inline-end:9px;display:flex;gap:3px}
.pt-dot{width:5px;height:5px;border-radius:50%}
.pt-sym{font-size:29px;font-weight:800;letter-spacing:-.03em;color:var(--rc,var(--acc));line-height:1}
.pt-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.18;max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.pt-name.rtl{direction:rtl;font-family:'Noto Sans Arabic',sans-serif}
.pt-name.latin{color:var(--rc,var(--acc));font-style:italic}
.pt-sec{font-size:9.5px;color:var(--text-m);line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pt-sec.rtl{direction:rtl;font-family:'Noto Sans Arabic',sans-serif}
.pt-spk{position:absolute;bottom:5px;inset-inline-end:5px;width:21px;height:21px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;border:0;background:transparent;color:var(--text-m);opacity:0;cursor:pointer;transition:opacity .15s,color .15s}
.pt-tile:hover .pt-spk{opacity:.9}
.pt-spk:hover{color:var(--rc,var(--acc))}
.pt-legend{display:flex;flex-wrap:wrap;gap:14px;margin:14px 2px 0;font-size:11px;color:var(--text-m)}
.pt-legend .lg{display:inline-flex;align-items:center;gap:6px}
.pt-legend .dot{width:7px;height:7px;border-radius:50%}

.empty{padding:70px 20px;text-align:center;color:var(--text-m);font-size:13.5px}

/* Rosetta Constellation overlay */
.sheet-scrim{position:fixed;inset:0;background:rgba(4,8,11,.74);z-index:59;display:none}
.sheet-scrim.on{display:block}
#sheet{position:fixed;z-index:60;top:50%;left:50%;transform:translate(-50%,-50%) scale(.97);width:min(980px,95vw);max-height:92vh;overflow:hidden;background:linear-gradient(180deg,var(--bg-ov),var(--bg-e));border:1.5px solid var(--rc,var(--acc));border-radius:22px;box-shadow:0 40px 100px rgba(0,0,0,.6);display:none;opacity:0;transition:opacity .2s,transform .2s}
#sheet.on{display:block;opacity:1;transform:translate(-50%,-50%) scale(1)}
.cs-close{position:absolute;top:15px;inset-inline-end:15px;z-index:6;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;background:var(--panel-ov);border:1px solid var(--border-s);border-radius:9px;color:var(--text-m);font-size:19px;cursor:pointer;line-height:1}
.cs-close:hover{color:var(--rc,var(--acc));border-color:var(--rc,var(--acc))}
.cs-body{display:grid;grid-template-columns:1fr 330px;max-height:92vh}
.cs-stage{position:relative;min-height:470px;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;background:radial-gradient(circle at 42% 42%,var(--rc-sub,rgba(45,212,200,.10)),transparent 66%)}
.cs-stage::before{content:'';position:absolute;inset:-20%;background-image:radial-gradient(1.6px 1.6px at 18% 24%,rgba(255,255,255,.6),transparent),radial-gradient(1.4px 1.4px at 72% 18%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 58% 66%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 32% 82%,rgba(255,255,255,.35),transparent),radial-gradient(1.5px 1.5px at 86% 62%,rgba(255,255,255,.45),transparent),radial-gradient(1px 1px at 46% 40%,rgba(255,255,255,.3),transparent);opacity:.5;animation:cstar 5s ease-in-out infinite}
@keyframes cstar{0%,100%{opacity:.3}50%{opacity:.75}}
.cs-svg{width:100%;height:auto;max-height:474px;overflow:visible}
.cs-node{cursor:pointer}
.cs-node:hover circle{stroke-opacity:1;filter:drop-shadow(0 0 8px var(--rc,#2dd4c8))}
.cs-node text{pointer-events:none}
.cs-orbit{fill:none;stroke:var(--rc,#2dd4c8);stroke-opacity:.14;stroke-dasharray:3 8;stroke-linecap:round}
.cs-orbits-a{transform-box:fill-box;transform-origin:center;animation:csorbit 100s linear infinite}
.cs-orbits-b{transform-box:fill-box;transform-origin:center;animation:csorbit 68s linear infinite reverse}
@keyframes csorbit{to{transform:rotate(360deg)}}
.cs-pulse{transform-box:fill-box;transform-origin:center;animation:cspulse 3.4s ease-out infinite}
@keyframes cspulse{0%{transform:scale(1);opacity:.55}70%{opacity:0}100%{transform:scale(1.55);opacity:0}}
.cs-core{transform-box:fill-box;transform-origin:center;animation:cscore 4s ease-in-out infinite}
@keyframes cscore{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.cs-float{transform-box:fill-box;transform-origin:center;animation:csfloat 5.5s ease-in-out infinite}
@keyframes csfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.cs-node{transition:transform .18s}
.cs-node:hover{transform:scale(1.12)}
.cs-moon{animation:csmoon 12s linear infinite;transform-box:fill-box;transform-origin:center}
@keyframes csmoon{to{transform:rotate(-360deg)}}
.cs-panel{border-inline-start:1px solid var(--border-s);padding:26px 24px;overflow-y:auto;background:var(--bg-e)}
.cs-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--rc,var(--acc));margin-bottom:14px;display:flex;align-items:center;gap:8px}
.cs-eyebrow::before{content:'';width:18px;height:2px;background:var(--rc,var(--acc));border-radius:2px}
.cs-lang{display:flex;align-items:center;gap:12px;padding:11px 0}
.cs-lang + .cs-lang{border-top:1px dashed var(--border-s)}
.cs-tag{width:44px;flex:none;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:.05em;color:var(--text-m);text-transform:uppercase}
.cs-val{flex:1;min-width:0;font-size:19px;font-weight:800;color:var(--text);line-height:1.2}
.cs-val.rtl{direction:rtl;text-align:right;font-family:'Noto Sans Arabic',sans-serif}
.cs-val.latin{color:var(--rc,var(--acc));font-style:italic}
.cs-val.muted{color:var(--text-m);font-size:14px;font-weight:600}
.cspk{width:34px;height:34px;flex:none;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;border:1px solid var(--rc,var(--acc));background:var(--rc-sub,var(--acc-sub));color:var(--rc,var(--acc));cursor:pointer;transition:all .15s}
.cspk:hover{background:var(--rc,var(--acc));color:#08100e}
.cspk:disabled{opacity:.35;cursor:default;background:transparent;border-color:var(--border-s);color:var(--text-m)}
.cspk.playing{animation:cspkp .9s ease infinite}
@keyframes cspkp{0%,100%{box-shadow:0 0 0 0 var(--rc,var(--acc))}50%{box-shadow:0 0 0 5px transparent}}
.cs-cov{display:flex;align-items:center;gap:9px;margin:16px 0 2px}
.cs-cov-dots{display:flex;gap:5px}
.cs-cov-dot{width:9px;height:9px;border-radius:50%;background:rgba(148,163,184,.24)}
.cs-cov-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-m);letter-spacing:.04em}
.cs-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
.cs-btn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:12.5px;font-weight:700;padding:9px 14px;border-radius:10px;border:1px solid var(--rc,var(--acc));background:transparent;color:var(--rc,var(--acc));cursor:pointer;text-decoration:none;transition:all .15s}
.cs-btn.primary{background:var(--rc,var(--acc));color:#08100e}
.cs-btn:hover{opacity:.85}
.cs-disc{margin-top:18px;font-size:10.5px;color:var(--text-m);line-height:1.6;padding-top:12px;border-top:1px solid var(--border-s)}
@media (max-width:860px){ .cs-body{grid-template-columns:1fr} .cs-panel{border-inline-start:0;border-top:1px solid var(--border-s)} #sheet{width:96vw} .cs-stage{min-height:330px} }
</style>

<style id="bg-identity-css">
/* ============ PLATFORM BACKGROUND IDENTITY (portable) ============ */
html{background:var(--bg,#020509)!important}
body{background:transparent!important}
.bg-identity{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.bg-identity .glow{position:absolute;inset:0;background:
  radial-gradient(58% 44% at 78% 2%,rgba(45,212,200,.18),transparent 60%),
  radial-gradient(52% 42% at 8% 98%,rgba(45,212,200,.11),transparent 62%),
  radial-gradient(90% 70% at 50% 120%,rgba(11,60,72,.35),transparent 70%)}
.bg-identity .grid{position:absolute;inset:0;opacity:.9;background-image:
  linear-gradient(rgba(45,212,200,.06) 1px,transparent 1px),
  linear-gradient(90deg,rgba(45,212,200,.06) 1px,transparent 1px);
  background-size:58px 58px;-webkit-mask-image:radial-gradient(ellipse 95% 75% at 50% 26%,#000,transparent 88%);mask-image:radial-gradient(ellipse 95% 75% at 50% 26%,#000,transparent 88%)}
.bg-identity .motif{position:absolute;top:-40px;inset-inline-start:-140px;width:560px;height:560px;
  background:url(../index-assets/patterns/arabic-geometry.svg) center/contain no-repeat;opacity:.5;
  filter:blur(1.4px);-webkit-mask:radial-gradient(circle at 50% 50%,#000 20%,transparent 68%);mask:radial-gradient(circle at 50% 50%,#000 20%,transparent 68%);
  animation:motspin 140s linear infinite}
.bg-identity .motif-2{top:auto;bottom:-190px;inset-inline-start:auto;inset-inline-end:-190px;width:640px;height:640px;
  opacity:.3;animation-duration:200s;animation-direction:reverse}
@keyframes motspin{to{transform:rotate(360deg)}}
.bg-identity .skyline{position:absolute;left:0;right:0;bottom:0;height:min(24vw,330px);
  background:url(../index-assets/skyline-teal-alpha.png) center bottom/82% auto no-repeat;opacity:.42;
  -webkit-mask-image:linear-gradient(to top,#000 55%,transparent 96%),linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
  mask-image:linear-gradient(to top,#000 55%,transparent 96%),linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
  -webkit-mask-composite:source-in;mask-composite:intersect}
.bg-identity .vignette{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 40%,transparent 55%,rgba(2,5,9,.6) 100%)}
.bg-identity .beam{position:absolute;inset:0;background:linear-gradient(115deg,transparent 40%,rgba(45,212,200,.05) 50%,transparent 60%);
  background-size:300% 300%;animation:beamdrift 14s ease-in-out infinite}
@keyframes beamdrift{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
@media(prefers-reduced-motion:reduce){.bg-identity .motif,.bg-identity .beam{animation:none}}
</style>
</head>
<body>
<div class="bg-identity" aria-hidden="true">
  <div class="glow"></div><div class="grid"></div><div class="beam"></div><div class="motif"></div><div class="motif motif-2"></div><div class="skyline"></div><div class="vignette"></div>
</div>
<div class="wrap">
  <a href="javascript:history.back()" style="display:inline-flex;align-items:center;gap:7px;color:var(--text-m);text-decoration:none;font-size:12.5px;font-weight:600;margin-bottom:14px;transition:color .15s" onmouseover="this.style.color='var(--acc)'" onmouseout="this.style.color='var(--text-m)'"><span style="font-size:15px">←</span><span data-i18n="common.back">Back</span></a>
  <div class="eyebrow">OmniRad · Reference</div>
  <h1 id="pageTitle">Anatomical Dictionary</h1>
  <p class="lead" id="pageLead">One anatomical concept, every terminology system — Arabic, English and Latin names side by side with pronunciation, cross-linked to LOINC, RadLex and Terminologia Anatomica.</p>

  <div class="sources" id="sources"></div>

  <div class="card">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
        <input class="search" id="searchBox" placeholder="Search Arabic · English · Latin…" autocomplete="off" spellcheck="false">
      </div>
      <div class="lens" id="lens" role="group" aria-label="Display language">
        <button data-lens="en" class="on">EN</button>
        <button data-lens="ar" class="ar-lbl">ع</button>
        <button data-lens="la">Latin</button>
      </div>
    </div>
    <div class="region-filter" id="regionFilter"></div>
    <div class="stats" id="stats"></div>
  </div>

  <div id="results"></div>
</div>

<div class="sheet-scrim" id="scrim" onclick="closeSheet()"></div>
<aside id="sheet" role="dialog" aria-modal="false" aria-label="Term details"></aside>

<script src="../modules/data/anatomy-master.js?v=loinc-r2"></script>
<script src="../modules/data/anatomy-master-v2.js?v=loinc-r2"></script>
<script src="../modules/data/radiology-arabic.js"></script>
<script src="../modules/data/loinc-bridge.js"></script>
<script src="../modules/omnirad-term.js?v=resolveid"></script>
<script src="../modules/omnirad-search.js"></script>
<script src="../modules/omnirad-typography.js"></script>
<script src="../modules/speak.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/i18n.js"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/omnirad-avatars.js"></script>
<script src="../modules/omnirad-nav.js?v=favicon" data-base="../"></script>
<script src="../modules/omnirad-attribution.js"></script>
<script src="../modules/omnirad-flag.js"></script>

<!-- Curated Latin (Terminologia Anatomica) names for high-frequency structures.
     Medical accuracy: only verified TA2 Latin terms; unknown → gracefully omitted. -->
<script src="../modules/data/anatomy-latin.js"></script>

<script>
const A = window.OMNIRAD_ANATOMY;
const BR = window.OmniRadLoincBridge;
const LAT = window.OMNIRAD_LATIN || {};
const T = k => (window.OmniRadI18n ? OmniRadI18n.t(k) : k);
const isAr = () => window.OmniRadI18n && OmniRadI18n.lang === 'ar';
let lens = 'en';          // display language for the grid: en | ar | la
let activeRegion = 'all';
let query = '';

/* RadLex RID → LOINC focus (imaging focus axis) for cross-referencing */
const RID2FOCUS = new Map();
if (BR && BR.axes) BR.axes.focus.forEach(f => { if (f.rid) RID2FOCUS.set(f.rid, f); });

/* Periodic-table helpers */
const REGION_COLOR = {'head-cns':'#6ea8ff','chest':'#2dd4c8','cardio':'#fb7185','abdomen':'#fbbf24','pelvis':'#c7a3ff','spine':'#34d399','upper-limb':'#22d3ee','lower-limb':'#f59e0b','breast':'#f472b6'};
function rc(id){ return REGION_COLOR[id] || '#2dd4c8'; }
function rcSub(hex){ const h=hex.replace('#',''); return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},.13)`; }
function symbolOf(en){
  const w = String(en||'').replace(/[^A-Za-z ]/g,'').trim().split(/\s+/).filter(Boolean);
  if (!w.length) return '?';
  if (w.length>=2) return (w[0][0]+w[1][0]).toUpperCase();
  const s=w[0]; return s[0].toUpperCase()+(s[1]||'').toLowerCase();
}
function provDots(s){
  let d='';
  if (s.ta2) d+='<span class="pt-dot" style="background:#c7a3ff" title="TA2"></span>';
  if (s.radlex) d+='<span class="pt-dot" style="background:var(--acc)" title="RadLex"></span>';
  if (s.radlex && RID2FOCUS.has(s.radlex)) d+='<span class="pt-dot" style="background:#fbbf24" title="LOINC"></span>';
  return d;
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function latinOf(s){ return LAT[s.id] || (s.ta2 && LAT['ta2:'+s.ta2]) || LAT['en:'+String(s.en||'').toLowerCase().trim()] || null; }

/* ── Pronunciation (Web Speech + Google TTS fallback for Arabic) ── */
let arVoiceKnown = null;
function hasArVoice(){
  if (arVoiceKnown !== null) return arVoiceKnown;
  try { arVoiceKnown = ('speechSynthesis' in window) && speechSynthesis.getVoices().some(v=>/^ar/i.test(v.lang)); }
  catch(_){ arVoiceKnown = false; }
  return arVoiceKnown;
}
if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = () => { arVoiceKnown = null; };
function speak(text, lang, btn){
  if (!text) return;
  if (btn){ btn.classList.add('playing'); setTimeout(()=>btn.classList.remove('playing'), 1400); }
  const useLang = lang || 'en';
  if (window.OmniRadSpeak && OmniRadSpeak.supported && !(useLang==='ar' && !hasArVoice())){
    OmniRadSpeak.say(text, useLang); return;
  }
  try { new Audio('https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(text)+'&tl='+useLang+'&client=tw-ob').play(); } catch(_){}
}
window.__omrSpeak = speak;

/* ── Sources strip ── */
function renderSources(){
  const S = window.OmniRadAttribution ? OmniRadAttribution.sources() : {};
  const order = ['LOINC','RadLex','TA2','WHO'];
  const attrHref = 'attribution.html';
  const pills = order.filter(id=>S[id]).map(id => {
    const s = S[id];
    return `<a class="src-pill" href="${esc(s.url)}" target="_blank" rel="noopener"><b>${esc(s.abbr)}</b>${s.version?`<span class="v">${esc(s.version)}</span>`:''}</a>`;
  }).join('');
  document.getElementById('sources').innerHTML = pills +
    `<a class="src-pill attr" href="${attrHref}">${esc(T('standards.full'))} →</a>`;
}

/* ── Region filter ── */
function renderRegionFilter(){
  const box = document.getElementById('regionFilter');
  const ar = isAr();
  const btns = [{id:'all', label: ar?'الكل':'All'}].concat(A.regions.map(r=>({id:r.id,label:ar?r.ar:r.en})));
  box.innerHTML = btns.map(b=>`<button class="region-btn ${b.id===activeRegion?'on':''}" data-region="${b.id}">${esc(b.label)}</button>`).join('');
  box.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{activeRegion=b.dataset.region;renderRegionFilter();renderResults();}));
}

/* ── Grid ── */
function primaryName(s){
  if (lens==='ar') return {val:s.ar, cls:'rtl'};
  if (lens==='la'){ const l=latinOf(s); return l?{val:l,cls:'latin-txt'}:{val:s.en,cls:''}; }
  return {val:s.en, cls:''};
}
function secondaryName(s){
  if (lens==='ar') return {val:s.en, cls:'', lang:'en'};
  if (lens==='la') return {val:s.ar, cls:'rtl', lang:'ar'};
  return {val:s.ar, cls:'rtl', lang:'ar'};
}
function provChips(s){
  const chips=[];
  if (s.ta2) chips.push('<span class="prov-chip ta2" title="Terminologia Anatomica">TA2</span>');
  if (s.radlex) chips.push('<span class="prov-chip rad" title="RadLex '+esc(s.radlex)+'">RadLex</span>');
  if (s.radlex && RID2FOCUS.has(s.radlex)) chips.push('<span class="prov-chip loinc" title="LOINC/RSNA imaging focus">LOINC</span>');
  return chips.join('');
}
function renderResults(){
  const q = query.trim().toLowerCase();
  const filtered = A.structures.filter(s=>{
    if (activeRegion!=='all' && s.region!==activeRegion) return false;
    if (!q) return true;
    const lat = (latinOf(s)||'').toLowerCase();
    return s.en.toLowerCase().includes(q) || (s.ar||'').includes(query.trim()) || lat.includes(q) || (s.aliases||[]).some(a=>String(a).toLowerCase().includes(q));
  });
  const laCount = A.structures.filter(latinOf).length;
  document.getElementById('stats').innerHTML =
    `<span><b>${filtered.length}</b> / ${A.structures.length} ${isAr()?'مصطلح':'terms'}</span>`+
    `<span>${isAr()?'مصدر':'sources'}: <b>4</b></span>`+
    `<span>${isAr()?'أسماء لاتينية':'Latin names'}: <b>${laCount}</b></span>`+
    `<span>${isAr()?'البيانات':'data'}: <b>${esc(A.source||'v1')}</b></span>`;
  const container = document.getElementById('results');
  if (!filtered.length){ container.innerHTML = `<div class="empty">${isAr()?'لا توجد مصطلحات تطابق البحث.':'No terms match your search.'}</div>`; return; }
  const groups={}; filtered.forEach(s=>{(groups[s.region]=groups[s.region]||[]).push(s);});
  let html='';
  A.regions.forEach(r=>{
    const items=groups[r.id]; if(!items||!items.length) return;
    const color=rc(r.id), sub=rcSub(color);
    html += `<div class="region-block" style="--rc:${color};--rc-sub:${sub}"><div class="region-title"><h2>${esc(isAr()?r.ar:r.en)}</h2><span class="count">${items.length}</span></div><div class="ptable">`;
    items.forEach((s,i)=>{
      const p=primaryName(s), sec=secondaryName(s);
      const spkLang = lens==='ar' ? 'ar' : 'en';
      const spkText = lens==='ar' ? s.ar : s.en;
      const idx = String(i+1).padStart(2,'0');
      const pcls = p.cls==='rtl' ? 'rtl' : (p.cls==='latin-txt' ? 'latin' : '');
      html += `<button class="pt-tile" data-tid="${esc(s.id)}">
        <span class="pt-idx">${idx}</span>
        <span class="pt-dots">${provDots(s)}</span>
        <span class="pt-sym">${esc(symbolOf(s.en))}</span>
        <span class="pt-name ${pcls}">${esc(p.val)}</span>
        <span class="pt-sec ${sec.cls==='rtl'?'rtl':''}">${esc(sec.val)}</span>
        <span class="pt-spk" title="Listen" data-spk="${esc(spkText)}" data-spklang="${spkLang}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg></span>
      </button>`;
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('.pt-tile').forEach(el=>{
    el.addEventListener('click', e=>{ if(e.target.closest('.pt-spk')) return; openSheet(el.dataset.tid); });
    el.addEventListener('mouseenter', ()=>{ if(window.OmniRadTerm) OmniRadTerm.show(el.dataset.tid, el); });
  });
  container.querySelectorAll('.pt-spk').forEach(b=>b.addEventListener('click', e=>{ e.stopPropagation(); speak(b.dataset.spk, b.dataset.spklang, b); }));
}

/* ── Rosetta Constellation ── */
function openSheet(id){
  const s = A.byId(id); if(!s) return;
  const ar = isAr();
  const region = A.regions.find(r=>r.id===s.region);
  const color = rc(s.region), sub = rcSub(color);
  const parent = s.parent ? A.byId(s.parent) : null;
  const children = A.structures.filter(x=>x.parent===s.id).slice(0,6);
  const latin = latinOf(s);
  const focus = (s.radlex && RID2FOCUS.get(s.radlex)) || null;
  const codes = [
    { abbr:'TA2',    on:!!s.ta2,   code:s.ta2||'—' },
    { abbr:'RadLex', on:!!s.radlex, code:s.radlex||'—' },
    { abbr:'LOINC',  on:!!focus,   code: focus ? ('RID'+focus.rid) : '—' }
  ];
  const cov = codes.filter(c=>c.on).length;
  const radLink = 'https://radiopaedia.org/search?q='+encodeURIComponent(s.en);

  // ── SVG constellation geometry (living planetary system) ──
  const W=620,H=470, cx=250, cy=235, cr=62;
  const CODE_COLOR = { TA2:'#c7a3ff', RadLex:'#2dd4c8', LOINC:'#fbbf24' };
  let lines='', nodes='';
  function node(x,y,r,label,sub2,jumpId,pColor,delay){
    pColor = pColor || color;
    const dx=x-cx, dy=y-cy, d=Math.hypot(dx,dy)||1, ux=dx/d, uy=dy/d;
    const x1=(cx+cr*ux).toFixed(1), y1=(cy+cr*uy).toFixed(1), x2=(x-r*ux).toFixed(1), y2=(y-r*uy).toFixed(1);
    lines += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${pColor}" stroke-opacity=".32" stroke-width="1.5"/>`;
    nodes += `<g class="cs-float ${jumpId?'cs-node':''}" style="animation-delay:${delay||0}s" ${jumpId?`data-jump="${esc(jumpId)}"`:''}>`
      + `<circle cx="${x}" cy="${y}" r="${r}" fill="${pColor}" fill-opacity=".14" stroke="${pColor}" stroke-opacity=".75" stroke-width="1.6" style="filter:drop-shadow(0 0 7px ${pColor}66)"/>`
      + `<text x="${x}" y="${y+(sub2?-3:4)}" text-anchor="middle" fill="var(--text,#e8f0f5)" font-size="12" font-weight="700" font-family="IBM Plex Sans, sans-serif">${esc(label)}</text>`
      + (sub2?`<text x="${x}" y="${y+13}" text-anchor="middle" fill="${pColor}" font-size="8.5" font-family="IBM Plex Mono, monospace">${esc(sub2)}</text>`:'')
      + `</g>`;
  }
  // coding "planets" (right) — each its own colour
  node(470,120,34,'TA2',   codes[0].code, null, CODE_COLOR.TA2,    -1.2);
  node(506,235,34,'RadLex',codes[1].code, null, CODE_COLOR.RadLex, -2.6);
  node(470,350,34,'LOINC', codes[2].code, null, CODE_COLOR.LOINC,  -3.9);
  // parent (top)
  if(parent) node(250,66,32, (ar?parent.ar:parent.en).slice(0,10), ar?'جزء منه':'part of', parent.id, color, -0.6);
  // children (left arc)
  const n=children.length;
  children.forEach((c,i)=>{
    const a = (n===1) ? Math.PI : (0.72*Math.PI + (i/(n-1))*0.56*Math.PI);
    const R=170, x=Math.round(cx+R*Math.cos(a)), y=Math.round(cy+R*Math.sin(a));
    node(x,y,24, symbolOf(c.en), '', c.id, color, -(i*0.8+1));
  });
  // orbit rings (rotating dashes) with a moon riding each ring (off the node axes)
  const m1x=(cx+150*Math.cos(-0.9)).toFixed(1), m1y=(cy+150*Math.sin(-0.9)).toFixed(1);
  const m2x=(cx+212*Math.cos(2.3)).toFixed(1), m2y=(cy+212*Math.sin(2.3)).toFixed(1);
  const orbits = `<g class="cs-orbits-a"><circle class="cs-orbit" cx="${cx}" cy="${cy}" r="150"/><circle cx="${m1x}" cy="${m1y}" r="3.5" fill="${color}" fill-opacity=".75"/></g>`
    + `<g class="cs-orbits-b"><circle class="cs-orbit" cx="${cx}" cy="${cy}" r="212"/><circle cx="${m2x}" cy="${m2y}" r="2.5" fill="${color}" fill-opacity=".5"/></g>`;
  // centre — pulsing halo + glowing gently-breathing core
  const centerG = `<circle class="cs-pulse" cx="${cx}" cy="${cy}" r="${cr}" fill="none" stroke="${color}" stroke-width="2"/>`
    + `<g class="cs-core"><circle cx="${cx}" cy="${cy}" r="${cr}" fill="${sub}" stroke="${color}" stroke-width="2.5" style="filter:drop-shadow(0 0 16px ${color}88)"/>`
    + `<text x="${cx}" y="${cy-6}" text-anchor="middle" fill="${color}" font-size="34" font-weight="800" font-family="IBM Plex Sans, sans-serif">${esc(symbolOf(s.en))}</text>`
    + `<text x="${cx}" y="${cy+22}" text-anchor="middle" fill="var(--text,#e8f0f5)" font-size="12" font-weight="700" font-family="IBM Plex Sans, sans-serif">${esc(s.en.length>18?s.en.slice(0,17)+'…':s.en)}</text></g>`;
  const svg = `<svg class="cs-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(s.en)} relations">${orbits}${lines}${centerG}${nodes}</svg>`;

  // ── Right panel (tri-lingual reader) ──
  const spk = (tag,val,cls,lang) => {
    const dis = !val || lang==='la';
    return `<div class="cs-lang"><span class="cs-tag">${tag}</span>`
      + `<span class="cs-val ${cls||''} ${!val?'muted':''}">${esc(val||'—')}</span>`
      + `<button class="cspk" ${dis?'disabled':''} ${!dis?`data-spk="${esc(val)}" data-spklang="${lang}"`:''} title="Listen">`
      + `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a10 10 0 0 1 0 14"/></svg></button></div>`;
  };
  const covDots = [0,1,2].map(i=>`<span class="cs-cov-dot" style="${i<cov?'background:'+color:''}"></span>`).join('');
  const panel = `<div class="cs-panel">
    <div class="cs-eyebrow">Rosetta · ${esc(ar?region.ar:region.en)} · ${esc(s.rank||'')}</div>
    ${spk('EN', s.en, '', 'en')}
    ${spk('عربي', s.ar, 'rtl', 'ar')}
    ${spk('Latin', latin, 'latin', 'la')}
    <div class="cs-cov"><span class="cs-cov-dots">${covDots}</span><span class="cs-cov-lbl">${cov}/3 ${ar?'أنظمة ترميز':'coding systems'}${focus?' · '+focus.count+(ar?' إجراء LOINC':' LOINC procedures'):''}</span></div>
    <div class="cs-row">
      <a class="cs-btn primary" href="atlas.html?structure=${encodeURIComponent(s.id)}">${ar?'شاهد في الأطلس ↗':'View in Atlas ↗'}</a>
      <a class="cs-btn" href="${radLink}" target="_blank" rel="noopener">Radiopaedia ↗</a>
    </div>
    <p class="cs-disc">${ar?'⚕️ أداة تعليمية — ليست للتشخيص. المصطلحات وفق TA2 · RadLex® (RSNA) · LOINC® 2.82 (Regenstrief).':'⚕️ Educational tool — not for diagnosis. Terminology per TA2 · RadLex® (RSNA) · LOINC® 2.82 (Regenstrief).'}</p>
  </div>`;

  const sheet = document.getElementById('sheet');
  sheet.style.setProperty('--rc', color);
  sheet.style.setProperty('--rc-sub', sub);
  sheet.innerHTML = `<button class="cs-close" onclick="closeSheet()" aria-label="Close">×</button><div class="cs-body"><div class="cs-stage">${svg}</div>${panel}</div>`;
  sheet.classList.add('on');
  document.getElementById('scrim').classList.add('on');
  document.querySelectorAll('.pt-tile').forEach(el=>el.classList.toggle('on', el.dataset.tid===id));
  sheet.querySelectorAll('.cspk[data-spk]').forEach(b=>b.addEventListener('click',()=>speak(b.dataset.spk,b.dataset.spklang,b)));
  sheet.querySelectorAll('.cs-node[data-jump]').forEach(g=>g.addEventListener('click',()=>openSheet(g.dataset.jump)));
  if(window.OmniRadFlag) OmniRadFlag.mount();
  history.replaceState(null,'','?term='+encodeURIComponent(id));
}
window.openSheet = openSheet;
window.closeSheet = () => {
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('scrim').classList.remove('on');
  document.querySelectorAll('.term').forEach(el=>el.classList.remove('on'));
  history.replaceState(null,'',location.pathname);
};
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSheet(); });

/* ── Lens ── */
document.getElementById('lens').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
  lens=b.dataset.lens;
  document.getElementById('lens').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
  renderResults();
}));

/* ── i18n page chrome ── */
function applyLang(){
  const ar=isAr();
  document.getElementById('pageTitle').textContent = ar?'القاموس التشريحي':'Anatomical Dictionary';
  document.getElementById('pageLead').textContent = ar
    ? 'مفهوم تشريحي واحد بكل أنظمة المصطلحات — الاسم بالعربية والإنجليزية واللاتينية جنباً إلى جنب مع النطق الصوتي، مربوطاً بـ LOINC و RadLex والمصطلحات التشريحية الدولية.'
    : 'One anatomical concept, every terminology system — Arabic, English and Latin names side by side with pronunciation, cross-linked to LOINC, RadLex and Terminologia Anatomica.';
  document.getElementById('searchBox').placeholder = ar?'ابحث بالعربية · الإنجليزية · اللاتينية…':'Search Arabic · English · Latin…';
  document.title = (ar?'القاموس التشريحي':'Anatomical Dictionary')+' · OmniRad';
  renderSources(); renderRegionFilter(); renderResults();
}
window.addEventListener('omnirad-lang', applyLang);
window.addEventListener('omnirad:anatomy-ready', renderResults);

document.getElementById('searchBox').addEventListener('input', e=>{ query=e.target.value; renderResults(); });

applyLang();
const params = new URLSearchParams(location.search);
if (params.get('term')) setTimeout(()=>openSheet(params.get('term')), 250);
</script>
