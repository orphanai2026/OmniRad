<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Anatomical Dictionary · OmniRad</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root,[data-theme="dark"]{--bg:#080e14;--bg-s:#0c1520;--bg-e:#101e2a;--bg-ov:#162030;--text:#e8f0f5;--text-s:rgba(232,240,245,.65);--text-m:rgba(232,240,245,.38);--acc:#2dd4c8;--acc-dim:rgba(45,212,200,.55);--acc-sub:rgba(45,212,200,.12);--acc-ink:#08100e;--border:rgba(45,212,200,.18);--border-s:rgba(232,240,245,.08);--panel:#101e2a;--panel-ov:#162030}
[data-theme="dim"]{--bg:#dde4ec;--bg-s:#e6ecf3;--bg-e:#edf2f8;--bg-ov:#edf2f8;--text:#0f1e2a;--text-s:rgba(15,30,42,.65);--text-m:rgba(15,30,42,.42);--acc:#0b6b64;--acc-dim:rgba(11,107,100,.55);--acc-sub:rgba(11,107,100,.1);--acc-ink:#ffffff;--border:rgba(15,58,58,.16);--border-s:rgba(15,58,58,.08);--panel:#ffffff;--panel-ov:#f6f9fc}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--onav-h,56px);-webkit-font-smoothing:antialiased}
body[dir="rtl"]{font-family:'Noto Sans Arabic','IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:36px 22px 80px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--acc-dim)}
h1{font-size:clamp(1.8rem,3.6vw,2.3rem);font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
.lead{color:var(--text-s);font-size:14.5px;line-height:1.7;margin-bottom:14px;max-width:780px}
.ref{display:inline-flex;align-items:center;gap:9px;padding:10px 14px;background:var(--acc-sub);border:1px solid var(--acc-sub);border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--acc);letter-spacing:.02em;margin-bottom:26px}

.card{background:var(--bg-e);border:1px solid var(--border-s);border-radius:14px;padding:20px 22px;margin-bottom:16px}
.section-t{font-size:11px;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:var(--acc);font-family:'IBM Plex Mono',monospace;margin-bottom:14px}

.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.search{flex:1;min-width:240px;padding:12px 15px;background:var(--panel-ov);border:1.5px solid var(--border-s);border-radius:10px;color:var(--text);font-family:inherit;font-size:14.5px;outline:none;transition:border-color .18s}
.search:focus{border-color:var(--acc)}
.region-filter{display:flex;gap:6px;flex-wrap:wrap}
.region-btn{padding:7px 13px;border-radius:8px;border:1.5px solid var(--border-s);background:transparent;color:var(--text-s);font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.region-btn:hover{border-color:var(--acc);color:var(--acc)}
.region-btn.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
.stats{margin-top:10px;font-size:11.5px;color:var(--text-m);font-family:'IBM Plex Mono',monospace}

.region-block{margin-top:22px}
.region-title{display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(90deg,var(--acc-sub) 0%,transparent 70%);border-inline-start:3px solid var(--acc);border-radius:10px;margin-bottom:12px}
.region-title h2{margin:0;font-size:15px;font-weight:800;color:var(--text);letter-spacing:.01em}
.region-title .count{background:var(--acc);color:var(--acc-ink);border-radius:999px;padding:2px 10px;font-size:11px;font-weight:800;font-family:'IBM Plex Mono',monospace;margin-inline-start:auto}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.term{padding:14px 15px;background:var(--panel);border:1px solid var(--border-s);border-radius:11px;transition:all .18s;cursor:pointer;position:relative}
.term:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,212,200,.08)}
.term.on{border-color:var(--acc);background:var(--acc-sub)}
.term .en{font-size:14.5px;font-weight:800;color:var(--text);line-height:1.3;margin:0}
.term .ar{font-size:13.5px;font-weight:700;color:var(--text-s);margin:4px 0 0;direction:rtl;text-align:right}
.term .rank{margin-top:8px;font-size:10px;color:var(--text-m);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
.term .parent{margin-top:3px;font-size:11px;color:var(--text-m)}
.empty{padding:60px 20px;text-align:center;color:var(--text-m);font-size:13.5px}

#detailPanel{position:fixed;top:calc(var(--onav-h,56px) + 12px);inset-inline-end:20px;width:360px;max-height:calc(100vh - var(--onav-h,56px) - 24px);overflow-y:auto;background:var(--bg-e);border:1.5px solid var(--acc);border-radius:14px;padding:20px;box-shadow:0 16px 48px rgba(0,0,0,.35);display:none;z-index:50}
#detailPanel.on{display:block}
#detailPanel .close{position:absolute;top:12px;inset-inline-end:14px;background:transparent;border:0;color:var(--text-m);font-size:22px;cursor:pointer;line-height:1;padding:0}
#detailPanel .close:hover{color:var(--acc)}
#detailPanel h3{margin:0 0 4px;font-size:19px;font-weight:800;color:var(--text)}
#detailPanel .ar-title{font-size:16px;font-weight:700;color:var(--text-s);direction:rtl;text-align:right;margin:0 0 14px}
#detailPanel .meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
#detailPanel .chip{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px;background:var(--acc-sub);color:var(--acc)}
#detailPanel .chip.rank{background:transparent;color:var(--text-m);border:1px solid var(--border-s)}
#detailPanel .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
#detailPanel .btn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:12px;font-weight:700;padding:8px 13px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text-s);cursor:pointer;text-decoration:none;transition:all .15s}
#detailPanel .btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-sub)}
#detailPanel .btn.primary{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
#detailPanel .btn.primary:hover{background:transparent;color:var(--acc)}
#detailPanel .sec-t{margin-top:16px;font-size:10.5px;color:var(--text-m);letter-spacing:.08em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;font-weight:700}
#detailPanel ul{list-style:none;padding:0;margin:6px 0 0}
#detailPanel li a{display:block;padding:7px 0;color:var(--text-s);text-decoration:none;border-bottom:1px dashed var(--border-s);font-size:13px;transition:color .15s}
#detailPanel li a:hover{color:var(--acc)}
@media (max-width:960px){ #detailPanel{position:static;width:auto;max-height:none;margin:20px 0} }
</style>
</head>
<body>
<div class="wrap">
  <a href="javascript:history.back()" style="display:inline-flex;align-items:center;gap:7px;color:var(--text-m);text-decoration:none;font-size:12.5px;font-weight:600;margin-bottom:14px;transition:color .15s" onmouseover="this.style.color='var(--acc)'" onmouseout="this.style.color='var(--text-m)'"><span style="font-size:15px">←</span><span data-i18n="dict.back">Back</span></a>
  <div class="eyebrow" data-i18n="dict.eyebrow">OmniRad · Reference</div>
  <h1 data-i18n="dict.title">Anatomical Dictionary</h1>
  <p class="lead" data-i18n="dict.lead">Bilingual anatomical terminology — the unified reference used across every page. Click any term to see details; hover for a quick tooltip.</p>
  <div class="ref">🔬 <span>Terminologia Anatomica (IFAA, 2019) + RadLex (RSNA)</span></div>

  <div class="card">
    <div class="section-t" data-i18n="dict.filters">Search & filter</div>
    <div class="toolbar">
      <input class="search" id="searchBox" placeholder="Search terms (English or Arabic)…" data-i18n-placeholder="dict.searchPh" autocomplete="off" spellcheck="false">
    </div>
    <div class="region-filter" id="regionFilter" style="margin-top:10px"></div>
    <div class="stats" id="stats"></div>
  </div>

  <div id="results"></div>
</div>

<aside id="detailPanel">
  <button class="close" onclick="closeDetail()" aria-label="Close">×</button>
  <div id="detailContent"></div>
</aside>

<script src="../modules/data/anatomy-master.js"></script>
<script src="../modules/data/anatomy-master-v2.js"></script>
<script src="../modules/omnirad-term.js"></script>
<script src="../modules/omnirad-search.js"></script>
<script src="../modules/omnirad-typography.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../modules/i18n.js"></script>
<script src="../modules/supabase.js"></script>
<script src="../modules/omnirad-avatars.js"></script>
<script src="../modules/omnirad-nav.js" data-base="../"></script>
<script>
const A = window.OMNIRAD_ANATOMY;
const isAr = () => window.OmniRadI18n && OmniRadI18n.lang === 'ar';
let activeRegion = 'all';
let query = '';

if (window.OmniRadI18n && OmniRadI18n.dicts){
  Object.assign(OmniRadI18n.dicts.en, {
    'dict.eyebrow':'OmniRad · Reference',
    'dict.title':'Anatomical Dictionary',
    'dict.lead':'Bilingual anatomical terminology — the unified reference used across every page. Click any term to see details; hover for a quick tooltip.',
    'dict.searchPh':'Search terms (English or Arabic)…',
    'dict.filters':'Search & filter',
    'dict.all':'All',
    'dict.stats':'Showing {n} of {total} terms',
    'dict.related':'Related structures','dict.substructures':'Substructures','dict.partOf':'Part of',
    'dict.noResults':'No terms match your search.',
    'nav.dictionary':'Dictionary',
    'dict.moreInfo':'More info (Radiopaedia) ↗',
    'dict.back':'Back'
  });
  Object.assign(OmniRadI18n.dicts.ar, {
    'dict.eyebrow':'أومنيراد · مرجعية',
    'dict.title':'القاموس التشريحي',
    'dict.lead':'المصطلحات التشريحية ثنائية اللغة — المرجعية الموحّدة المستخدمة في كل صفحات المنصّة. اضغط أي مصطلح لرؤية التفاصيل، وحوّم عليه لمعلومات سريعة.',
    'dict.searchPh':'ابحث بالإنجليزية أو العربية…',
    'dict.filters':'بحث وتصفية',
    'dict.all':'الكل',
    'dict.stats':'يعرض {n} من أصل {total} مصطلح',
    'dict.related':'أعضاء ذات صلة','dict.substructures':'أجزاء فرعية','dict.partOf':'جزء من',
    'dict.noResults':'لا توجد مصطلحات تطابق البحث.',
    'nav.dictionary':'القاموس',
    'dict.moreInfo':'مزيد من المعلومات (Radiopaedia) ↗',
    'dict.back':'رجوع'
  });
  if (typeof OmniRadI18n.apply === 'function') OmniRadI18n.apply();
}

function tt(key, subs){ const I = window.OmniRadI18n; let s = (I && I.t) ? I.t(key) : key; if (subs) Object.keys(subs).forEach(k => { s = s.replace('{'+k+'}', subs[k]); }); return s; }

function renderRegionFilter(){
  const box = document.getElementById('regionFilter');
  const ar = isAr();
  const buttons = [{ id:'all', label: tt('dict.all') }].concat(A.regions.map(r => ({ id: r.id, label: ar ? r.ar : r.en })));
  box.innerHTML = buttons.map(b => `<button class="region-btn ${b.id===activeRegion?'on':''}" data-region="${b.id}">${b.label}</button>`).join('');
  box.querySelectorAll('button').forEach(b => b.addEventListener('click', () => { activeRegion = b.dataset.region; renderRegionFilter(); renderResults(); }));
}

function renderResults(){
  const ar = isAr();
  const q = query.trim().toLowerCase();
  const filtered = A.structures.filter(s => {
    if (activeRegion !== 'all' && s.region !== activeRegion) return false;
    if (!q) return true;
    return s.en.toLowerCase().includes(q) || s.ar.includes(q) || (s.aliases||[]).some(a => a.toLowerCase().includes(q));
  });
  document.getElementById('stats').textContent = tt('dict.stats', { n: filtered.length, total: A.structures.length });
  const container = document.getElementById('results');
  if (!filtered.length){ container.innerHTML = '<div class="empty">' + tt('dict.noResults') + '</div>'; return; }
  const groups = {};
  filtered.forEach(s => { (groups[s.region] = groups[s.region] || []).push(s); });
  let html = '';
  A.regions.forEach(r => {
    const items = groups[r.id]; if (!items || !items.length) return;
    html += `<div class="region-block">
      <div class="region-title">
        <h2>${ar ? r.ar : r.en}</h2>
        <span class="count">${items.length}</span>
      </div>
      <div class="grid">`;
    items.forEach(s => {
      const parent = s.parent ? A.byId[s.parent] : null;
      html += `<div class="term" data-tid="${s.id}">
        <div class="en">${s.en}</div>
        <div class="ar">${s.ar}</div>
        <div class="rank">${s.rank}${parent ? ' · '+(ar?parent.ar:parent.en) : ''}</div>
      </div>`;
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('.term').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.tid));
    el.addEventListener('mouseenter', () => { if (window.OmniRadTerm) OmniRadTerm.show(el.dataset.tid, el); });
  });
}

function openDetail(id){
  const s = A.byId[id]; if (!s) return;
  const ar = isAr();
  const region = A.regions.find(r => r.id === s.region);
  const parent = s.parent ? A.byId[s.parent] : null;
  const children = A.structures.filter(x => x.parent === s.id);
  const siblings = A.structures.filter(x => x.region === s.region && x.parent === s.parent && x.id !== s.id).slice(0, 6);
  const radLink = 'https://radiopaedia.org/search?q=' + encodeURIComponent(s.en);

  const html = `
    <h3>${s.en}</h3>
    <div class="ar-title">${s.ar}</div>
    <div class="meta">
      <span class="chip">${ar ? region.ar : region.en}</span>
      <span class="chip rank">${s.rank}</span>
    </div>
    ${parent ? `<div class="sec-t">${tt('dict.partOf')}</div><ul><li><a href="#" data-jump="${parent.id}">${ar?parent.ar:parent.en}</a></li></ul>` : ''}
    <div class="row">
      <button class="btn" onclick="speakBtn('en','${s.en.replace(/'/g,"\\'")}')">🔊 EN</button>
      <button class="btn" onclick="speakBtn('ar','${s.ar.replace(/'/g,"\\'")}')">🔊 AR</button>
    </div>
    <div class="row">
      <a class="btn primary" href="atlas.html?structure=${encodeURIComponent(s.id)}">${ar?'شاهد في الأطلس ↗':'View in Atlas ↗'}</a>
      <a class="btn" href="${radLink}" target="_blank" rel="noopener">${tt('dict.moreInfo')}</a>
    </div>
    ${children.length ? `<div class="sec-t">${tt('dict.substructures')}</div><ul>${children.map(c=>`<li><a href="#" data-jump="${c.id}">${ar?c.ar:c.en}</a></li>`).join('')}</ul>` : ''}
    ${siblings.length ? `<div class="sec-t">${tt('dict.related')}</div><ul>${siblings.map(sib=>`<li><a href="#" data-jump="${sib.id}">${ar?sib.ar:sib.en}</a></li>`).join('')}</ul>` : ''}
  `;
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailPanel').classList.add('on');
  document.querySelectorAll('.term').forEach(el => el.classList.toggle('on', el.dataset.tid === id));
  document.querySelectorAll('#detailPanel [data-jump]').forEach(a => a.addEventListener('click', e => { e.preventDefault(); openDetail(a.dataset.jump); }));
  history.replaceState(null, '', '?term=' + encodeURIComponent(id));
}
window.openDetail = openDetail;
window.closeDetail = () => {
  document.getElementById('detailPanel').classList.remove('on');
  document.querySelectorAll('.term').forEach(el => el.classList.remove('on'));
  history.replaceState(null, '', location.pathname);
};
window.speakBtn = (lang, text) => {
  if ('speechSynthesis' in window){
    try {
      const voices = speechSynthesis.getVoices();
      const v = voices.find(vc => (lang==='ar' ? /^ar/i : /^en/i).test(vc.lang));
      const u = new SpeechSynthesisUtterance(text);
      if (v) u.voice = v;
      u.lang = lang === 'ar' ? 'ar-SA' : 'en-US'; u.rate = 0.9;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
      return;
    } catch(e){}
  }
  try {
    const url = 'https://translate.google.com/translate_tts?ie=UTF-8&q=' + encodeURIComponent(text) + '&tl=' + lang + '&client=tw-ob';
    new Audio(url).play();
  } catch(e){}
};

document.getElementById('searchBox').addEventListener('input', e => { query = e.target.value; renderResults(); });
window.addEventListener('omnirad-lang', () => { renderRegionFilter(); renderResults(); });
renderRegionFilter();
renderResults();

const params = new URLSearchParams(location.search);
if (params.get('term')) setTimeout(() => openDetail(params.get('term')), 200);
</script>
</body>
</html>
